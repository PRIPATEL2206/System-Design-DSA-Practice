<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="420" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Transformer Variants — Encoder, Decoder, and Encoder-Decoder</text>

  <!-- Encoder-only (BERT) -->
  <rect x="30" y="55" width="295" height="340" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="177" y="80" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">Encoder-Only</text>
  <text x="177" y="100" text-anchor="middle" fill="#ffffff" font-size="10">(BERT, RoBERTa, ALBERT)</text>

  <rect x="55" y="115" width="240" height="35" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="175" y="137" text-anchor="middle" fill="#ffffff" font-size="9">Bidirectional Self-Attention</text>

  <text x="55" y="170" fill="#00ff88" font-size="9" font-weight="bold">Characteristics:</text>
  <text x="55" y="188" fill="#ffffff" font-size="8">• Sees FULL context (left + right)</text>
  <text x="55" y="204" fill="#ffffff" font-size="8">• Cannot generate text</text>
  <text x="55" y="220" fill="#ffffff" font-size="8">• Pre-train: masked language modeling</text>

  <text x="55" y="248" fill="#feca57" font-size="9" font-weight="bold">Best for:</text>
  <text x="55" y="266" fill="#ffffff" font-size="8">• Classification (sentiment, NLI)</text>
  <text x="55" y="282" fill="#ffffff" font-size="8">• Token-level tasks (NER, QA)</text>
  <text x="55" y="298" fill="#ffffff" font-size="8">• Sentence embeddings</text>
  <text x="55" y="314" fill="#ffffff" font-size="8">• Semantic search</text>

  <text x="55" y="345" fill="#aaaaaa" font-size="8">Input: [CLS] The cat sat [SEP]</text>
  <text x="55" y="363" fill="#aaaaaa" font-size="8">Output: contextual embeddings</text>
  <text x="55" y="381" fill="#aaaaaa" font-size="8">for EACH token (understanding)</text>

  <!-- Decoder-only (GPT) -->
  <rect x="350" y="55" width="295" height="340" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="497" y="80" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">Decoder-Only</text>
  <text x="497" y="100" text-anchor="middle" fill="#ffffff" font-size="10">(GPT, LLaMA, Claude, Gemini)</text>

  <rect x="375" y="115" width="240" height="35" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="495" y="137" text-anchor="middle" fill="#ffffff" font-size="9">Causal (Masked) Self-Attention</text>

  <text x="375" y="170" fill="#00ff88" font-size="9" font-weight="bold">Characteristics:</text>
  <text x="375" y="188" fill="#ffffff" font-size="8">• Only sees LEFT context (past)</text>
  <text x="375" y="204" fill="#ffffff" font-size="8">• Generates text autoregressively</text>
  <text x="375" y="220" fill="#ffffff" font-size="8">• Pre-train: next token prediction</text>

  <text x="375" y="248" fill="#feca57" font-size="9" font-weight="bold">Best for:</text>
  <text x="375" y="266" fill="#ffffff" font-size="8">• Text generation (chat, code)</text>
  <text x="375" y="282" fill="#ffffff" font-size="8">• Few-shot learning (in-context)</text>
  <text x="375" y="298" fill="#ffffff" font-size="8">• Reasoning tasks</text>
  <text x="375" y="314" fill="#ffffff" font-size="8">• General-purpose AI assistants</text>

  <text x="375" y="345" fill="#aaaaaa" font-size="8">Input: "The cat sat on"</text>
  <text x="375" y="363" fill="#aaaaaa" font-size="8">Output: "the" (next token)</text>
  <text x="375" y="381" fill="#aaaaaa" font-size="8">Repeat → generates full text</text>

  <!-- Encoder-Decoder (T5) -->
  <rect x="670" y="55" width="300" height="340" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="820" y="80" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">Encoder-Decoder</text>
  <text x="820" y="100" text-anchor="middle" fill="#ffffff" font-size="10">(T5, BART, mBART, Whisper)</text>

  <rect x="695" y="115" width="250" height="35" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="820" y="130" text-anchor="middle" fill="#ffffff" font-size="8">Encoder: Bidirectional</text>
  <text x="820" y="143" text-anchor="middle" fill="#ffffff" font-size="8">Decoder: Causal + Cross-Attention</text>

  <text x="695" y="170" fill="#00ff88" font-size="9" font-weight="bold">Characteristics:</text>
  <text x="695" y="188" fill="#ffffff" font-size="8">• Encoder understands input fully</text>
  <text x="695" y="204" fill="#ffffff" font-size="8">• Decoder generates output</text>
  <text x="695" y="220" fill="#ffffff" font-size="8">• Cross-attention bridges them</text>

  <text x="695" y="248" fill="#feca57" font-size="9" font-weight="bold">Best for:</text>
  <text x="695" y="266" fill="#ffffff" font-size="8">• Translation (input → output)</text>
  <text x="695" y="282" fill="#ffffff" font-size="8">• Summarization</text>
  <text x="695" y="298" fill="#ffffff" font-size="8">• Speech-to-text (Whisper)</text>
  <text x="695" y="314" fill="#ffffff" font-size="8">• Structured prediction</text>

  <text x="695" y="345" fill="#aaaaaa" font-size="8">Input: "Translate: The cat sat"</text>
  <text x="695" y="363" fill="#aaaaaa" font-size="8">Output: "Le chat s'est assis"</text>
  <text x="695" y="381" fill="#aaaaaa" font-size="8">Input/output different lengths</text>

  <!-- Bottom summary -->
  <rect x="30" y="400" width="940" height="12" fill="none"/>
  <text x="500" y="413" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">2024 trend: Decoder-only models dominate (GPT-4, Claude, LLaMA) — they can do everything with enough scale + instruction tuning</text>

  <defs>
    <marker id="varA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
