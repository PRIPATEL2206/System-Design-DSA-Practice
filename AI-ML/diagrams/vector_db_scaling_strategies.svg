<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="580" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Vector Database Scaling — From Prototype to Billions</text>

  <!-- Scale Tiers -->
  <rect x="30" y="55" width="940" height="120" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="500" y="78" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Scale Tiers and Recommended Architecture</text>

  <!-- Tier 1 -->
  <rect x="50" y="90" width="200" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="150" y="110" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Tier 1: &lt;100K vectors</text>
  <text x="150" y="125" text-anchor="middle" fill="#ffffff" font-size="8">In-memory (NumPy/FAISS)</text>
  <text x="150" y="138" text-anchor="middle" fill="#ffffff" font-size="8">ChromaDB / pgvector</text>
  <text x="150" y="151" text-anchor="middle" fill="#aaaaaa" font-size="7">RAM: &lt;1GB | Latency: &lt;5ms</text>

  <!-- Arrow -->
  <line x1="250" y1="125" x2="275" y2="125" stroke="#fff" stroke-width="1.5" marker-end="url(#scaleA)"/>

  <!-- Tier 2 -->
  <rect x="280" y="90" width="200" height="70" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="380" y="110" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Tier 2: 100K-10M vectors</text>
  <text x="380" y="125" text-anchor="middle" fill="#ffffff" font-size="8">Single-node vector DB</text>
  <text x="380" y="138" text-anchor="middle" fill="#ffffff" font-size="8">Pinecone / Qdrant / Weaviate</text>
  <text x="380" y="151" text-anchor="middle" fill="#aaaaaa" font-size="7">RAM: 1-32GB | Latency: 10-30ms</text>

  <!-- Arrow -->
  <line x1="480" y1="125" x2="505" y2="125" stroke="#fff" stroke-width="1.5" marker-end="url(#scaleA)"/>

  <!-- Tier 3 -->
  <rect x="510" y="90" width="210" height="70" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="615" y="110" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Tier 3: 10M-1B vectors</text>
  <text x="615" y="125" text-anchor="middle" fill="#ffffff" font-size="8">Distributed / Sharded</text>
  <text x="615" y="138" text-anchor="middle" fill="#ffffff" font-size="8">Milvus / Pinecone Serverless</text>
  <text x="615" y="151" text-anchor="middle" fill="#aaaaaa" font-size="7">RAM: 64-512GB | Latency: 20-100ms</text>

  <!-- Arrow -->
  <line x1="720" y1="125" x2="745" y2="125" stroke="#fff" stroke-width="1.5" marker-end="url(#scaleA)"/>

  <!-- Tier 4 -->
  <rect x="750" y="90" width="200" height="70" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="850" y="110" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Tier 4: 1B+ vectors</text>
  <text x="850" y="125" text-anchor="middle" fill="#ffffff" font-size="8">Multi-cluster + PQ + disk</text>
  <text x="850" y="138" text-anchor="middle" fill="#ffffff" font-size="8">Milvus / Custom FAISS</text>
  <text x="850" y="151" text-anchor="middle" fill="#aaaaaa" font-size="7">RAM: TB+ | Latency: 50-200ms</text>

  <!-- Sharding Strategy -->
  <rect x="30" y="190" width="460" height="180" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="260" y="215" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Sharding Strategies</text>

  <!-- Hash-based -->
  <rect x="50" y="230" width="130" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="115" y="250" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Hash-Based</text>
  <text x="115" y="265" text-anchor="middle" fill="#aaaaaa" font-size="7">doc_id % N_shards</text>
  <text x="115" y="278" text-anchor="middle" fill="#aaaaaa" font-size="7">Even distribution</text>

  <!-- Metadata-based -->
  <rect x="195" y="230" width="130" height="55" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="260" y="250" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Metadata-Based</text>
  <text x="260" y="265" text-anchor="middle" fill="#aaaaaa" font-size="7">By tenant / region</text>
  <text x="260" y="278" text-anchor="middle" fill="#aaaaaa" font-size="7">Multi-tenant isolation</text>

  <!-- Semantic-based -->
  <rect x="340" y="230" width="130" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="405" y="250" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Semantic-Based</text>
  <text x="405" y="265" text-anchor="middle" fill="#aaaaaa" font-size="7">Cluster vectors first</text>
  <text x="405" y="278" text-anchor="middle" fill="#aaaaaa" font-size="7">Route by centroid</text>

  <!-- Scatter-gather -->
  <rect x="50" y="300" width="420" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="260" y="320" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Query Routing: Scatter-Gather Pattern</text>
  <text x="260" y="338" text-anchor="middle" fill="#ffffff" font-size="8">Query → broadcast to all shards → merge top-K results → re-rank → respond</text>
  <text x="260" y="353" text-anchor="middle" fill="#aaaaaa" font-size="7">Trade-off: latency = slowest shard | throughput = sum of all shards</text>

  <!-- Memory Optimization -->
  <rect x="510" y="190" width="460" height="180" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="740" y="215" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Memory Optimization Techniques</text>

  <!-- Quantization -->
  <rect x="530" y="235" width="200" height="50" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="630" y="255" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Scalar Quantization (SQ)</text>
  <text x="630" y="270" text-anchor="middle" fill="#ffffff" font-size="7">float32 → int8: 4× compression</text>
  <text x="630" y="282" text-anchor="middle" fill="#aaaaaa" font-size="7">Recall loss: &lt;1%</text>

  <!-- PQ -->
  <rect x="750" y="235" width="200" height="50" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="850" y="255" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Product Quantization (PQ)</text>
  <text x="850" y="270" text-anchor="middle" fill="#ffffff" font-size="7">1536d × 4B → 64 bytes: 96× compression</text>
  <text x="850" y="282" text-anchor="middle" fill="#aaaaaa" font-size="7">Recall loss: 5-10%</text>

  <!-- Disk-based -->
  <rect x="530" y="295" width="200" height="50" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="630" y="315" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Disk-Based ANN (DiskANN)</text>
  <text x="630" y="330" text-anchor="middle" fill="#ffffff" font-size="7">Graph on disk, PQ in RAM</text>
  <text x="630" y="342" text-anchor="middle" fill="#aaaaaa" font-size="7">1B vectors on single machine</text>

  <!-- Tiered storage -->
  <rect x="750" y="295" width="200" height="50" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="850" y="315" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Tiered Storage</text>
  <text x="850" y="330" text-anchor="middle" fill="#ffffff" font-size="7">Hot: RAM | Warm: SSD | Cold: S3</text>
  <text x="850" y="342" text-anchor="middle" fill="#aaaaaa" font-size="7">Access pattern-based migration</text>

  <!-- Memory formula -->
  <text x="740" y="365" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Memory Formula: vectors × dimensions × bytes_per_dim + overhead</text>

  <!-- Production Architecture -->
  <rect x="30" y="385" width="940" height="180" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="500" y="410" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Production Architecture — High Availability</text>

  <!-- Load Balancer -->
  <rect x="420" y="425" width="160" height="35" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="4"/>
  <text x="500" y="447" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Load Balancer</text>

  <line x1="420" y1="460" x2="180" y2="480" stroke="#fff" stroke-width="1"/>
  <line x1="500" y1="460" x2="500" y2="480" stroke="#fff" stroke-width="1"/>
  <line x1="580" y1="460" x2="820" y2="480" stroke="#fff" stroke-width="1"/>

  <!-- Replica 1 -->
  <rect x="80" y="480" width="200" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="180" y="500" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Read Replica 1 (Shard 1-3)</text>
  <text x="180" y="515" text-anchor="middle" fill="#aaaaaa" font-size="7">Region: us-east-1</text>

  <!-- Replica 2 -->
  <rect x="400" y="480" width="200" height="40" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="500" y="500" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Read Replica 2 (Shard 1-3)</text>
  <text x="500" y="515" text-anchor="middle" fill="#aaaaaa" font-size="7">Region: eu-west-1</text>

  <!-- Primary -->
  <rect x="720" y="480" width="200" height="40" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="820" y="500" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Primary (Write + Read)</text>
  <text x="820" y="515" text-anchor="middle" fill="#aaaaaa" font-size="7">Region: us-west-2</text>

  <!-- Sync arrows -->
  <line x1="620" y1="500" x2="700" y2="500" stroke="#feca57" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#scaleA)"/>
  <text x="660" y="495" text-anchor="middle" fill="#feca57" font-size="6">async sync</text>

  <!-- Bottom note -->
  <text x="500" y="548" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Key metrics to monitor: QPS, p99 latency, recall@K, index freshness, memory utilization</text>
  <text x="500" y="565" text-anchor="middle" fill="#aaaaaa" font-size="8">Auto-scale policy: scale reads horizontally (replicas), scale writes vertically (bigger nodes)</text>

  <defs>
    <marker id="scaleA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
