<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="550" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="20" font-weight="bold">TensorFlow Model Deployment Pipeline</text>

  <!-- Training Phase -->
  <rect x="30" y="60" width="200" height="80" fill="#0f3460" stroke="#FF6F00" stroke-width="2" rx="10"/>
  <text x="130" y="85" text-anchor="middle" fill="#FF6F00" font-size="13" font-weight="bold">Trained Model</text>
  <text x="130" y="105" text-anchor="middle" fill="#ffffff" font-size="10">model.fit() complete</text>
  <text x="130" y="120" text-anchor="middle" fill="#aaaaaa" font-size="9">Weights optimized</text>
  <text x="130" y="133" text-anchor="middle" fill="#aaaaaa" font-size="9">Validated accuracy OK</text>

  <!-- Arrow down to save formats -->
  <line x1="130" y1="140" x2="130" y2="170" stroke="#FF6F00" stroke-width="2"/>
  <text x="130" y="165" text-anchor="middle" fill="#FF6F00" font-size="10">Save</text>

  <!-- Save Formats -->
  <rect x="30" y="175" width="200" height="80" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="130" y="198" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">SavedModel Format</text>
  <text x="130" y="218" text-anchor="middle" fill="#ffffff" font-size="9">tf.saved_model.save(model, 'path')</text>
  <text x="130" y="235" text-anchor="middle" fill="#aaaaaa" font-size="9">• Computation graph</text>
  <text x="130" y="248" text-anchor="middle" fill="#aaaaaa" font-size="9">• Weights + Signatures</text>

  <!-- Arrows to deployment targets -->
  <line x1="230" y1="195" x2="310" y2="100" stroke="#00d2d3" stroke-width="1.5" marker-end="url(#depArrow1)"/>
  <line x1="230" y1="215" x2="310" y2="215" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#depArrow2)"/>
  <line x1="230" y1="235" x2="310" y2="330" stroke="#e94560" stroke-width="1.5" marker-end="url(#depArrow3)"/>
  <line x1="230" y1="245" x2="310" y2="440" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#depArrow4)"/>

  <!-- Target 1: TF Serving -->
  <rect x="310" y="60" width="300" height="100" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="460" y="83" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">TensorFlow Serving</text>
  <text x="460" y="103" text-anchor="middle" fill="#ffffff" font-size="10">Production server (Docker/K8s)</text>
  <text x="460" y="120" text-anchor="middle" fill="#aaaaaa" font-size="9">• REST API (port 8501)</text>
  <text x="460" y="133" text-anchor="middle" fill="#aaaaaa" font-size="9">• gRPC API (port 8500) — 2x faster</text>
  <text x="460" y="146" text-anchor="middle" fill="#aaaaaa" font-size="9">• Model versioning, A/B testing, batching</text>

  <!-- Arrow to clients -->
  <line x1="610" y1="110" x2="660" y2="110" stroke="#00d2d3" stroke-width="1.5" marker-end="url(#depArrow1)"/>

  <!-- Clients -->
  <rect x="660" y="70" width="160" height="80" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="6"/>
  <text x="740" y="93" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Clients</text>
  <text x="740" y="110" text-anchor="middle" fill="#aaaaaa" font-size="9">Web apps</text>
  <text x="740" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">Microservices</text>
  <text x="740" y="136" text-anchor="middle" fill="#aaaaaa" font-size="9">Batch pipelines</text>

  <!-- Scaling -->
  <rect x="840" y="70" width="130" height="80" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="6"/>
  <text x="905" y="93" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Scale</text>
  <text x="905" y="110" text-anchor="middle" fill="#aaaaaa" font-size="9">Load balancer</text>
  <text x="905" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">Auto-scaling</text>
  <text x="905" y="136" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU clusters</text>

  <!-- Target 2: TF Lite -->
  <rect x="310" y="180" width="300" height="100" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="460" y="203" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">TensorFlow Lite</text>
  <text x="460" y="223" text-anchor="middle" fill="#ffffff" font-size="10">Mobile &amp; Edge deployment</text>
  <text x="460" y="240" text-anchor="middle" fill="#aaaaaa" font-size="9">• Quantization: FP32→INT8 (4x smaller)</text>
  <text x="460" y="253" text-anchor="middle" fill="#aaaaaa" font-size="9">• Optimized kernels for ARM/DSP</text>
  <text x="460" y="266" text-anchor="middle" fill="#aaaaaa" font-size="9">• Android, iOS, Raspberry Pi, Coral</text>

  <line x1="610" y1="230" x2="660" y2="230" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#depArrow2)"/>

  <rect x="660" y="190" width="160" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="6"/>
  <text x="740" y="213" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Devices</text>
  <text x="740" y="230" text-anchor="middle" fill="#aaaaaa" font-size="9">Android phones</text>
  <text x="740" y="243" text-anchor="middle" fill="#aaaaaa" font-size="9">iOS devices</text>
  <text x="740" y="256" text-anchor="middle" fill="#aaaaaa" font-size="9">IoT / Edge TPU</text>

  <!-- Target 3: TF.js -->
  <rect x="310" y="300" width="300" height="100" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="460" y="323" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">TensorFlow.js</text>
  <text x="460" y="343" text-anchor="middle" fill="#ffffff" font-size="10">Browser &amp; Node.js</text>
  <text x="460" y="360" text-anchor="middle" fill="#aaaaaa" font-size="9">• WebGL / WebGPU acceleration</text>
  <text x="460" y="373" text-anchor="middle" fill="#aaaaaa" font-size="9">• Client-side inference (privacy)</text>
  <text x="460" y="386" text-anchor="middle" fill="#aaaaaa" font-size="9">• No server required</text>

  <line x1="610" y1="350" x2="660" y2="350" stroke="#e94560" stroke-width="1.5" marker-end="url(#depArrow3)"/>

  <rect x="660" y="310" width="160" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="6"/>
  <text x="740" y="333" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Platforms</text>
  <text x="740" y="350" text-anchor="middle" fill="#aaaaaa" font-size="9">Chrome / Firefox</text>
  <text x="740" y="363" text-anchor="middle" fill="#aaaaaa" font-size="9">Node.js servers</text>
  <text x="740" y="376" text-anchor="middle" fill="#aaaaaa" font-size="9">Electron apps</text>

  <!-- Target 4: TFX Pipeline -->
  <rect x="310" y="420" width="300" height="100" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="460" y="443" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">TFX (ML Pipeline)</text>
  <text x="460" y="463" text-anchor="middle" fill="#ffffff" font-size="10">End-to-end MLOps</text>
  <text x="460" y="480" text-anchor="middle" fill="#aaaaaa" font-size="9">• Data validation → Transform → Train</text>
  <text x="460" y="493" text-anchor="middle" fill="#aaaaaa" font-size="9">• Model analysis → Push → Monitor</text>
  <text x="460" y="506" text-anchor="middle" fill="#aaaaaa" font-size="9">• Orchestrated with Airflow/Kubeflow</text>

  <line x1="610" y1="470" x2="660" y2="470" stroke="#a29bfe" stroke-width="1.5" marker-end="url(#depArrow4)"/>

  <rect x="660" y="430" width="310" height="80" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="6"/>
  <text x="815" y="453" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Pipeline Components</text>
  <text x="815" y="470" text-anchor="middle" fill="#aaaaaa" font-size="9">ExampleGen → StatisticsGen → SchemaGen</text>
  <text x="815" y="483" text-anchor="middle" fill="#aaaaaa" font-size="9">Transform → Trainer → Evaluator</text>
  <text x="815" y="496" text-anchor="middle" fill="#aaaaaa" font-size="9">InfraValidator → Pusher → Monitor</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="depArrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/></marker>
    <marker id="depArrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#54a0ff"/></marker>
    <marker id="depArrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="depArrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a29bfe"/></marker>
  </defs>
</svg>
