<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="520" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Recommendation System — Two-Stage Architecture</text>

  <!-- Stage 1: Candidate Generation -->
  <rect x="30" y="55" width="490" height="220" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="275" y="78" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Stage 1: Candidate Generation (Fast)</text>
  <text x="275" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">50K items → 1000 candidates | &lt;50ms | Pre-computed</text>

  <!-- Two Tower Model -->
  <rect x="50" y="110" width="200" height="75" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="150" y="130" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Two-Tower Model</text>
  <rect x="65" y="138" width="75" height="35" fill="#16213e" stroke="#54a0ff" stroke-width="1" rx="3"/>
  <text x="102" y="155" text-anchor="middle" fill="#54a0ff" font-size="7">User Tower</text>
  <text x="102" y="167" text-anchor="middle" fill="#aaaaaa" font-size="6">→ 128d emb</text>
  <rect x="155" y="138" width="75" height="35" fill="#16213e" stroke="#00ff88" stroke-width="1" rx="3"/>
  <text x="192" y="155" text-anchor="middle" fill="#00ff88" font-size="7">Item Tower</text>
  <text x="192" y="167" text-anchor="middle" fill="#aaaaaa" font-size="6">→ 128d emb</text>

  <!-- Other signals -->
  <rect x="270" y="110" width="230" height="75" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="385" y="128" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Additional Signals</text>
  <text x="285" y="145" fill="#ffffff" font-size="7">• Collaborative filtering (user-user)</text>
  <text x="285" y="160" fill="#ffffff" font-size="7">• Content-based (item similarity)</text>
  <text x="285" y="175" fill="#ffffff" font-size="7">• Popularity / trending (real-time)</text>

  <!-- ANN Search -->
  <rect x="50" y="200" width="450" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="275" y="218" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">ANN Search (FAISS/ScaNN)</text>
  <text x="65" y="238" fill="#ffffff" font-size="8">User embedding → nearest 1000 item embeddings | Pre-computed hourly</text>
  <text x="65" y="252" fill="#aaaaaa" font-size="7">HNSW index on all 50K items | Refresh embeddings on new interactions</text>

  <!-- Stage 2: Ranking -->
  <rect x="540" y="55" width="480" height="220" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="780" y="78" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Stage 2: Ranking (Precise)</text>
  <text x="780" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">1000 candidates → top 20 | &lt;100ms | Real-time inference</text>

  <!-- Features -->
  <rect x="560" y="110" width="220" height="100" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="670" y="128" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Feature Engineering</text>
  <text x="575" y="145" fill="#54a0ff" font-size="7">User: history, preferences, segment</text>
  <text x="575" y="160" fill="#00ff88" font-size="7">Item: genre, rating, freshness, popularity</text>
  <text x="575" y="175" fill="#a29bfe" font-size="7">Context: time, device, location</text>
  <text x="575" y="190" fill="#e94560" font-size="7">Cross: user_genre × item_genre affinity</text>
  <text x="575" y="205" fill="#aaaaaa" font-size="6">Feature Store: Redis (real-time) + Batch (daily)</text>

  <!-- Model -->
  <rect x="795" y="110" width="210" height="100" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="900" y="128" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Ranking Model</text>
  <text x="810" y="148" fill="#ffffff" font-size="7">Architecture:</text>
  <text x="810" y="163" fill="#ffffff" font-size="7">• Wide &amp; Deep / DeepFM</text>
  <text x="810" y="178" fill="#ffffff" font-size="7">• or LambdaMART (LTR)</text>
  <text x="810" y="195" fill="#aaaaaa" font-size="7">Output: P(click), P(watch)</text>
  <text x="810" y="207" fill="#aaaaaa" font-size="7">Objective: maximize engagement</text>

  <!-- Arrow between stages -->
  <line x1="505" y1="165" x2="535" y2="165" stroke="#ffffff" stroke-width="2" marker-end="url(#rcArr)"/>
  <text x="520" y="157" fill="#feca57" font-size="7">1000</text>
  <text x="513" y="178" fill="#feca57" font-size="7">candidates</text>

  <!-- Stage 3: Post-Processing -->
  <rect x="30" y="290" width="990" height="95" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="525" y="313" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Stage 3: Post-Processing &amp; Business Logic</text>

  <rect x="50" y="325" width="180" height="45" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="140" y="343" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Diversity</text>
  <text x="140" y="360" text-anchor="middle" fill="#aaaaaa" font-size="7">Max 3 per genre/category</text>

  <rect x="250" y="325" width="180" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="340" y="343" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Freshness Boost</text>
  <text x="340" y="360" text-anchor="middle" fill="#aaaaaa" font-size="7">New items get score bonus</text>

  <rect x="450" y="325" width="180" height="45" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="540" y="343" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Business Rules</text>
  <text x="540" y="360" text-anchor="middle" fill="#aaaaaa" font-size="7">Exclude watched, promote originals</text>

  <rect x="650" y="325" width="180" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="740" y="343" text-anchor="middle" fill="#00d2d3" font-size="8" font-weight="bold">A/B Test Split</text>
  <text x="740" y="360" text-anchor="middle" fill="#aaaaaa" font-size="7">Route to experiment variant</text>

  <rect x="850" y="325" width="150" height="45" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="925" y="343" text-anchor="middle" fill="#ff6b6b" font-size="8" font-weight="bold">Explain</text>
  <text x="925" y="360" text-anchor="middle" fill="#aaaaaa" font-size="7">"Because you watched X"</text>

  <!-- Key Challenges -->
  <rect x="30" y="400" width="990" height="100" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="423" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">Key Challenges &amp; Solutions</text>

  <rect x="50" y="435" width="220" height="50" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="160" y="453" text-anchor="middle" fill="#ff6b6b" font-size="8" font-weight="bold">Cold Start (new user/item)</text>
  <text x="65" y="470" fill="#ffffff" font-size="7">→ Popularity fallback + content-based</text>
  <text x="65" y="482" fill="#ffffff" font-size="7">→ Onboarding quiz for preferences</text>

  <rect x="290" y="435" width="220" height="50" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="400" y="453" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Feedback Loops (bias)</text>
  <text x="305" y="470" fill="#ffffff" font-size="7">→ Exploration: inject random items</text>
  <text x="305" y="482" fill="#ffffff" font-size="7">→ Track long-term metrics (not just CTR)</text>

  <rect x="530" y="435" width="220" height="50" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="640" y="453" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Scalability (200M users)</text>
  <text x="545" y="470" fill="#ffffff" font-size="7">→ Pre-compute candidates (batch)</text>
  <text x="545" y="482" fill="#ffffff" font-size="7">→ Real-time ranking only for top-1000</text>

  <rect x="770" y="435" width="230" height="50" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="885" y="453" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Evaluation (what metric?)</text>
  <text x="785" y="470" fill="#ffffff" font-size="7">→ Online: CTR, watch time, retention</text>
  <text x="785" y="482" fill="#ffffff" font-size="7">→ Offline: NDCG@K, recall@K, coverage</text>

  <defs>
    <marker id="rcArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
