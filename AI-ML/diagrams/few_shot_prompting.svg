<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="450" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Few-Shot Prompting — Learning from Examples</text>

  <!-- Example structure -->
  <rect x="30" y="55" width="580" height="370" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="320" y="80" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Few-Shot Prompt Structure</text>

  <!-- Task instruction -->
  <rect x="50" y="95" width="540" height="30" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="60" y="115" fill="#54a0ff" font-size="9" font-weight="bold">Task: Extract entities from customer feedback and classify sentiment.</text>

  <!-- Example 1 -->
  <rect x="50" y="135" width="540" height="60" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="60" y="152" fill="#00ff88" font-size="8" font-weight="bold">Example 1:</text>
  <text x="60" y="167" fill="#ffffff" font-size="7">Input: "The new iPhone camera is amazing but battery life is terrible"</text>
  <text x="60" y="182" fill="#feca57" font-size="7">Output: {"product": "iPhone", "positive": ["camera"], "negative": ["battery life"], "sentiment": "mixed"}</text>

  <!-- Example 2 -->
  <rect x="50" y="205" width="540" height="60" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="60" y="222" fill="#00ff88" font-size="8" font-weight="bold">Example 2:</text>
  <text x="60" y="237" fill="#ffffff" font-size="7">Input: "Worst customer service experience at Comcast, waited 3 hours"</text>
  <text x="60" y="252" fill="#feca57" font-size="7">Output: {"product": "Comcast", "positive": [], "negative": ["customer service", "wait time"], "sentiment": "negative"}</text>

  <!-- Example 3 -->
  <rect x="50" y="275" width="540" height="60" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="60" y="292" fill="#00ff88" font-size="8" font-weight="bold">Example 3:</text>
  <text x="60" y="307" fill="#ffffff" font-size="7">Input: "Tesla Model 3 drives smoothly, great autopilot, love the minimalist interior"</text>
  <text x="60" y="322" fill="#feca57" font-size="7">Output: {"product": "Tesla Model 3", "positive": ["driving", "autopilot", "interior"], "negative": [], "sentiment": "positive"}</text>

  <!-- Actual query -->
  <rect x="50" y="348" width="540" height="55" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="4"/>
  <text x="60" y="367" fill="#e94560" font-size="9" font-weight="bold">Now classify this:</text>
  <text x="60" y="385" fill="#ffffff" font-size="8">Input: "The Samsung Galaxy screen is beautiful but it keeps crashing"</text>
  <text x="60" y="400" fill="#aaaaaa" font-size="8">Output:</text>

  <!-- Tips -->
  <rect x="630" y="55" width="340" height="175" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="8"/>
  <text x="800" y="80" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">Few-Shot Best Practices</text>

  <text x="650" y="105" fill="#ffffff" font-size="8">• 3-5 examples is usually optimal</text>
  <text x="650" y="123" fill="#ffffff" font-size="8">• Cover diverse cases (positive/negative/edge)</text>
  <text x="650" y="141" fill="#ffffff" font-size="8">• Keep examples consistent in format</text>
  <text x="650" y="159" fill="#ffffff" font-size="8">• Order matters: similar examples last</text>
  <text x="650" y="177" fill="#ffffff" font-size="8">• Use real/realistic data, not trivial ones</text>
  <text x="650" y="195" fill="#ffffff" font-size="8">• Include edge cases you expect to see</text>
  <text x="650" y="213" fill="#ffffff" font-size="8">• Balance label distribution in examples</text>

  <!-- When to use -->
  <rect x="630" y="245" width="340" height="180" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="8"/>
  <text x="800" y="270" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold">Shot Count Guide</text>

  <text x="650" y="298" fill="#e94560" font-size="9" font-weight="bold">0-shot:</text>
  <text x="720" y="298" fill="#ffffff" font-size="8">Simple, well-defined tasks</text>

  <text x="650" y="320" fill="#feca57" font-size="9" font-weight="bold">1-shot:</text>
  <text x="720" y="320" fill="#ffffff" font-size="8">Show format once (often enough)</text>

  <text x="650" y="342" fill="#00ff88" font-size="9" font-weight="bold">3-shot:</text>
  <text x="720" y="342" fill="#ffffff" font-size="8">Standard for most tasks</text>

  <text x="650" y="364" fill="#00d2d3" font-size="9" font-weight="bold">5-8 shot:</text>
  <text x="720" y="364" fill="#ffffff" font-size="8">Complex/nuanced classification</text>

  <text x="650" y="386" fill="#a29bfe" font-size="9" font-weight="bold">10+ shot:</text>
  <text x="720" y="386" fill="#ffffff" font-size="8">Diminishing returns (fine-tune instead)</text>

  <text x="650" y="415" fill="#aaaaaa" font-size="8">More examples ≠ always better</text>
  <text x="650" y="430" fill="#aaaaaa" font-size="8">Quality &gt; Quantity. Diversity &gt; Volume.</text>

  <!-- Bottom insight -->
  <text x="500" y="445" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Few-shot prompting is the cheapest form of "training" — adapt LLM behavior without any fine-tuning</text>
</svg>
