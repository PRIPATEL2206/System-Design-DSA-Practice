<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="500" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">RNN Architectures for Different Sequence Tasks</text>

  <!-- One-to-Many -->
  <rect x="30" y="55" width="185" height="200" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="122" y="78" text-anchor="middle" fill="#e94560" font-size="11" font-weight="bold">One-to-Many</text>
  <text x="122" y="95" text-anchor="middle" fill="#aaaaaa" font-size="9">Image Captioning</text>

  <!-- Single input -->
  <rect x="60" y="180" width="40" height="30" fill="#00ff88" opacity="0.5" rx="4"/>
  <text x="80" y="200" text-anchor="middle" fill="#fff" font-size="8">img</text>

  <!-- Cells -->
  <rect x="55" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="95" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="135" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="175" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>

  <!-- Arrows between cells -->
  <line x1="90" y1="142" x2="95" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="130" y1="142" x2="135" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="170" y1="142" x2="175" y2="142" stroke="#fff" stroke-width="1"/>

  <!-- Input arrow -->
  <line x1="80" y1="180" x2="72" y2="155" stroke="#00ff88" stroke-width="1.5" marker-end="url(#seqA)"/>

  <!-- Outputs -->
  <rect x="55" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="95" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="135" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="175" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <text x="72" y="117" text-anchor="middle" fill="#fff" font-size="7">A</text>
  <text x="112" y="117" text-anchor="middle" fill="#fff" font-size="7">cat</text>
  <text x="152" y="117" text-anchor="middle" fill="#fff" font-size="7">sits</text>
  <text x="192" y="117" text-anchor="middle" fill="#fff" font-size="7">...</text>

  <!-- Many-to-One -->
  <rect x="230" y="55" width="185" height="200" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="322" y="78" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">Many-to-One</text>
  <text x="322" y="95" text-anchor="middle" fill="#aaaaaa" font-size="9">Sentiment Analysis</text>

  <!-- Cells -->
  <rect x="255" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="295" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="335" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="375" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>

  <line x1="290" y1="142" x2="295" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="330" y1="142" x2="335" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="370" y1="142" x2="375" y2="142" stroke="#fff" stroke-width="1"/>

  <!-- Multiple inputs -->
  <rect x="255" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="295" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="335" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="375" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <text x="272" y="183" text-anchor="middle" fill="#fff" font-size="7">This</text>
  <text x="312" y="183" text-anchor="middle" fill="#fff" font-size="7">is</text>
  <text x="352" y="183" text-anchor="middle" fill="#fff" font-size="7">great</text>
  <text x="392" y="183" text-anchor="middle" fill="#fff" font-size="7">!</text>

  <!-- Single output -->
  <rect x="375" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <text x="392" y="117" text-anchor="middle" fill="#fff" font-size="7">pos</text>
  <line x1="392" y1="130" x2="392" y2="123" stroke="#00d2d3" stroke-width="1.5" marker-end="url(#seqA)"/>

  <!-- Many-to-Many (same length) -->
  <rect x="430" y="55" width="185" height="200" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="522" y="78" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">Many-to-Many</text>
  <text x="522" y="95" text-anchor="middle" fill="#aaaaaa" font-size="9">NER / POS Tagging</text>

  <!-- Cells -->
  <rect x="455" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="495" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="535" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <rect x="575" y="130" width="35" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>

  <line x1="490" y1="142" x2="495" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="530" y1="142" x2="535" y2="142" stroke="#fff" stroke-width="1"/>
  <line x1="570" y1="142" x2="575" y2="142" stroke="#fff" stroke-width="1"/>

  <!-- Inputs -->
  <rect x="455" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="495" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="535" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <rect x="575" y="170" width="35" height="18" fill="#00ff88" opacity="0.5" rx="3"/>
  <text x="472" y="183" text-anchor="middle" fill="#fff" font-size="7">John</text>
  <text x="512" y="183" text-anchor="middle" fill="#fff" font-size="7">lives</text>
  <text x="552" y="183" text-anchor="middle" fill="#fff" font-size="7">in</text>
  <text x="592" y="183" text-anchor="middle" fill="#fff" font-size="7">NYC</text>

  <!-- Outputs (one per input) -->
  <rect x="455" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="495" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="535" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <rect x="575" y="105" width="35" height="18" fill="#00d2d3" opacity="0.5" rx="3"/>
  <text x="472" y="117" text-anchor="middle" fill="#fff" font-size="7">PER</text>
  <text x="512" y="117" text-anchor="middle" fill="#fff" font-size="7">O</text>
  <text x="552" y="117" text-anchor="middle" fill="#fff" font-size="7">O</text>
  <text x="592" y="117" text-anchor="middle" fill="#fff" font-size="7">LOC</text>

  <!-- Encoder-Decoder (Seq2Seq) -->
  <rect x="630" y="55" width="340" height="200" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="800" y="78" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Encoder-Decoder (Seq2Seq)</text>
  <text x="800" y="95" text-anchor="middle" fill="#aaaaaa" font-size="9">Machine Translation</text>

  <!-- Encoder cells -->
  <rect x="655" y="140" width="30" height="22" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="3"/>
  <rect x="690" y="140" width="30" height="22" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="3"/>
  <rect x="725" y="140" width="30" height="22" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="3"/>
  <text x="705" y="135" text-anchor="middle" fill="#e94560" font-size="8">Encoder</text>

  <line x1="685" y1="151" x2="690" y2="151" stroke="#fff" stroke-width="1"/>
  <line x1="720" y1="151" x2="725" y2="151" stroke="#fff" stroke-width="1"/>

  <!-- Encoder inputs -->
  <text x="670" y="178" text-anchor="middle" fill="#00ff88" font-size="7">Hola</text>
  <text x="705" y="178" text-anchor="middle" fill="#00ff88" font-size="7">que</text>
  <text x="740" y="178" text-anchor="middle" fill="#00ff88" font-size="7">tal</text>

  <!-- Context vector -->
  <circle cx="780" cy="151" r="10" fill="#feca57" opacity="0.5" stroke="#feca57" stroke-width="1.5"/>
  <text x="780" y="155" text-anchor="middle" fill="#fff" font-size="7">ctx</text>
  <line x1="755" y1="151" x2="770" y2="151" stroke="#feca57" stroke-width="1.5" marker-end="url(#seqA)"/>

  <!-- Decoder cells -->
  <rect x="830" y="140" width="30" height="22" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="3"/>
  <rect x="865" y="140" width="30" height="22" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="3"/>
  <rect x="900" y="140" width="30" height="22" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="3"/>
  <text x="880" y="135" text-anchor="middle" fill="#54a0ff" font-size="8">Decoder</text>

  <line x1="790" y1="151" x2="830" y2="151" stroke="#feca57" stroke-width="1.5" marker-end="url(#seqA)"/>
  <line x1="860" y1="151" x2="865" y2="151" stroke="#fff" stroke-width="1"/>
  <line x1="895" y1="151" x2="900" y2="151" stroke="#fff" stroke-width="1"/>

  <!-- Decoder outputs -->
  <text x="845" y="125" text-anchor="middle" fill="#00d2d3" font-size="7">Hi</text>
  <text x="880" y="125" text-anchor="middle" fill="#00d2d3" font-size="7">how</text>
  <text x="915" y="125" text-anchor="middle" fill="#00d2d3" font-size="7">are</text>

  <!-- Bidirectional RNN -->
  <rect x="30" y="275" width="460" height="205" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="260" y="298" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">Bidirectional RNN — Context from Both Directions</text>

  <!-- Forward cells -->
  <text x="60" y="330" fill="#54a0ff" font-size="10">Forward →</text>
  <rect x="140" y="318" width="55" height="25" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <rect x="210" y="318" width="55" height="25" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <rect x="280" y="318" width="55" height="25" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <rect x="350" y="318" width="55" height="25" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>

  <line x1="195" y1="330" x2="210" y2="330" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#seqA)"/>
  <line x1="265" y1="330" x2="280" y2="330" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#seqA)"/>
  <line x1="335" y1="330" x2="350" y2="330" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#seqA)"/>

  <!-- Backward cells -->
  <text x="60" y="380" fill="#e94560" font-size="10">← Backward</text>
  <rect x="140" y="365" width="55" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <rect x="210" y="365" width="55" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <rect x="280" y="365" width="55" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <rect x="350" y="365" width="55" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>

  <line x1="280" y1="377" x2="265" y2="377" stroke="#e94560" stroke-width="1.5" marker-end="url(#seqA)"/>
  <line x1="210" y1="377" x2="195" y2="377" stroke="#e94560" stroke-width="1.5" marker-end="url(#seqA)"/>
  <line x1="350" y1="377" x2="335" y2="377" stroke="#e94560" stroke-width="1.5" marker-end="url(#seqA)"/>

  <!-- Inputs -->
  <text x="167" y="415" text-anchor="middle" fill="#00ff88" font-size="9">The</text>
  <text x="237" y="415" text-anchor="middle" fill="#00ff88" font-size="9">bank</text>
  <text x="307" y="415" text-anchor="middle" fill="#00ff88" font-size="9">of</text>
  <text x="377" y="415" text-anchor="middle" fill="#00ff88" font-size="9">river</text>

  <!-- Combined outputs -->
  <text x="237" y="455" text-anchor="middle" fill="#feca57" font-size="9">"bank" = riverbank (not financial)</text>
  <text x="237" y="470" text-anchor="middle" fill="#aaaaaa" font-size="8">Uses BOTH left context "The" AND right context "of river"</text>

  <!-- Use cases -->
  <rect x="510" y="275" width="460" height="205" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="8"/>
  <text x="740" y="300" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">When to Use Which Architecture</text>

  <text x="540" y="330" fill="#e94560" font-size="10" font-weight="bold">One-to-Many:</text>
  <text x="540" y="348" fill="#ffffff" font-size="9">Image captioning, Music generation</text>

  <text x="540" y="372" fill="#feca57" font-size="10" font-weight="bold">Many-to-One:</text>
  <text x="540" y="390" fill="#ffffff" font-size="9">Sentiment analysis, Document classification</text>

  <text x="540" y="414" fill="#00d2d3" font-size="10" font-weight="bold">Many-to-Many (synced):</text>
  <text x="540" y="432" fill="#ffffff" font-size="9">NER, POS tagging, Video frame labeling</text>

  <text x="540" y="456" fill="#00ff88" font-size="10" font-weight="bold">Encoder-Decoder:</text>
  <text x="540" y="474" fill="#ffffff" font-size="9">Translation, Summarization, Chatbots</text>

  <text x="790" y="330" fill="#a29bfe" font-size="10" font-weight="bold">Bidirectional:</text>
  <text x="790" y="348" fill="#ffffff" font-size="9">Any task where full</text>
  <text x="790" y="366" fill="#ffffff" font-size="9">context is available at</text>
  <text x="790" y="384" fill="#ffffff" font-size="9">inference (NOT generation)</text>
  <text x="790" y="404" fill="#aaaaaa" font-size="8">✓ NER, classification</text>
  <text x="790" y="420" fill="#aaaaaa" font-size="8">✗ Language modeling, translation</text>

  <defs>
    <marker id="seqA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
