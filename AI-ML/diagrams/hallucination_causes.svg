<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="480" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">LLM Hallucinations — Causes, Types, and Mitigation</text>

  <!-- What are hallucinations -->
  <rect x="30" y="55" width="940" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="8"/>
  <text x="500" y="78" text-anchor="middle" fill="#e94560" font-size="11" font-weight="bold">Hallucination: When an LLM generates text that is fluent and confident but factually incorrect or fabricated</text>
  <text x="500" y="98" text-anchor="middle" fill="#aaaaaa" font-size="9">Not a bug — it's a fundamental consequence of how language models work (statistical pattern matching, not knowledge retrieval)</text>

  <!-- Types of hallucinations -->
  <rect x="30" y="125" width="460" height="170" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="260" y="150" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Types of Hallucinations</text>

  <text x="50" y="175" fill="#e94560" font-size="9" font-weight="bold">1. Factual Hallucination</text>
  <text x="50" y="192" fill="#ffffff" font-size="8">Stating false facts confidently: "The Eiffel Tower is 500m tall"</text>

  <text x="50" y="215" fill="#a29bfe" font-size="9" font-weight="bold">2. Fabrication</text>
  <text x="50" y="232" fill="#ffffff" font-size="8">Inventing citations, people, events that don't exist</text>

  <text x="50" y="255" fill="#00d2d3" font-size="9" font-weight="bold">3. Instruction Hallucination</text>
  <text x="50" y="272" fill="#ffffff" font-size="8">Ignoring constraints or adding unrequested information</text>

  <text x="50" y="295" fill="#54a0ff" font-size="9" font-weight="bold">4. Context Hallucination</text>
  <text x="50" y="312" fill="#ffffff" font-size="8">Misrepresenting provided context or documents</text>

  <!-- Causes -->
  <rect x="510" y="125" width="460" height="170" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="740" y="150" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Root Causes</text>

  <text x="530" y="175" fill="#e94560" font-size="9" font-weight="bold">Training Data Issues:</text>
  <text x="530" y="192" fill="#ffffff" font-size="8">• Outdated/incorrect information in corpus</text>
  <text x="530" y="209" fill="#ffffff" font-size="8">• Conflicting facts from different sources</text>

  <text x="530" y="232" fill="#feca57" font-size="9" font-weight="bold">Architecture Limitations:</text>
  <text x="530" y="249" fill="#ffffff" font-size="8">• Compresses knowledge into parameters (lossy)</text>
  <text x="530" y="266" fill="#ffffff" font-size="8">• Optimized for plausibility, not factuality</text>

  <text x="530" y="289" fill="#00ff88" font-size="9" font-weight="bold">Decoding Issues:</text>
  <text x="530" y="306" fill="#ffffff" font-size="8">• Temperature &gt; 0 introduces randomness</text>
  <text x="530" y="323" fill="#ffffff" font-size="8">• Autoregressive trap: must continue after errors</text>

  <!-- Mitigation strategies -->
  <rect x="30" y="310" width="940" height="155" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="500" y="335" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">Mitigation Strategies</text>

  <!-- Strategy 1 -->
  <rect x="50" y="350" width="170" height="95" fill="#16213e" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="135" y="372" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">RAG</text>
  <text x="135" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Retrieval-Augmented</text>
  <text x="135" y="402" text-anchor="middle" fill="#ffffff" font-size="7">Generation</text>
  <text x="135" y="422" text-anchor="middle" fill="#aaaaaa" font-size="7">Ground responses in</text>
  <text x="135" y="436" text-anchor="middle" fill="#aaaaaa" font-size="7">retrieved documents</text>

  <!-- Strategy 2 -->
  <rect x="240" y="350" width="170" height="95" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="325" y="372" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Chain-of-Thought</text>
  <text x="325" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Step-by-step reasoning</text>
  <text x="325" y="402" text-anchor="middle" fill="#ffffff" font-size="7">makes errors visible</text>
  <text x="325" y="422" text-anchor="middle" fill="#aaaaaa" font-size="7">Easier to verify each</text>
  <text x="325" y="436" text-anchor="middle" fill="#aaaaaa" font-size="7">logical step</text>

  <!-- Strategy 3 -->
  <rect x="430" y="350" width="170" height="95" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="515" y="372" text-anchor="middle" fill="#00d2d3" font-size="9" font-weight="bold">Self-Consistency</text>
  <text x="515" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Sample multiple answers</text>
  <text x="515" y="402" text-anchor="middle" fill="#ffffff" font-size="7">take majority vote</text>
  <text x="515" y="422" text-anchor="middle" fill="#aaaaaa" font-size="7">Inconsistent answers</text>
  <text x="515" y="436" text-anchor="middle" fill="#aaaaaa" font-size="7">flag likely hallucinations</text>

  <!-- Strategy 4 -->
  <rect x="620" y="350" width="170" height="95" fill="#16213e" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="705" y="372" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Tool Use / Grounding</text>
  <text x="705" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Calculator, search, DB</text>
  <text x="705" y="402" text-anchor="middle" fill="#ffffff" font-size="7">for verifiable facts</text>
  <text x="705" y="422" text-anchor="middle" fill="#aaaaaa" font-size="7">Offload factual queries</text>
  <text x="705" y="436" text-anchor="middle" fill="#aaaaaa" font-size="7">to authoritative sources</text>

  <!-- Strategy 5 -->
  <rect x="810" y="350" width="150" height="95" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="885" y="372" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">RLHF / DPO</text>
  <text x="885" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Train model to say</text>
  <text x="885" y="402" text-anchor="middle" fill="#ffffff" font-size="7">"I don't know"</text>
  <text x="885" y="422" text-anchor="middle" fill="#aaaaaa" font-size="7">Reward honesty over</text>
  <text x="885" y="436" text-anchor="middle" fill="#aaaaaa" font-size="7">confident BS</text>

  <!-- Bottom insight -->
  <rect x="30" y="470" width="940" height="5" fill="none"/>
  <text x="500" y="475" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Key insight: Hallucination cannot be fully eliminated — LLMs are probabilistic text generators, not knowledge databases</text>

  <defs>
    <marker id="halA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
