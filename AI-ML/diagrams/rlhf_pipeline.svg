<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="520" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">RLHF &amp; DPO — Aligning LLMs with Human Preferences</text>

  <!-- RLHF Pipeline (3 stages) -->
  <rect x="30" y="55" width="990" height="230" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="78" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">RLHF Pipeline — Three Stages</text>

  <!-- Stage 1: SFT -->
  <rect x="50" y="95" width="280" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="6"/>
  <text x="190" y="115" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Stage 1: Supervised Fine-Tuning</text>
  <text x="70" y="135" fill="#ffffff" font-size="8">Base LLM + instruction dataset</text>
  <text x="70" y="150" fill="#ffffff" font-size="8">→ model learns to follow instructions</text>
  <text x="70" y="165" fill="#aaaaaa" font-size="7">Output: SFT Model (helpful but unrefined)</text>

  <line x1="335" y1="135" x2="365" y2="135" stroke="#fff" stroke-width="1.5" marker-end="url(#rlArr)"/>

  <!-- Stage 2: Reward Model -->
  <rect x="370" y="95" width="280" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="6"/>
  <text x="510" y="115" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Stage 2: Reward Model Training</text>
  <text x="390" y="135" fill="#ffffff" font-size="8">SFT generates multiple responses</text>
  <text x="390" y="150" fill="#ffffff" font-size="8">Humans rank: A > B > C</text>
  <text x="390" y="165" fill="#aaaaaa" font-size="7">Output: Reward Model (scores responses)</text>

  <line x1="655" y1="135" x2="685" y2="135" stroke="#fff" stroke-width="1.5" marker-end="url(#rlArr)"/>

  <!-- Stage 3: PPO -->
  <rect x="690" y="95" width="280" height="80" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="830" y="115" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Stage 3: PPO Optimization</text>
  <text x="710" y="135" fill="#ffffff" font-size="8">Policy generates → RM scores</text>
  <text x="710" y="150" fill="#ffffff" font-size="8">PPO maximizes reward</text>
  <text x="710" y="165" fill="#aaaaaa" font-size="7">+ KL penalty (don't drift from SFT)</text>

  <!-- Human feedback illustration -->
  <rect x="50" y="190" width="920" height="80" fill="#0f3460" rx="6"/>
  <text x="525" y="212" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Human Ranking Example</text>

  <text x="70" y="232" fill="#aaaaaa" font-size="8">Prompt: "Explain quantum computing simply"</text>

  <rect x="70" y="240" width="270" height="22" fill="#2e7d32" rx="3" opacity="0.3"/>
  <text x="80" y="255" fill="#00ff88" font-size="8">✓ Response A (Chosen): "Think of it like a coin spinning..."</text>

  <rect x="360" y="240" width="270" height="22" fill="#c62828" rx="3" opacity="0.3"/>
  <text x="370" y="255" fill="#ff6b6b" font-size="8">✗ Response B (Rejected): "Quantum mechanics utilizes superpos..."</text>

  <text x="660" y="255" fill="#aaaaaa" font-size="8">→ Human prefers A (clearer, simpler)</text>

  <!-- DPO Section -->
  <rect x="30" y="300" width="490" height="200" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="275" y="323" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">DPO — Direct Preference Optimization</text>
  <text x="275" y="342" text-anchor="middle" fill="#aaaaaa" font-size="9">(RLHF without the RL!)</text>

  <!-- DPO flow -->
  <rect x="55" y="355" width="130" height="40" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="120" y="372" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">SFT Model</text>
  <text x="120" y="387" text-anchor="middle" fill="#aaaaaa" font-size="7">(starting point)</text>

  <line x1="190" y1="375" x2="220" y2="375" stroke="#fff" stroke-width="1.5" marker-end="url(#rlArr)"/>

  <rect x="225" y="355" width="130" height="40" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="290" y="372" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Preference Data</text>
  <text x="290" y="387" text-anchor="middle" fill="#aaaaaa" font-size="7">(chosen, rejected)</text>

  <line x1="360" y1="375" x2="390" y2="375" stroke="#fff" stroke-width="1.5" marker-end="url(#rlArr)"/>

  <rect x="395" y="355" width="100" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="4"/>
  <text x="445" y="372" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">DPO Loss</text>
  <text x="445" y="387" text-anchor="middle" fill="#aaaaaa" font-size="7">direct optimize</text>

  <!-- DPO formula -->
  <rect x="55" y="405" width="440" height="35" fill="#0f3460" rx="4"/>
  <text x="275" y="420" text-anchor="middle" fill="#ffffff" font-size="8">Loss = -log σ(β × (log π(y_w|x) - log π(y_l|x) - log π_ref(y_w|x) + log π_ref(y_l|x)))</text>
  <text x="275" y="435" text-anchor="middle" fill="#aaaaaa" font-size="7">Directly optimizes policy to prefer chosen (y_w) over rejected (y_l)</text>

  <!-- No RM needed -->
  <text x="275" y="480" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">No reward model needed! No PPO instability! Standard supervised training.</text>

  <!-- Comparison table -->
  <rect x="540" y="300" width="480" height="200" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="780" y="323" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">RLHF vs DPO Comparison</text>

  <!-- Table -->
  <rect x="560" y="340" width="440" height="22" fill="#0f3460" rx="3"/>
  <text x="650" y="355" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="bold">Aspect</text>
  <text x="790" y="355" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">RLHF (PPO)</text>
  <text x="930" y="355" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">DPO</text>

  <text x="650" y="378" text-anchor="middle" fill="#aaaaaa" font-size="8">Models needed</text>
  <text x="790" y="378" text-anchor="middle" fill="#ffffff" font-size="8">3 (policy+reward+ref)</text>
  <text x="930" y="378" text-anchor="middle" fill="#ffffff" font-size="8">2 (policy+ref)</text>

  <text x="650" y="398" text-anchor="middle" fill="#aaaaaa" font-size="8">Stability</text>
  <text x="790" y="398" text-anchor="middle" fill="#ff6b6b" font-size="8">Tricky (reward hacking)</text>
  <text x="930" y="398" text-anchor="middle" fill="#00ff88" font-size="8">Stable</text>

  <text x="650" y="418" text-anchor="middle" fill="#aaaaaa" font-size="8">Complexity</text>
  <text x="790" y="418" text-anchor="middle" fill="#ff6b6b" font-size="8">High</text>
  <text x="930" y="418" text-anchor="middle" fill="#00ff88" font-size="8">Low (supervised)</text>

  <text x="650" y="438" text-anchor="middle" fill="#aaaaaa" font-size="8">Quality at scale</text>
  <text x="790" y="438" text-anchor="middle" fill="#00ff88" font-size="8">Slightly better</text>
  <text x="930" y="438" text-anchor="middle" fill="#feca57" font-size="8">Comparable</text>

  <text x="650" y="458" text-anchor="middle" fill="#aaaaaa" font-size="8">Used by</text>
  <text x="790" y="458" text-anchor="middle" fill="#ffffff" font-size="8">OpenAI, Anthropic</text>
  <text x="930" y="458" text-anchor="middle" fill="#ffffff" font-size="8">Meta, HuggingFace</text>

  <text x="650" y="478" text-anchor="middle" fill="#aaaaaa" font-size="8">GPU memory</text>
  <text x="790" y="478" text-anchor="middle" fill="#ff6b6b" font-size="8">3× model size</text>
  <text x="930" y="478" text-anchor="middle" fill="#00ff88" font-size="8">2× model size</text>

  <text x="780" y="498" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Recommendation: Start with DPO. Use RLHF only at GPT-4/Claude scale.</text>

  <defs>
    <marker id="rlArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
