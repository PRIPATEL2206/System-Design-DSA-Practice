<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="500" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Gradient Descent — Finding the Minimum</text>

  <!-- Left: 2D Loss Curve -->
  <text x="250" y="65" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">1D Loss Landscape</text>

  <!-- Axes -->
  <line x1="60" y1="380" x2="450" y2="380" stroke="#666666" stroke-width="1"/>
  <line x1="60" y1="380" x2="60" y2="90" stroke="#666666" stroke-width="1"/>
  <text x="250" y="410" text-anchor="middle" fill="#aaaaaa" font-size="11">Weight (w)</text>
  <text x="40" y="230" text-anchor="middle" fill="#aaaaaa" font-size="11" transform="rotate(-90, 40, 230)">Loss</text>

  <!-- Loss curve -->
  <path d="M 80 150 Q 120 200 150 280 Q 170 330 200 350 Q 230 360 260 350 Q 280 340 290 320 Q 310 280 330 250 Q 350 230 370 250 Q 390 280 410 320 Q 430 350 440 360" fill="none" stroke="#54a0ff" stroke-width="2.5"/>

  <!-- Gradient descent steps -->
  <circle cx="120" cy="200" r="6" fill="#e94560"/>
  <text x="120" y="190" text-anchor="middle" fill="#e94560" font-size="9">Start</text>

  <line x1="126" y1="203" x2="155" y2="278" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrowR)"/>
  <circle cx="160" cy="290" r="5" fill="#feca57"/>

  <line x1="165" y1="295" x2="195" y2="345" stroke="#feca57" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrowY)"/>
  <circle cx="200" cy="350" r="5" fill="#00d2d3"/>

  <line x1="206" y1="352" x2="240" y2="358" stroke="#00d2d3" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrowC)"/>
  <circle cx="250" cy="358" r="5" fill="#00ff00"/>

  <text x="250" y="375" text-anchor="middle" fill="#00ff00" font-size="9">Local min</text>

  <!-- Annotations -->
  <text x="130" y="235" fill="#ffffff" font-size="9">Large gradient</text>
  <text x="130" y="247" fill="#ffffff" font-size="9">= big step</text>
  <text x="210" y="330" fill="#ffffff" font-size="9">Small gradient</text>
  <text x="210" y="342" fill="#ffffff" font-size="9">= small step</text>

  <!-- Right: Learning Rate Effect -->
  <text x="730" y="65" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Learning Rate Effect</text>

  <!-- Too small -->
  <rect x="530" y="85" width="140" height="160" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="600" y="105" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">η too small</text>
  <!-- Tiny steps on curve -->
  <path d="M 550 200 Q 575 220 600 230 Q 625 220 650 200" fill="none" stroke="#444444" stroke-width="1.5"/>
  <circle cx="555" cy="202" r="3" fill="#00d2d3"/>
  <circle cx="560" cy="207" r="3" fill="#00d2d3"/>
  <circle cx="565" cy="211" r="3" fill="#00d2d3"/>
  <circle cx="570" cy="215" r="3" fill="#00d2d3"/>
  <circle cx="575" cy="218" r="3" fill="#00d2d3"/>
  <text x="600" y="235" text-anchor="middle" fill="#aaaaaa" font-size="9">Many tiny steps</text>
  <text x="600" y="235" text-anchor="middle" fill="#ff6b6b" font-size="9" dy="10">⚠️ Very slow</text>

  <!-- Just right -->
  <rect x="690" y="85" width="140" height="160" fill="#16213e" stroke="#00ff00" stroke-width="1.5" rx="6"/>
  <text x="760" y="105" text-anchor="middle" fill="#00ff00" font-size="11" font-weight="bold">η just right</text>
  <path d="M 710 200 Q 735 220 760 230 Q 785 220 810 200" fill="none" stroke="#444444" stroke-width="1.5"/>
  <circle cx="715" cy="202" r="3" fill="#00ff00"/>
  <circle cx="730" cy="213" r="3" fill="#00ff00"/>
  <circle cx="748" cy="225" r="3" fill="#00ff00"/>
  <circle cx="760" cy="230" r="4" fill="#00ff00"/>
  <text x="760" y="235" text-anchor="middle" fill="#aaaaaa" font-size="9" dy="5">Converges well</text>

  <!-- Too large -->
  <rect x="850" y="85" width="130" height="160" fill="#16213e" stroke="#ff6b6b" stroke-width="1.5" rx="6"/>
  <text x="915" y="105" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">η too large</text>
  <path d="M 870 200 Q 895 220 915 230 Q 935 220 960 200" fill="none" stroke="#444444" stroke-width="1.5"/>
  <circle cx="880" cy="205" r="3" fill="#ff6b6b"/>
  <circle cx="950" cy="205" r="3" fill="#ff6b6b"/>
  <circle cx="870" cy="195" r="3" fill="#ff6b6b"/>
  <circle cx="960" cy="190" r="3" fill="#ff6b6b"/>
  <text x="915" y="235" text-anchor="middle" fill="#aaaaaa" font-size="9" dy="5">Overshoots!</text>
  <text x="915" y="235" text-anchor="middle" fill="#ff6b6b" font-size="9" dy="15">⚠️ Diverges</text>

  <!-- Types of Gradient Descent -->
  <rect x="530" y="270" width="450" height="210" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="755" y="295" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Types of Gradient Descent</text>

  <!-- Batch GD -->
  <rect x="550" y="310" width="130" height="80" fill="#16213e" stroke="#e94560" stroke-width="1" rx="5"/>
  <text x="615" y="330" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Batch GD</text>
  <text x="615" y="348" text-anchor="middle" fill="#ffffff" font-size="9">ALL samples</text>
  <text x="615" y="363" text-anchor="middle" fill="#ffffff" font-size="9">per update</text>
  <text x="615" y="383" text-anchor="middle" fill="#aaaaaa" font-size="8">Stable but slow</text>

  <!-- Mini-batch GD -->
  <rect x="695" y="310" width="130" height="80" fill="#16213e" stroke="#00ff00" stroke-width="2" rx="5"/>
  <text x="760" y="330" text-anchor="middle" fill="#00ff00" font-size="10" font-weight="bold">Mini-batch ⭐</text>
  <text x="760" y="348" text-anchor="middle" fill="#ffffff" font-size="9">32-512 samples</text>
  <text x="760" y="363" text-anchor="middle" fill="#ffffff" font-size="9">per update</text>
  <text x="760" y="383" text-anchor="middle" fill="#aaaaaa" font-size="8">Best trade-off</text>

  <!-- SGD -->
  <rect x="840" y="310" width="130" height="80" fill="#16213e" stroke="#54a0ff" stroke-width="1" rx="5"/>
  <text x="905" y="330" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Stochastic GD</text>
  <text x="905" y="348" text-anchor="middle" fill="#ffffff" font-size="9">1 sample</text>
  <text x="905" y="363" text-anchor="middle" fill="#ffffff" font-size="9">per update</text>
  <text x="905" y="383" text-anchor="middle" fill="#aaaaaa" font-size="8">Fast but noisy</text>

  <!-- Key insight -->
  <text x="755" y="420" text-anchor="middle" fill="#ffffff" font-size="11">In practice: Mini-batch (32-256) with Adam optimizer</text>
  <text x="755" y="440" text-anchor="middle" fill="#aaaaaa" font-size="10">Batch size affects: memory usage, training speed, generalization</text>
  <text x="755" y="460" text-anchor="middle" fill="#aaaaaa" font-size="10">Larger batch → more stable gradients but worse generalization</text>

  <!-- Bottom formula box -->
  <rect x="50" y="430" width="450" height="55" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="6"/>
  <text x="275" y="452" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">The Update Rule</text>
  <text x="275" y="472" text-anchor="middle" fill="#ffffff" font-size="12">w_new = w_old - learning_rate × gradient(Loss, w)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e94560"/>
    </marker>
    <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#feca57"/>
    </marker>
    <marker id="arrowC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/>
    </marker>
  </defs>
</svg>
