<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="450" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Deep Learning Training Pipeline — Complete Loop</text>

  <!-- Main Loop -->
  <!-- Step 1: Data -->
  <rect x="30" y="70" width="150" height="70" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="105" y="97" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">1. Load Data</text>
  <text x="105" y="117" text-anchor="middle" fill="#aaaaaa" font-size="9">DataLoader → batch</text>
  <text x="105" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">(X_batch, y_batch)</text>

  <!-- Arrow -->
  <line x1="180" y1="105" x2="220" y2="105" stroke="#e94560" stroke-width="2" marker-end="url(#aR)"/>

  <!-- Step 2: Forward -->
  <rect x="220" y="70" width="150" height="70" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="295" y="97" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">2. Forward Pass</text>
  <text x="295" y="117" text-anchor="middle" fill="#aaaaaa" font-size="9">ŷ = model(X_batch)</text>
  <text x="295" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">Compute prediction</text>

  <!-- Arrow -->
  <line x1="370" y1="105" x2="410" y2="105" stroke="#00d2d3" stroke-width="2" marker-end="url(#aC)"/>

  <!-- Step 3: Loss -->
  <rect x="410" y="70" width="150" height="70" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="485" y="97" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">3. Compute Loss</text>
  <text x="485" y="117" text-anchor="middle" fill="#aaaaaa" font-size="9">L = loss_fn(ŷ, y)</text>
  <text x="485" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">Measure error</text>

  <!-- Arrow -->
  <line x1="560" y1="105" x2="600" y2="105" stroke="#feca57" stroke-width="2" marker-end="url(#aY)"/>

  <!-- Step 4: Backward -->
  <rect x="600" y="70" width="150" height="70" fill="#0f3460" stroke="#ff6b6b" stroke-width="2" rx="10"/>
  <text x="675" y="97" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">4. Backward Pass</text>
  <text x="675" y="117" text-anchor="middle" fill="#aaaaaa" font-size="9">loss.backward()</text>
  <text x="675" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">Compute gradients</text>

  <!-- Arrow -->
  <line x1="750" y1="105" x2="790" y2="105" stroke="#ff6b6b" stroke-width="2" marker-end="url(#aRR)"/>

  <!-- Step 5: Update -->
  <rect x="790" y="70" width="180" height="70" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="880" y="97" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">5. Update Weights</text>
  <text x="880" y="117" text-anchor="middle" fill="#aaaaaa" font-size="9">optimizer.step()</text>
  <text x="880" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">optimizer.zero_grad()</text>

  <!-- Loop arrow back -->
  <path d="M 880 140 L 880 165 Q 880 175 870 175 L 115 175 Q 105 175 105 165 L 105 140" fill="none" stroke="#a29bfe" stroke-width="2" marker-end="url(#aP)"/>
  <text x="500" y="190" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold">Repeat for each batch → Repeat for each epoch</text>

  <!-- Epoch and Batch Explanation -->
  <rect x="30" y="210" width="460" height="110" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="260" y="235" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Training Terminology</text>

  <text x="60" y="260" fill="#ffffff" font-size="11">• Batch: Subset of data (e.g., 32 samples)</text>
  <text x="60" y="280" fill="#ffffff" font-size="11">• Iteration: One forward + backward on 1 batch</text>
  <text x="60" y="300" fill="#ffffff" font-size="11">• Epoch: One complete pass through ALL training data</text>
  <text x="60" y="315" fill="#aaaaaa" font-size="10">  Example: 10000 samples / batch_size 32 = 312 iterations per epoch</text>

  <!-- Training vs Evaluation -->
  <rect x="510" y="210" width="460" height="110" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="8"/>
  <text x="740" y="235" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">Training vs Evaluation Mode</text>

  <text x="540" y="260" fill="#ffffff" font-size="11">model.train():</text>
  <text x="540" y="278" fill="#aaaaaa" font-size="10">  • Dropout active • BatchNorm uses batch stats</text>

  <text x="540" y="300" fill="#ffffff" font-size="11">model.eval() + torch.no_grad():</text>
  <text x="540" y="318" fill="#aaaaaa" font-size="10">  • Dropout disabled • BatchNorm uses running stats • No grad</text>

  <!-- Overfitting Detection -->
  <rect x="30" y="340" width="940" height="95" fill="#0f3460" stroke="#ff6b6b" stroke-width="1.5" rx="8"/>
  <text x="500" y="365" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="bold">Monitoring Training — When to Stop</text>

  <!-- Training loss going down -->
  <text x="100" y="390" fill="#00ff00" font-size="10">✓ Ideal: Train loss ↓ and Val loss ↓</text>
  <text x="100" y="410" fill="#feca57" font-size="10">⚠️ Overfit: Train loss ↓ but Val loss ↑</text>
  <text x="100" y="425" fill="#ff6b6b" font-size="10">✗ Underfit: Train loss high, Val loss high</text>

  <text x="500" y="390" fill="#ffffff" font-size="10" font-weight="bold">Solutions:</text>
  <text x="500" y="410" fill="#aaaaaa" font-size="10">Overfitting → More data, Dropout, L2 regularization, Early stopping, Data augmentation</text>
  <text x="500" y="425" fill="#aaaaaa" font-size="10">Underfitting → Bigger model, More layers, Train longer, Reduce regularization</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="aC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/></marker>
    <marker id="aY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#feca57"/></marker>
    <marker id="aRR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/></marker>
    <marker id="aP" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto"><polygon points="0 6, 4 0, 8 6" fill="#a29bfe"/></marker>
  </defs>
</svg>
