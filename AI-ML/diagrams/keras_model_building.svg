<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="600" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="20" font-weight="bold">Keras Model Building — 3 API Styles</text>

  <!-- Sequential API -->
  <rect x="30" y="60" width="290" height="500" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="175" y="90" text-anchor="middle" fill="#00d2d3" font-size="15" font-weight="bold">Sequential API</text>
  <text x="175" y="110" text-anchor="middle" fill="#aaaaaa" font-size="10">Simplest — linear stack of layers</text>

  <!-- Sequential layers stacked -->
  <rect x="60" y="130" width="230" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="175" y="152" text-anchor="middle" fill="#ffffff" font-size="11">Input (784,)</text>

  <line x1="175" y1="165" x2="175" y2="180" stroke="#00d2d3" stroke-width="1.5"/>
  <polygon points="170,178 175,185 180,178" fill="#00d2d3"/>

  <rect x="60" y="185" width="230" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="175" y="207" text-anchor="middle" fill="#ffffff" font-size="11">Dense(256, ReLU)</text>

  <line x1="175" y1="220" x2="175" y2="235" stroke="#00d2d3" stroke-width="1.5"/>
  <polygon points="170,233 175,240 180,233" fill="#00d2d3"/>

  <rect x="60" y="240" width="230" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="175" y="262" text-anchor="middle" fill="#ffffff" font-size="11">Dropout(0.3)</text>

  <line x1="175" y1="275" x2="175" y2="290" stroke="#00d2d3" stroke-width="1.5"/>
  <polygon points="170,288 175,295 180,288" fill="#00d2d3"/>

  <rect x="60" y="295" width="230" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="175" y="317" text-anchor="middle" fill="#ffffff" font-size="11">Dense(128, ReLU)</text>

  <line x1="175" y1="330" x2="175" y2="345" stroke="#00d2d3" stroke-width="1.5"/>
  <polygon points="170,343 175,350 180,343" fill="#00d2d3"/>

  <rect x="60" y="350" width="230" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="175" y="372" text-anchor="middle" fill="#ffffff" font-size="11">Dense(10, Softmax)</text>

  <!-- Use case -->
  <rect x="50" y="410" width="250" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="175" y="432" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Best For:</text>
  <text x="175" y="450" text-anchor="middle" fill="#ffffff" font-size="10">• Simple feed-forward networks</text>
  <text x="175" y="465" text-anchor="middle" fill="#ffffff" font-size="10">• Quick prototyping</text>
  <text x="175" y="480" text-anchor="middle" fill="#ffffff" font-size="10">• Beginners learning DL</text>

  <text x="175" y="510" text-anchor="middle" fill="#ff6b6b" font-size="10">⚠️ Cannot handle: multi-input/output,</text>
  <text x="175" y="525" text-anchor="middle" fill="#ff6b6b" font-size="10">skip connections, shared layers</text>

  <!-- Functional API -->
  <rect x="355" y="60" width="290" height="500" fill="#16213e" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="500" y="90" text-anchor="middle" fill="#feca57" font-size="15" font-weight="bold">Functional API</text>
  <text x="500" y="110" text-anchor="middle" fill="#aaaaaa" font-size="10">Flexible — DAG of layers</text>

  <!-- Functional flow with branches -->
  <rect x="405" y="130" width="190" height="30" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="500" y="150" text-anchor="middle" fill="#ffffff" font-size="10">inputs = Input(shape=(784,))</text>

  <line x1="500" y1="160" x2="500" y2="175" stroke="#feca57" stroke-width="1.5"/>

  <rect x="405" y="175" width="190" height="30" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="500" y="195" text-anchor="middle" fill="#ffffff" font-size="10">x = Dense(256)(inputs)</text>

  <line x1="500" y1="205" x2="500" y2="220" stroke="#feca57" stroke-width="1.5"/>

  <!-- Branch point -->
  <circle cx="500" cy="225" r="5" fill="#feca57"/>
  <line x1="500" y1="225" x2="430" y2="250" stroke="#feca57" stroke-width="1.5"/>
  <line x1="500" y1="225" x2="570" y2="250" stroke="#feca57" stroke-width="1.5"/>

  <!-- Left branch -->
  <rect x="380" y="250" width="100" height="28" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="430" y="269" text-anchor="middle" fill="#ffffff" font-size="9">Dense(64)</text>

  <!-- Right branch -->
  <rect x="520" y="250" width="100" height="28" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="570" y="269" text-anchor="middle" fill="#ffffff" font-size="9">Dense(64)</text>

  <!-- Merge -->
  <line x1="430" y1="278" x2="500" y2="305" stroke="#feca57" stroke-width="1.5"/>
  <line x1="570" y1="278" x2="500" y2="305" stroke="#feca57" stroke-width="1.5"/>

  <rect x="430" y="305" width="140" height="28" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="500" y="323" text-anchor="middle" fill="#ffffff" font-size="10">Concatenate()</text>

  <line x1="500" y1="333" x2="500" y2="348" stroke="#feca57" stroke-width="1.5"/>

  <rect x="405" y="348" width="190" height="30" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="500" y="367" text-anchor="middle" fill="#ffffff" font-size="10">outputs = Dense(10)(x)</text>

  <line x1="500" y1="378" x2="500" y2="393" stroke="#feca57" stroke-width="1.5"/>

  <rect x="405" y="393" width="190" height="25" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="500" y="410" text-anchor="middle" fill="#ffffff" font-size="10">Model(inputs, outputs)</text>

  <!-- Use case -->
  <rect x="375" y="435" width="250" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="500" y="457" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Best For:</text>
  <text x="500" y="475" text-anchor="middle" fill="#ffffff" font-size="10">• Multi-input / multi-output</text>
  <text x="500" y="490" text-anchor="middle" fill="#ffffff" font-size="10">• Skip/residual connections</text>
  <text x="500" y="505" text-anchor="middle" fill="#ffffff" font-size="10">• Shared layers, complex DAGs</text>

  <text x="500" y="530" text-anchor="middle" fill="#00ff88" font-size="10">⭐ RECOMMENDED for most projects</text>

  <!-- Model Subclassing -->
  <rect x="680" y="60" width="290" height="500" fill="#16213e" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="825" y="90" text-anchor="middle" fill="#e94560" font-size="15" font-weight="bold">Subclassing API</text>
  <text x="825" y="110" text-anchor="middle" fill="#aaaaaa" font-size="10">Full control — imperative Python</text>

  <!-- Code representation -->
  <rect x="700" y="130" width="250" height="260" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="5"/>
  <text x="720" y="152" fill="#a29bfe" font-size="10">class MyModel(tf.keras.Model):</text>
  <text x="730" y="170" fill="#ffffff" font-size="10">def __init__(self):</text>
  <text x="740" y="188" fill="#aaaaaa" font-size="10">self.dense1 = Dense(256)</text>
  <text x="740" y="206" fill="#aaaaaa" font-size="10">self.dense2 = Dense(128)</text>
  <text x="740" y="224" fill="#aaaaaa" font-size="10">self.out = Dense(10)</text>
  <text x="720" y="250" fill="#ffffff" font-size="10"> </text>
  <text x="730" y="266" fill="#ffffff" font-size="10">def call(self, x, training):</text>
  <text x="740" y="284" fill="#aaaaaa" font-size="10">x = relu(self.dense1(x))</text>
  <text x="740" y="302" fill="#aaaaaa" font-size="10">if training:</text>
  <text x="750" y="320" fill="#aaaaaa" font-size="10">x = dropout(x, 0.3)</text>
  <text x="740" y="338" fill="#aaaaaa" font-size="10">x = relu(self.dense2(x))</text>
  <text x="740" y="356" fill="#aaaaaa" font-size="10">return softmax(self.out(x))</text>

  <!-- Dynamic flow indicator -->
  <rect x="700" y="400" width="250" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="5"/>
  <text x="825" y="420" text-anchor="middle" fill="#e94560" font-size="10">Dynamic computation graph (if/for OK)</text>

  <!-- Use case -->
  <rect x="700" y="445" width="250" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="825" y="467" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Best For:</text>
  <text x="825" y="485" text-anchor="middle" fill="#ffffff" font-size="10">• Research / novel architectures</text>
  <text x="825" y="500" text-anchor="middle" fill="#ffffff" font-size="10">• Dynamic control flow</text>
  <text x="825" y="515" text-anchor="middle" fill="#ffffff" font-size="10">• Custom training logic</text>

  <text x="825" y="540" text-anchor="middle" fill="#ff6b6b" font-size="10">⚠️ Harder to serialize/debug</text>

  <!-- Bottom comparison -->
  <rect x="30" y="570" width="940" height="22" fill="#0f3460" rx="4"/>
  <text x="500" y="585" text-anchor="middle" fill="#ffffff" font-size="11">Complexity: Sequential (simple) → Functional (flexible) → Subclassing (full control) | Start with Functional API</text>
</svg>
