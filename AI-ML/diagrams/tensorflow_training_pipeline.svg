<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="500" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="20" font-weight="bold">TensorFlow Training Pipeline — Complete Flow</text>

  <!-- Step 1: Data -->
  <rect x="30" y="65" width="160" height="90" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="110" y="88" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">1. Data Loading</text>
  <text x="110" y="108" text-anchor="middle" fill="#ffffff" font-size="9">tf.data.Dataset</text>
  <text x="110" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">.from_tensor_slices()</text>
  <text x="110" y="138" text-anchor="middle" fill="#aaaaaa" font-size="9">.batch().shuffle()</text>
  <text x="110" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">.prefetch(AUTOTUNE)</text>

  <!-- Arrow -->
  <line x1="190" y1="110" x2="220" y2="110" stroke="#00d2d3" stroke-width="2" marker-end="url(#tfArrow1)"/>

  <!-- Step 2: Model -->
  <rect x="220" y="65" width="160" height="90" fill="#0f3460" stroke="#FF6F00" stroke-width="2" rx="10"/>
  <text x="300" y="88" text-anchor="middle" fill="#FF6F00" font-size="12" font-weight="bold">2. Build Model</text>
  <text x="300" y="108" text-anchor="middle" fill="#ffffff" font-size="9">tf.keras.Model</text>
  <text x="300" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">Layers + Architecture</text>
  <text x="300" y="138" text-anchor="middle" fill="#aaaaaa" font-size="9">Weights initialized</text>
  <text x="300" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">(He/Glorot)</text>

  <!-- Arrow -->
  <line x1="380" y1="110" x2="410" y2="110" stroke="#FF6F00" stroke-width="2" marker-end="url(#tfArrow2)"/>

  <!-- Step 3: Compile -->
  <rect x="410" y="65" width="160" height="90" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="490" y="88" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">3. Compile</text>
  <text x="490" y="108" text-anchor="middle" fill="#ffffff" font-size="9">model.compile(</text>
  <text x="490" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">optimizer='adam',</text>
  <text x="490" y="138" text-anchor="middle" fill="#aaaaaa" font-size="9">loss='crossentropy',</text>
  <text x="490" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">metrics=['accuracy'])</text>

  <!-- Arrow -->
  <line x1="570" y1="110" x2="600" y2="110" stroke="#feca57" stroke-width="2" marker-end="url(#tfArrow3)"/>

  <!-- Step 4: Train -->
  <rect x="600" y="65" width="160" height="90" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="680" y="88" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">4. Train (Fit)</text>
  <text x="680" y="108" text-anchor="middle" fill="#ffffff" font-size="9">model.fit(</text>
  <text x="680" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">train_ds,</text>
  <text x="680" y="138" text-anchor="middle" fill="#aaaaaa" font-size="9">validation_data=val_ds,</text>
  <text x="680" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">epochs=50, callbacks)</text>

  <!-- Arrow -->
  <line x1="760" y1="110" x2="790" y2="110" stroke="#e94560" stroke-width="2" marker-end="url(#tfArrow4)"/>

  <!-- Step 5: Evaluate & Deploy -->
  <rect x="790" y="65" width="180" height="90" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="880" y="88" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">5. Evaluate &amp; Save</text>
  <text x="880" y="108" text-anchor="middle" fill="#ffffff" font-size="9">model.evaluate(test_ds)</text>
  <text x="880" y="123" text-anchor="middle" fill="#aaaaaa" font-size="9">model.save('model.keras')</text>
  <text x="880" y="138" text-anchor="middle" fill="#aaaaaa" font-size="9">tf.saved_model.save()</text>
  <text x="880" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">Export to TF Lite/JS</text>

  <!-- Callbacks section -->
  <rect x="30" y="185" width="940" height="120" fill="#16213e" stroke="#a29bfe" stroke-width="1.5" rx="8"/>
  <text x="500" y="210" text-anchor="middle" fill="#a29bfe" font-size="14" font-weight="bold">Callbacks — Automated Training Control</text>

  <rect x="50" y="225" width="160" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="130" y="245" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">EarlyStopping</text>
  <text x="130" y="260" text-anchor="middle" fill="#ffffff" font-size="9">Stop when val_loss</text>
  <text x="130" y="273" text-anchor="middle" fill="#ffffff" font-size="9">stops improving</text>

  <rect x="230" y="225" width="160" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="310" y="245" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">ModelCheckpoint</text>
  <text x="310" y="260" text-anchor="middle" fill="#ffffff" font-size="9">Save best model</text>
  <text x="310" y="273" text-anchor="middle" fill="#ffffff" font-size="9">during training</text>

  <rect x="410" y="225" width="160" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="490" y="245" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">ReduceLROnPlateau</text>
  <text x="490" y="260" text-anchor="middle" fill="#ffffff" font-size="9">Lower LR when</text>
  <text x="490" y="273" text-anchor="middle" fill="#ffffff" font-size="9">loss plateaus</text>

  <rect x="590" y="225" width="160" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="670" y="245" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">TensorBoard</text>
  <text x="670" y="260" text-anchor="middle" fill="#ffffff" font-size="9">Log metrics for</text>
  <text x="670" y="273" text-anchor="middle" fill="#ffffff" font-size="9">visualization</text>

  <rect x="770" y="225" width="180" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="860" y="245" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">LearningRateScheduler</text>
  <text x="860" y="260" text-anchor="middle" fill="#ffffff" font-size="9">Custom LR schedule</text>
  <text x="860" y="273" text-anchor="middle" fill="#ffffff" font-size="9">per epoch</text>

  <!-- Custom Training Loop -->
  <rect x="30" y="325" width="940" height="160" fill="#16213e" stroke="#FF6F00" stroke-width="1.5" rx="8"/>
  <text x="500" y="350" text-anchor="middle" fill="#FF6F00" font-size="14" font-weight="bold">Custom Training Loop (tf.GradientTape)</text>

  <!-- Loop steps -->
  <rect x="55" y="370" width="150" height="50" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="130" y="390" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Forward Pass</text>
  <text x="130" y="407" text-anchor="middle" fill="#ffffff" font-size="9">with GradientTape():</text>
  <text x="130" y="417" text-anchor="middle" fill="#ffffff" font-size="9">  preds = model(x)</text>

  <line x1="205" y1="395" x2="235" y2="395" stroke="#ffffff" stroke-width="1.5" marker-end="url(#tfArrowW)"/>

  <rect x="235" y="370" width="150" height="50" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="310" y="390" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Compute Loss</text>
  <text x="310" y="407" text-anchor="middle" fill="#ffffff" font-size="9">loss = loss_fn(y, preds)</text>

  <line x1="385" y1="395" x2="415" y2="395" stroke="#ffffff" stroke-width="1.5" marker-end="url(#tfArrowW)"/>

  <rect x="415" y="370" width="150" height="50" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="490" y="390" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Get Gradients</text>
  <text x="490" y="407" text-anchor="middle" fill="#ffffff" font-size="9">grads = tape.gradient(</text>
  <text x="490" y="417" text-anchor="middle" fill="#ffffff" font-size="9">  loss, model.variables)</text>

  <line x1="565" y1="395" x2="595" y2="395" stroke="#ffffff" stroke-width="1.5" marker-end="url(#tfArrowW)"/>

  <rect x="595" y="370" width="170" height="50" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="680" y="390" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Apply Gradients</text>
  <text x="680" y="407" text-anchor="middle" fill="#ffffff" font-size="9">optimizer.apply_gradients(</text>
  <text x="680" y="417" text-anchor="middle" fill="#ffffff" font-size="9">  zip(grads, variables))</text>

  <line x1="765" y1="395" x2="795" y2="395" stroke="#ffffff" stroke-width="1.5" marker-end="url(#tfArrowW)"/>

  <rect x="795" y="370" width="155" height="50" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="872" y="390" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Update Metrics</text>
  <text x="872" y="407" text-anchor="middle" fill="#ffffff" font-size="9">train_loss.update(loss)</text>
  <text x="872" y="417" text-anchor="middle" fill="#ffffff" font-size="9">train_acc.update(y,preds)</text>

  <!-- Loop arrow -->
  <path d="M 872 420 L 872 450 Q 872 460 862 460 L 140 460 Q 130 460 130 450 L 130 420" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="500" y="473" text-anchor="middle" fill="#ff6b6b" font-size="10">Repeat for each batch in epoch</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="tfArrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/></marker>
    <marker id="tfArrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF6F00"/></marker>
    <marker id="tfArrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#feca57"/></marker>
    <marker id="tfArrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="tfArrowW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffffff"/></marker>
  </defs>
</svg>
