<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="520" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#EE4C2C" font-size="20" font-weight="bold">PyTorch Autograd — Computational Graph &amp; Gradient Flow</text>

  <!-- Forward Pass (computation graph) -->
  <text x="500" y="65" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Forward Pass — Building the Computational Graph</text>

  <!-- Leaf nodes -->
  <rect x="50" y="90" width="100" height="50" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="100" y="112" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">x</text>
  <text x="100" y="130" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([2.0])</text>

  <rect x="50" y="170" width="100" height="50" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="100" y="192" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">w</text>
  <text x="100" y="210" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([3.0])</text>

  <rect x="50" y="250" width="100" height="50" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="100" y="272" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">b</text>
  <text x="100" y="290" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([1.0])</text>

  <!-- requires_grad labels -->
  <text x="100" y="148" text-anchor="middle" fill="#00ff88" font-size="8">requires_grad=True</text>
  <text x="100" y="228" text-anchor="middle" fill="#00ff88" font-size="8">requires_grad=True</text>
  <text x="100" y="308" text-anchor="middle" fill="#00ff88" font-size="8">requires_grad=True</text>

  <!-- Multiply operation -->
  <line x1="150" y1="115" x2="240" y2="165" stroke="#feca57" stroke-width="1.5"/>
  <line x1="150" y1="195" x2="240" y2="175" stroke="#feca57" stroke-width="1.5"/>

  <circle cx="260" cy="170" r="25" fill="#16213e" stroke="#feca57" stroke-width="2"/>
  <text x="260" y="175" text-anchor="middle" fill="#feca57" font-size="14">×</text>
  <text x="260" y="210" text-anchor="middle" fill="#aaaaaa" font-size="9">MulBackward</text>

  <!-- Result of multiply -->
  <line x1="285" y1="170" x2="350" y2="170" stroke="#feca57" stroke-width="1.5" marker-end="url(#pyArrow)"/>

  <rect x="350" y="145" width="100" height="50" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="400" y="167" text-anchor="middle" fill="#feca57" font-size="11">z = w*x</text>
  <text x="400" y="185" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([6.0])</text>

  <!-- Add operation -->
  <line x1="450" y1="170" x2="520" y2="195" stroke="#54a0ff" stroke-width="1.5"/>
  <line x1="150" y1="275" x2="520" y2="205" stroke="#54a0ff" stroke-width="1.5"/>

  <circle cx="540" cy="200" r="25" fill="#16213e" stroke="#54a0ff" stroke-width="2"/>
  <text x="540" y="205" text-anchor="middle" fill="#54a0ff" font-size="14">+</text>
  <text x="540" y="240" text-anchor="middle" fill="#aaaaaa" font-size="9">AddBackward</text>

  <!-- Result of add -->
  <line x1="565" y1="200" x2="630" y2="200" stroke="#54a0ff" stroke-width="1.5" marker-end="url(#pyArrow)"/>

  <rect x="630" y="175" width="110" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="685" y="197" text-anchor="middle" fill="#54a0ff" font-size="11">y = z + b</text>
  <text x="685" y="215" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([7.0])</text>

  <!-- Loss operation -->
  <line x1="740" y1="200" x2="800" y2="200" stroke="#e94560" stroke-width="1.5" marker-end="url(#pyArrowR)"/>

  <rect x="800" y="175" width="150" height="50" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="875" y="197" text-anchor="middle" fill="#e94560" font-size="11" font-weight="bold">L = y²</text>
  <text x="875" y="215" text-anchor="middle" fill="#aaaaaa" font-size="9">tensor([49.0])</text>

  <!-- Backward Pass -->
  <rect x="30" y="320" width="940" height="180" fill="#16213e" stroke="#ff6b6b" stroke-width="1.5" rx="8"/>
  <text x="500" y="345" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">Backward Pass — loss.backward() — Chain Rule Gradient Flow</text>

  <!-- Gradient flow (right to left) -->
  <rect x="780" y="365" width="160" height="50" fill="#0f3460" stroke="#ff6b6b" stroke-width="1.5" rx="6"/>
  <text x="860" y="385" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">∂L/∂L = 1</text>
  <text x="860" y="403" text-anchor="middle" fill="#ffffff" font-size="9">Start: gradient = 1.0</text>

  <line x1="780" y1="390" x2="720" y2="390" stroke="#ff6b6b" stroke-width="2" marker-end="url(#pyArrowBack)"/>

  <rect x="570" y="365" width="150" height="50" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="645" y="385" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">∂L/∂y = 2y = 14</text>
  <text x="645" y="403" text-anchor="middle" fill="#ffffff" font-size="9">PowBackward</text>

  <line x1="570" y1="390" x2="510" y2="390" stroke="#feca57" stroke-width="2" marker-end="url(#pyArrowBack)"/>

  <rect x="360" y="365" width="150" height="50" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="435" y="383" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">∂L/∂z = 14</text>
  <text x="435" y="400" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">∂L/∂b = 14</text>

  <line x1="360" y1="390" x2="300" y2="390" stroke="#54a0ff" stroke-width="2" marker-end="url(#pyArrowBack)"/>

  <rect x="100" y="365" width="200" height="50" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="200" y="383" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">∂L/∂w = 14·x = 28</text>
  <text x="200" y="400" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">∂L/∂x = 14·w = 42</text>

  <!-- Result boxes -->
  <rect x="100" y="430" width="200" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="200" y="450" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Final Gradients (after .backward()):</text>
  <text x="200" y="468" text-anchor="middle" fill="#ffffff" font-size="10">w.grad = 28 | x.grad = 42 | b.grad = 14</text>
  <text x="200" y="483" text-anchor="middle" fill="#aaaaaa" font-size="9">Used by optimizer to update weights</text>

  <!-- Key insight -->
  <rect x="380" y="430" width="560" height="55" fill="#0f3460" stroke="#EE4C2C" stroke-width="1.5" rx="6"/>
  <text x="660" y="450" text-anchor="middle" fill="#EE4C2C" font-size="11" font-weight="bold">Key Autograd Properties</text>
  <text x="660" y="468" text-anchor="middle" fill="#ffffff" font-size="10">• Graph built dynamically during forward pass (define-by-run)</text>
  <text x="660" y="483" text-anchor="middle" fill="#ffffff" font-size="10">• Graph destroyed after .backward() (unless retain_graph=True) • Gradients accumulate (must zero!)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="pyArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#feca57"/></marker>
    <marker id="pyArrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="pyArrowBack" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><polygon points="8 0, 0 3, 8 6" fill="#ff6b6b"/></marker>
  </defs>
</svg>
