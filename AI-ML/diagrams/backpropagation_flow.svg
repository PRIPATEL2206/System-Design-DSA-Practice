<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="600" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Backpropagation — Gradient Flow (Right → Left)</text>

  <!-- Forward Pass (top row - faded) -->
  <text x="500" y="70" text-anchor="middle" fill="#666666" font-size="13">Forward Pass (for reference)</text>

  <rect x="50" y="85" width="120" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="110" y="115" text-anchor="middle" fill="#666666" font-size="11">Input X</text>

  <line x1="170" y1="110" x2="220" y2="110" stroke="#444444" stroke-width="1" stroke-dasharray="4"/>

  <rect x="220" y="85" width="120" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="280" y="115" text-anchor="middle" fill="#666666" font-size="11">z¹ = W¹x+b¹</text>

  <line x1="340" y1="110" x2="390" y2="110" stroke="#444444" stroke-width="1" stroke-dasharray="4"/>

  <rect x="390" y="85" width="120" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="450" y="115" text-anchor="middle" fill="#666666" font-size="11">a¹ = σ(z¹)</text>

  <line x1="510" y1="110" x2="560" y2="110" stroke="#444444" stroke-width="1" stroke-dasharray="4"/>

  <rect x="560" y="85" width="120" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="620" y="115" text-anchor="middle" fill="#666666" font-size="11">z² = W²a¹+b²</text>

  <line x1="680" y1="110" x2="730" y2="110" stroke="#444444" stroke-width="1" stroke-dasharray="4"/>

  <rect x="730" y="85" width="120" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="790" y="115" text-anchor="middle" fill="#666666" font-size="11">ŷ = σ(z²)</text>

  <line x1="850" y1="110" x2="900" y2="110" stroke="#444444" stroke-width="1" stroke-dasharray="4"/>

  <rect x="900" y="85" width="80" height="50" fill="#16213e" stroke="#444444" stroke-width="1" rx="6"/>
  <text x="940" y="115" text-anchor="middle" fill="#666666" font-size="11">Loss L</text>

  <!-- Backward Pass (main - highlighted) -->
  <text x="500" y="180" text-anchor="middle" fill="#ff6b6b" font-size="15" font-weight="bold">Backward Pass — Chain Rule Applied</text>

  <!-- Step 1: Compute Loss Gradient -->
  <rect x="750" y="200" width="200" height="90" fill="#0f3460" stroke="#ff6b6b" stroke-width="2" rx="10"/>
  <text x="850" y="225" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">Step 1: Loss Gradient</text>
  <text x="850" y="248" text-anchor="middle" fill="#ffffff" font-size="11">∂L/∂ŷ = ŷ - y</text>
  <text x="850" y="270" text-anchor="middle" fill="#aaaaaa" font-size="10">(How much loss changes</text>
  <text x="850" y="283" text-anchor="middle" fill="#aaaaaa" font-size="10">w.r.t prediction)</text>

  <!-- Arrow backward -->
  <line x1="750" y1="245" x2="680" y2="245" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowBack)"/>
  <text x="715" y="238" text-anchor="middle" fill="#ff6b6b" font-size="9">chain rule</text>

  <!-- Step 2: Output Layer Gradients -->
  <rect x="480" y="200" width="200" height="90" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="580" y="225" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Step 2: Output Gradients</text>
  <text x="580" y="248" text-anchor="middle" fill="#ffffff" font-size="11">∂L/∂W² = ∂L/∂ŷ · ∂ŷ/∂z² · a¹ᵀ</text>
  <text x="580" y="270" text-anchor="middle" fill="#ffffff" font-size="11">∂L/∂b² = ∂L/∂ŷ · ∂ŷ/∂z²</text>
  <text x="580" y="283" text-anchor="middle" fill="#aaaaaa" font-size="10">Update W² and b²</text>

  <!-- Arrow backward -->
  <line x1="480" y1="245" x2="410" y2="245" stroke="#feca57" stroke-width="2" marker-end="url(#arrowBackY)"/>
  <text x="445" y="238" text-anchor="middle" fill="#feca57" font-size="9">chain rule</text>

  <!-- Step 3: Hidden Layer Gradients -->
  <rect x="210" y="200" width="200" height="90" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="310" y="225" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Step 3: Hidden Gradients</text>
  <text x="310" y="248" text-anchor="middle" fill="#ffffff" font-size="11">∂L/∂W¹ = δ² · W²ᵀ · σ'(z¹) · Xᵀ</text>
  <text x="310" y="270" text-anchor="middle" fill="#ffffff" font-size="11">∂L/∂b¹ = δ² · W²ᵀ · σ'(z¹)</text>
  <text x="310" y="283" text-anchor="middle" fill="#aaaaaa" font-size="10">Update W¹ and b¹</text>

  <!-- Step 4: Weight Update -->
  <rect x="50" y="200" width="150" height="90" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="125" y="225" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Step 4: Update</text>
  <text x="125" y="248" text-anchor="middle" fill="#ffffff" font-size="11">W = W - η·∂L/∂W</text>
  <text x="125" y="270" text-anchor="middle" fill="#ffffff" font-size="11">b = b - η·∂L/∂b</text>
  <text x="125" y="283" text-anchor="middle" fill="#aaaaaa" font-size="10">η = learning rate</text>

  <!-- Arrow backward -->
  <line x1="210" y1="245" x2="200" y2="245" stroke="#00d2d3" stroke-width="2" marker-end="url(#arrowBackC)"/>

  <!-- Chain Rule Visualization -->
  <rect x="50" y="320" width="900" height="130" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="345" text-anchor="middle" fill="#54a0ff" font-size="14" font-weight="bold">The Chain Rule — Core of Backpropagation</text>

  <text x="500" y="375" text-anchor="middle" fill="#ffffff" font-size="13">∂L/∂w = ∂L/∂ŷ · ∂ŷ/∂z · ∂z/∂w</text>

  <text x="200" y="405" text-anchor="middle" fill="#ff6b6b" font-size="11">∂L/∂ŷ → How loss changes with prediction</text>
  <text x="500" y="405" text-anchor="middle" fill="#feca57" font-size="11">∂ŷ/∂z → How activation changes with input</text>
  <text x="800" y="405" text-anchor="middle" fill="#00d2d3" font-size="11">∂z/∂w → How weighted sum changes with weight</text>

  <text x="500" y="435" text-anchor="middle" fill="#aaaaaa" font-size="11">Each gradient is a PRODUCT of local gradients along the path from loss to the parameter</text>

  <!-- Key Concept Box -->
  <rect x="50" y="470" width="900" height="110" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="8"/>
  <text x="500" y="495" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">Why Backpropagation Works</text>
  <text x="80" y="520" fill="#ffffff" font-size="11">1. Efficient: Computes ALL gradients in ONE backward pass (vs. numerical: O(n) forward passes per parameter)</text>
  <text x="80" y="540" fill="#ffffff" font-size="11">2. Exact: Uses analytical derivatives — no approximation errors from finite differences</text>
  <text x="80" y="560" fill="#ffffff" font-size="11">3. Scalable: Complexity is O(same as forward pass) — works for networks with millions of parameters</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBack" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#ff6b6b"/>
    </marker>
    <marker id="arrowBackY" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#feca57"/>
    </marker>
    <marker id="arrowBackC" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#00d2d3"/>
    </marker>
  </defs>
</svg>
