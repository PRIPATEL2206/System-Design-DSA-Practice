<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 550" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="550" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">AI Safety Threat Landscape — Risk Categories</text>

  <!-- Central AI System -->
  <rect x="400" y="220" width="250" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="3" rx="12"/>
  <text x="525" y="248" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">AI/LLM System</text>
  <text x="525" y="268" text-anchor="middle" fill="#aaaaaa" font-size="8">Chatbot, Agent, RAG, Generation</text>
  <text x="525" y="280" text-anchor="middle" fill="#aaaaaa" font-size="7">Must be: Helpful, Harmless, Honest</text>

  <!-- Threat 1: Hallucination (top left) -->
  <rect x="30" y="55" width="220" height="100" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="140" y="78" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">Hallucination</text>
  <text x="45" y="98" fill="#ffffff" font-size="7">• Confident but false claims</text>
  <text x="45" y="113" fill="#ffffff" font-size="7">• Fabricated citations/sources</text>
  <text x="45" y="128" fill="#ffffff" font-size="7">• Outdated information</text>
  <text x="45" y="143" fill="#feca57" font-size="7">Severity: HIGH | Likelihood: VERY HIGH</text>
  <line x1="200" y1="155" x2="430" y2="220" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 2: Prompt Injection (top right) -->
  <rect x="800" y="55" width="220" height="100" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="910" y="78" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Prompt Injection</text>
  <text x="815" y="98" fill="#ffffff" font-size="7">• Override system instructions</text>
  <text x="815" y="113" fill="#ffffff" font-size="7">• Extract system prompts</text>
  <text x="815" y="128" fill="#ffffff" font-size="7">• Indirect via RAG documents</text>
  <text x="815" y="143" fill="#feca57" font-size="7">Severity: CRITICAL | Likelihood: HIGH</text>
  <line x1="850" y1="155" x2="620" y2="220" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 3: Bias (left) -->
  <rect x="30" y="200" width="220" height="100" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="140" y="223" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Bias &amp; Fairness</text>
  <text x="45" y="243" fill="#ffffff" font-size="7">• Demographic discrimination</text>
  <text x="45" y="258" fill="#ffffff" font-size="7">• Stereotyping in outputs</text>
  <text x="45" y="273" fill="#ffffff" font-size="7">• Unequal error rates by group</text>
  <text x="45" y="288" fill="#feca57" font-size="7">Severity: HIGH | Likelihood: HIGH</text>
  <line x1="255" y1="250" x2="395" y2="250" stroke="#feca57" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 4: Data Leakage (right) -->
  <rect x="800" y="200" width="220" height="100" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="910" y="223" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">Data Leakage</text>
  <text x="815" y="243" fill="#ffffff" font-size="7">• Training data memorization</text>
  <text x="815" y="258" fill="#ffffff" font-size="7">• PII exposure in outputs</text>
  <text x="815" y="273" fill="#ffffff" font-size="7">• System prompt extraction</text>
  <text x="815" y="288" fill="#feca57" font-size="7">Severity: HIGH | Likelihood: MEDIUM</text>
  <line x1="795" y1="250" x2="655" y2="250" stroke="#a29bfe" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 5: Toxicity (bottom left) -->
  <rect x="30" y="360" width="220" height="100" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="140" y="383" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Toxic Content</text>
  <text x="45" y="403" fill="#ffffff" font-size="7">• Harmful/offensive generation</text>
  <text x="45" y="418" fill="#ffffff" font-size="7">• Hate speech, violence</text>
  <text x="45" y="433" fill="#ffffff" font-size="7">• Self-harm instructions</text>
  <text x="45" y="448" fill="#feca57" font-size="7">Severity: MEDIUM | Likelihood: MEDIUM</text>
  <line x1="200" y1="360" x2="430" y2="290" stroke="#54a0ff" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 6: Misuse (bottom right) -->
  <rect x="800" y="360" width="220" height="100" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="910" y="383" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Misuse / Abuse</text>
  <text x="815" y="403" fill="#ffffff" font-size="7">• Scams, phishing generation</text>
  <text x="815" y="418" fill="#ffffff" font-size="7">• Disinformation at scale</text>
  <text x="815" y="433" fill="#ffffff" font-size="7">• Malware assistance</text>
  <text x="815" y="448" fill="#feca57" font-size="7">Severity: CRITICAL | Likelihood: HIGH</text>
  <line x1="850" y1="360" x2="620" y2="290" stroke="#00d2d3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Threat 7: Adversarial (bottom center) -->
  <rect x="350" y="350" width="220" height="80" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="460" y="373" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">Adversarial Attacks</text>
  <text x="365" y="393" fill="#ffffff" font-size="7">• Crafted inputs cause misclassification</text>
  <text x="365" y="408" fill="#ffffff" font-size="7">• Embedding space manipulation</text>
  <text x="365" y="423" fill="#feca57" font-size="7">Severity: MEDIUM | Likelihood: LOW</text>
  <line x1="460" y1="348" x2="500" y2="292" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Defense Shield -->
  <rect x="280" y="475" width="490" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="525" y="498" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Defense: Guardrails + Monitoring + Red Teaming + Alignment</text>
  <text x="525" y="518" text-anchor="middle" fill="#aaaaaa" font-size="8">Input validation → LLM-based detection → Output filtering → Continuous monitoring → Regular testing</text>
</svg>
