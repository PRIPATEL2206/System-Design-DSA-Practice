<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="600" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">RAG Chunking Strategies — Comparison</text>

  <!-- Strategy 1: Fixed-Size -->
  <rect x="30" y="55" width="480" height="155" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="270" y="78" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">1. Fixed-Size Chunking</text>

  <!-- Document visualization -->
  <rect x="50" y="90" width="440" height="25" fill="#0f3460" stroke="#444" stroke-width="1" rx="3"/>
  <text x="270" y="107" text-anchor="middle" fill="#aaaaaa" font-size="8">Original Document (continuous text...)</text>

  <!-- Chunks with overlap -->
  <rect x="50" y="125" width="120" height="30" fill="#1565c0" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="110" y="144" text-anchor="middle" fill="#ffffff" font-size="8">Chunk 1 (500 tok)</text>

  <rect x="155" y="125" width="120" height="30" fill="#1565c0" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="215" y="144" text-anchor="middle" fill="#ffffff" font-size="8">Chunk 2 (500 tok)</text>

  <rect x="260" y="125" width="120" height="30" fill="#1565c0" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="320" y="144" text-anchor="middle" fill="#ffffff" font-size="8">Chunk 3 (500 tok)</text>

  <rect x="365" y="125" width="120" height="30" fill="#1565c0" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="425" y="144" text-anchor="middle" fill="#ffffff" font-size="8">Chunk 4 (500 tok)</text>

  <!-- Overlap indicators -->
  <rect x="155" y="125" width="15" height="30" fill="#feca57" opacity="0.4" rx="2"/>
  <rect x="260" y="125" width="15" height="30" fill="#feca57" opacity="0.4" rx="2"/>
  <rect x="365" y="125" width="15" height="30" fill="#feca57" opacity="0.4" rx="2"/>

  <text x="50" y="175" fill="#00ff88" font-size="8" font-weight="bold">+ Simple, predictable sizes</text>
  <text x="50" y="190" fill="#00ff88" font-size="8">+ Fast to compute</text>
  <text x="270" y="175" fill="#ff6b6b" font-size="8" font-weight="bold">- May cut mid-sentence</text>
  <text x="270" y="190" fill="#ff6b6b" font-size="8">- Ignores document structure</text>
  <text x="420" y="190" fill="#feca57" font-size="7">overlap (50 tok)</text>

  <!-- Strategy 2: Semantic -->
  <rect x="540" y="55" width="480" height="155" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="780" y="78" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">2. Semantic Chunking</text>

  <!-- Document with meaning shifts -->
  <rect x="560" y="90" width="440" height="25" fill="#0f3460" stroke="#444" stroke-width="1" rx="3"/>
  <text x="780" y="107" text-anchor="middle" fill="#aaaaaa" font-size="8">Original Document (embedding similarity between sentences measured)</text>

  <!-- Variable-size chunks at topic boundaries -->
  <rect x="560" y="125" width="85" height="30" fill="#2e7d32" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="602" y="144" text-anchor="middle" fill="#ffffff" font-size="7">Topic A</text>

  <rect x="650" y="125" width="140" height="30" fill="#2e7d32" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="720" y="144" text-anchor="middle" fill="#ffffff" font-size="7">Topic B (longer)</text>

  <rect x="795" y="125" width="95" height="30" fill="#2e7d32" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="842" y="144" text-anchor="middle" fill="#ffffff" font-size="7">Topic C</text>

  <rect x="895" y="125" width="85" height="30" fill="#2e7d32" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="937" y="144" text-anchor="middle" fill="#ffffff" font-size="7">Topic D</text>

  <!-- Breakpoints -->
  <line x1="648" y1="120" x2="648" y2="160" stroke="#e94560" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="793" y1="120" x2="793" y2="160" stroke="#e94560" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="893" y1="120" x2="893" y2="160" stroke="#e94560" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="720" y="170" text-anchor="middle" fill="#e94560" font-size="7">↑ breakpoints at meaning shifts</text>

  <text x="560" y="185" fill="#00ff88" font-size="8" font-weight="bold">+ Respects topic boundaries</text>
  <text x="560" y="200" fill="#00ff88" font-size="8">+ Semantically coherent chunks</text>
  <text x="780" y="185" fill="#ff6b6b" font-size="8" font-weight="bold">- Slower (needs embedding)</text>
  <text x="780" y="200" fill="#ff6b6b" font-size="8">- Unpredictable chunk sizes</text>

  <!-- Strategy 3: Structure-Aware -->
  <rect x="30" y="225" width="480" height="165" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="270" y="248" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">3. Structure-Aware (Markdown/HTML)</text>

  <!-- Document structure -->
  <rect x="50" y="260" width="200" height="115" fill="#0f3460" stroke="#444" stroke-width="1" rx="4"/>
  <text x="60" y="278" fill="#feca57" font-size="9" font-weight="bold"># Heading 1</text>
  <text x="60" y="293" fill="#aaaaaa" font-size="7">Paragraph text...</text>
  <text x="60" y="310" fill="#feca57" font-size="9" font-weight="bold">## Section A</text>
  <text x="60" y="325" fill="#aaaaaa" font-size="7">Content about A...</text>
  <text x="60" y="342" fill="#feca57" font-size="9" font-weight="bold">## Section B</text>
  <text x="60" y="357" fill="#aaaaaa" font-size="7">Content about B...</text>
  <text x="60" y="372" fill="#aaaaaa" font-size="7">More about B...</text>

  <!-- Arrow -->
  <line x1="260" y1="320" x2="290" y2="320" stroke="#fff" stroke-width="1.5" marker-end="url(#csArr)"/>

  <!-- Resulting chunks with headers as metadata -->
  <rect x="300" y="262" width="190" height="38" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="310" y="277" fill="#feca57" font-size="7">meta: {h1: "Heading 1"}</text>
  <text x="310" y="292" fill="#ffffff" font-size="8">Paragraph text...</text>

  <rect x="300" y="306" width="190" height="38" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="310" y="321" fill="#feca57" font-size="7">meta: {h1: "Heading 1", h2: "Section A"}</text>
  <text x="310" y="336" fill="#ffffff" font-size="8">Content about A...</text>

  <rect x="300" y="350" width="190" height="38" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="310" y="365" fill="#feca57" font-size="7">meta: {h1: "Heading 1", h2: "Section B"}</text>
  <text x="310" y="380" fill="#ffffff" font-size="8">Content about B...</text>

  <!-- Strategy 4: Parent-Child -->
  <rect x="540" y="225" width="480" height="165" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="780" y="248" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">4. Parent-Child (Hierarchical)</text>

  <!-- Parent chunk -->
  <rect x="560" y="265" width="440" height="45" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="780" y="283" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Parent Chunk (2000 tokens) — stored in docstore</text>
  <text x="780" y="300" text-anchor="middle" fill="#aaaaaa" font-size="8">Full context paragraph with surrounding information...</text>

  <!-- Child chunks -->
  <rect x="565" y="325" width="100" height="35" fill="#6a1b9a" stroke="#a29bfe" stroke-width="1" rx="3"/>
  <text x="615" y="340" text-anchor="middle" fill="#ffffff" font-size="7">Child 1</text>
  <text x="615" y="352" text-anchor="middle" fill="#ffffff" font-size="6">(400 tok)</text>

  <rect x="675" y="325" width="100" height="35" fill="#6a1b9a" stroke="#a29bfe" stroke-width="1" rx="3"/>
  <text x="725" y="340" text-anchor="middle" fill="#ffffff" font-size="7">Child 2</text>
  <text x="725" y="352" text-anchor="middle" fill="#ffffff" font-size="6">(400 tok)</text>

  <rect x="785" y="325" width="100" height="35" fill="#6a1b9a" stroke="#a29bfe" stroke-width="1" rx="3"/>
  <text x="835" y="340" text-anchor="middle" fill="#ffffff" font-size="7">Child 3</text>
  <text x="835" y="352" text-anchor="middle" fill="#ffffff" font-size="6">(400 tok)</text>

  <rect x="895" y="325" width="100" height="35" fill="#6a1b9a" stroke="#a29bfe" stroke-width="1" rx="3"/>
  <text x="945" y="340" text-anchor="middle" fill="#ffffff" font-size="7">Child 4</text>
  <text x="945" y="352" text-anchor="middle" fill="#ffffff" font-size="6">(400 tok)</text>

  <!-- Arrows parent to children -->
  <line x1="615" y1="310" x2="615" y2="322" stroke="#a29bfe" stroke-width="1"/>
  <line x1="725" y1="310" x2="725" y2="322" stroke="#a29bfe" stroke-width="1"/>
  <line x1="835" y1="310" x2="835" y2="322" stroke="#a29bfe" stroke-width="1"/>
  <line x1="945" y1="310" x2="945" y2="322" stroke="#a29bfe" stroke-width="1"/>

  <text x="560" y="378" fill="#00ff88" font-size="8">Search: match against small children (precise)</text>
  <text x="560" y="392" fill="#00ff88" font-size="8">Return: parent chunk to LLM (full context)</text>

  <!-- Comparison Table -->
  <rect x="30" y="405" width="990" height="180" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="525" y="430" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">Chunking Strategy Decision Guide</text>

  <!-- Table headers -->
  <rect x="50" y="440" width="950" height="25" fill="#0f3460" rx="3"/>
  <text x="140" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Strategy</text>
  <text x="290" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Chunk Size</text>
  <text x="430" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Best For</text>
  <text x="610" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Speed</text>
  <text x="730" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Quality</text>
  <text x="890" y="457" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Complexity</text>

  <!-- Row 1 -->
  <text x="140" y="483" text-anchor="middle" fill="#54a0ff" font-size="9">Fixed-Size</text>
  <text x="290" y="483" text-anchor="middle" fill="#aaaaaa" font-size="9">256-512 tokens</text>
  <text x="430" y="483" text-anchor="middle" fill="#aaaaaa" font-size="9">General text, quick setup</text>
  <text x="610" y="483" text-anchor="middle" fill="#00ff88" font-size="9">Fast</text>
  <text x="730" y="483" text-anchor="middle" fill="#feca57" font-size="9">Medium</text>
  <text x="890" y="483" text-anchor="middle" fill="#00ff88" font-size="9">Low</text>

  <!-- Row 2 -->
  <text x="140" y="505" text-anchor="middle" fill="#00ff88" font-size="9">Semantic</text>
  <text x="290" y="505" text-anchor="middle" fill="#aaaaaa" font-size="9">Variable</text>
  <text x="430" y="505" text-anchor="middle" fill="#aaaaaa" font-size="9">Topic-dense documents</text>
  <text x="610" y="505" text-anchor="middle" fill="#ff6b6b" font-size="9">Slow</text>
  <text x="730" y="505" text-anchor="middle" fill="#00ff88" font-size="9">High</text>
  <text x="890" y="505" text-anchor="middle" fill="#feca57" font-size="9">Medium</text>

  <!-- Row 3 -->
  <text x="140" y="527" text-anchor="middle" fill="#feca57" font-size="9">Structure-Aware</text>
  <text x="290" y="527" text-anchor="middle" fill="#aaaaaa" font-size="9">By section</text>
  <text x="430" y="527" text-anchor="middle" fill="#aaaaaa" font-size="9">Markdown, HTML, code</text>
  <text x="610" y="527" text-anchor="middle" fill="#00ff88" font-size="9">Fast</text>
  <text x="730" y="527" text-anchor="middle" fill="#00ff88" font-size="9">High</text>
  <text x="890" y="527" text-anchor="middle" fill="#00ff88" font-size="9">Low</text>

  <!-- Row 4 -->
  <text x="140" y="549" text-anchor="middle" fill="#a29bfe" font-size="9">Parent-Child</text>
  <text x="290" y="549" text-anchor="middle" fill="#aaaaaa" font-size="9">Small search, large return</text>
  <text x="430" y="549" text-anchor="middle" fill="#aaaaaa" font-size="9">Complex docs needing context</text>
  <text x="610" y="549" text-anchor="middle" fill="#feca57" font-size="9">Medium</text>
  <text x="730" y="549" text-anchor="middle" fill="#00ff88" font-size="9">Highest</text>
  <text x="890" y="549" text-anchor="middle" fill="#ff6b6b" font-size="9">High</text>

  <!-- Golden rule -->
  <text x="525" y="578" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Golden Rule: There is no universal "best" — test 256, 512, 1024 tokens on YOUR data and measure recall</text>

  <defs>
    <marker id="csArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
