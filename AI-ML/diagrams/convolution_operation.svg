<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="550" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Convolution Operation — How a Filter Scans an Image</text>

  <!-- Input Image (5x5) -->
  <text x="130" y="70" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">Input Image (5×5)</text>

  <g transform="translate(40, 80)">
    <!-- Grid cells -->
    <rect x="0" y="0" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="18" y="22" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="36" y="0" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="54" y="22" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="72" y="0" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="90" y="22" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="108" y="0" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="126" y="22" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="144" y="0" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="162" y="22" text-anchor="middle" fill="#fff" font-size="10">1</text>

    <rect x="0" y="36" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="18" y="58" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="36" y="36" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="54" y="58" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="72" y="36" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="90" y="58" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="108" y="36" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="126" y="58" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="144" y="36" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="162" y="58" text-anchor="middle" fill="#fff" font-size="10">0</text>

    <rect x="0" y="72" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="18" y="94" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="36" y="72" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="54" y="94" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="72" y="72" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="90" y="94" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="108" y="72" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="126" y="94" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="144" y="72" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="162" y="94" text-anchor="middle" fill="#fff" font-size="10">1</text>

    <rect x="0" y="108" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="18" y="130" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="36" y="108" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="54" y="130" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="72" y="108" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="90" y="130" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="108" y="108" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="126" y="130" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="144" y="108" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="162" y="130" text-anchor="middle" fill="#fff" font-size="10">0</text>

    <rect x="0" y="144" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="18" y="166" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="36" y="144" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="54" y="166" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="72" y="144" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="90" y="166" text-anchor="middle" fill="#fff" font-size="10">0</text>
    <rect x="108" y="144" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="126" y="166" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="144" y="144" width="36" height="36" fill="#16213e" stroke="#444" stroke-width="1"/><text x="162" y="166" text-anchor="middle" fill="#fff" font-size="10">0</text>

    <!-- Highlight 3x3 region -->
    <rect x="0" y="0" width="108" height="108" fill="none" stroke="#e94560" stroke-width="3" rx="2"/>
  </g>

  <!-- Filter/Kernel (3x3) -->
  <text x="350" y="70" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Filter/Kernel (3×3)</text>

  <g transform="translate(290, 100)">
    <rect x="0" y="0" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="20" y="25" text-anchor="middle" fill="#feca57" font-size="12">1</text>
    <rect x="40" y="0" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="60" y="25" text-anchor="middle" fill="#feca57" font-size="12">0</text>
    <rect x="80" y="0" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="100" y="25" text-anchor="middle" fill="#feca57" font-size="12">1</text>
    <rect x="0" y="40" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="20" y="65" text-anchor="middle" fill="#feca57" font-size="12">0</text>
    <rect x="40" y="40" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="60" y="65" text-anchor="middle" fill="#feca57" font-size="12">1</text>
    <rect x="80" y="40" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="100" y="65" text-anchor="middle" fill="#feca57" font-size="12">0</text>
    <rect x="0" y="80" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="20" y="105" text-anchor="middle" fill="#feca57" font-size="12">1</text>
    <rect x="40" y="80" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="60" y="105" text-anchor="middle" fill="#feca57" font-size="12">0</text>
    <rect x="80" y="80" width="40" height="40" fill="#0f3460" stroke="#feca57" stroke-width="2"/><text x="100" y="105" text-anchor="middle" fill="#feca57" font-size="12">1</text>
  </g>

  <!-- Multiplication symbol -->
  <text x="270" y="175" text-anchor="middle" fill="#ffffff" font-size="24">×</text>

  <!-- Arrow -->
  <line x1="420" y1="175" x2="470" y2="175" stroke="#ffffff" stroke-width="2" marker-end="url(#cnnArrow)"/>
  <text x="445" y="165" text-anchor="middle" fill="#aaaaaa" font-size="9">element-wise</text>
  <text x="445" y="195" text-anchor="middle" fill="#aaaaaa" font-size="9">multiply + sum</text>

  <!-- Computation -->
  <rect x="480" y="100" width="220" height="120" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="590" y="125" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">Computation:</text>
  <text x="590" y="148" text-anchor="middle" fill="#ffffff" font-size="10">(1×1)+(0×0)+(1×1)+</text>
  <text x="590" y="166" text-anchor="middle" fill="#ffffff" font-size="10">(0×0)+(1×1)+(1×0)+</text>
  <text x="590" y="184" text-anchor="middle" fill="#ffffff" font-size="10">(1×1)+(1×0)+(0×1)</text>
  <text x="590" y="210" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">= 4</text>

  <!-- Output Feature Map -->
  <text x="830" y="70" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">Output Feature Map (3×3)</text>

  <g transform="translate(760, 100)">
    <rect x="0" y="0" width="45" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="2"/><text x="22" y="28" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">4</text>
    <rect x="45" y="0" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="67" y="28" text-anchor="middle" fill="#aaa" font-size="12">3</text>
    <rect x="90" y="0" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="112" y="28" text-anchor="middle" fill="#aaa" font-size="12">4</text>
    <rect x="0" y="45" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="22" y="73" text-anchor="middle" fill="#aaa" font-size="12">2</text>
    <rect x="45" y="45" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="67" y="73" text-anchor="middle" fill="#aaa" font-size="12">4</text>
    <rect x="90" y="45" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="112" y="73" text-anchor="middle" fill="#aaa" font-size="12">3</text>
    <rect x="0" y="90" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="22" y="118" text-anchor="middle" fill="#aaa" font-size="12">2</text>
    <rect x="45" y="90" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="67" y="118" text-anchor="middle" fill="#aaa" font-size="12">3</text>
    <rect x="90" y="90" width="45" height="45" fill="#16213e" stroke="#444" stroke-width="1"/><text x="112" y="118" text-anchor="middle" fill="#aaa" font-size="12">4</text>
  </g>

  <!-- Formula -->
  <rect x="30" y="310" width="940" height="90" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="335" text-anchor="middle" fill="#54a0ff" font-size="14" font-weight="bold">Output Size Formula</text>
  <text x="500" y="360" text-anchor="middle" fill="#ffffff" font-size="13">Output = ⌊(Input - Kernel + 2×Padding) / Stride⌋ + 1</text>
  <text x="500" y="385" text-anchor="middle" fill="#aaaaaa" font-size="11">Example: Input=5, Kernel=3, Padding=0, Stride=1 → Output = (5 - 3 + 0)/1 + 1 = 3</text>

  <!-- Key concepts -->
  <rect x="30" y="420" width="300" height="110" fill="#16213e" stroke="#e94560" stroke-width="1.5" rx="8"/>
  <text x="180" y="445" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Stride</text>
  <text x="180" y="465" text-anchor="middle" fill="#ffffff" font-size="10">How many pixels the filter</text>
  <text x="180" y="480" text-anchor="middle" fill="#ffffff" font-size="10">moves each step</text>
  <text x="180" y="500" text-anchor="middle" fill="#aaaaaa" font-size="9">Stride=1: slide by 1 pixel</text>
  <text x="180" y="515" text-anchor="middle" fill="#aaaaaa" font-size="9">Stride=2: skip every other → halves size</text>

  <rect x="350" y="420" width="300" height="110" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="500" y="445" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Padding</text>
  <text x="500" y="465" text-anchor="middle" fill="#ffffff" font-size="10">Zeros added around the border</text>
  <text x="500" y="480" text-anchor="middle" fill="#ffffff" font-size="10">to control output size</text>
  <text x="500" y="500" text-anchor="middle" fill="#aaaaaa" font-size="9">padding='same': output = input size</text>
  <text x="500" y="515" text-anchor="middle" fill="#aaaaaa" font-size="9">padding='valid': no padding (shrinks)</text>

  <rect x="670" y="420" width="300" height="110" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="8"/>
  <text x="820" y="445" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Multiple Filters</text>
  <text x="820" y="465" text-anchor="middle" fill="#ffffff" font-size="10">Each filter detects ONE feature</text>
  <text x="820" y="480" text-anchor="middle" fill="#ffffff" font-size="10">(edge, corner, texture, etc.)</text>
  <text x="820" y="500" text-anchor="middle" fill="#aaaaaa" font-size="9">32 filters → 32 output channels</text>
  <text x="820" y="515" text-anchor="middle" fill="#aaaaaa" font-size="9">= 32 different feature maps</text>

  <defs>
    <marker id="cnnArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffffff"/></marker>
  </defs>
</svg>
