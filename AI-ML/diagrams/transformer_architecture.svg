<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="600" fill="#1a1a2e" rx="10"/>
  <text x="500" y="30" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold">Transformer Architecture — Encoder-Decoder</text>

  <!-- Encoder Stack -->
  <rect x="80" y="50" width="350" height="500" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="255" y="75" text-anchor="middle" fill="#54a0ff" font-size="14" font-weight="bold">ENCODER (×N)</text>

  <!-- Encoder Layer -->
  <rect x="120" y="90" width="270" height="200" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="8" stroke-dasharray="4"/>
  <text x="255" y="108" text-anchor="middle" fill="#aaaaaa" font-size="9">× 6 layers (BERT-base: 12)</text>

  <!-- Multi-Head Self-Attention -->
  <rect x="140" y="120" width="230" height="50" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="255" y="143" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Multi-Head Self-Attention</text>
  <text x="255" y="160" text-anchor="middle" fill="#aaaaaa" font-size="8">Each token attends to ALL tokens</text>

  <!-- Add & Norm 1 -->
  <rect x="140" y="178" width="230" height="25" fill="#1a1a2e" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="255" y="195" text-anchor="middle" fill="#feca57" font-size="8">Add &amp; LayerNorm (residual connection)</text>

  <!-- Feed Forward -->
  <rect x="140" y="212" width="230" height="50" fill="#1a1a2e" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="255" y="235" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Feed-Forward Network</text>
  <text x="255" y="252" text-anchor="middle" fill="#aaaaaa" font-size="8">FFN(x) = ReLU(xW₁+b₁)W₂+b₂</text>

  <!-- Add & Norm 2 -->
  <rect x="140" y="270" width="230" height="25" fill="#1a1a2e" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="255" y="287" text-anchor="middle" fill="#feca57" font-size="8">Add &amp; LayerNorm (residual connection)</text>

  <!-- Input Embedding + Pos Enc -->
  <rect x="140" y="380" width="230" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="255" y="400" text-anchor="middle" fill="#00ff88" font-size="9">Input Embedding + Positional Encoding</text>

  <!-- Input -->
  <rect x="180" y="440" width="150" height="30" fill="#0f3460" stroke="#ffffff" stroke-width="1" rx="4"/>
  <text x="255" y="460" text-anchor="middle" fill="#ffffff" font-size="9">Input: "The cat sat"</text>

  <!-- Arrow from input to embedding -->
  <line x1="255" y1="440" x2="255" y2="410" stroke="#fff" stroke-width="1.5" marker-end="url(#tfA)"/>
  <!-- Arrow from embedding to encoder -->
  <line x1="255" y1="380" x2="255" y2="295" stroke="#fff" stroke-width="1.5" marker-end="url(#tfA)"/>

  <!-- Encoder output note -->
  <text x="255" y="320" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Contextual representations</text>
  <text x="255" y="340" text-anchor="middle" fill="#aaaaaa" font-size="8">Each token enriched with context</text>
  <text x="255" y="355" text-anchor="middle" fill="#aaaaaa" font-size="8">from all other tokens</text>

  <!-- Decoder Stack -->
  <rect x="540" y="50" width="400" height="500" fill="#16213e" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="740" y="75" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">DECODER (×N)</text>

  <!-- Decoder Layer -->
  <rect x="570" y="90" width="340" height="290" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="8" stroke-dasharray="4"/>
  <text x="740" y="108" text-anchor="middle" fill="#aaaaaa" font-size="9">× 6 layers</text>

  <!-- Masked Self-Attention -->
  <rect x="590" y="120" width="300" height="50" fill="#1a1a2e" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="740" y="143" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">Masked Multi-Head Self-Attention</text>
  <text x="740" y="160" text-anchor="middle" fill="#aaaaaa" font-size="8">Can only attend to PREVIOUS positions (causal)</text>

  <!-- Add & Norm -->
  <rect x="590" y="178" width="300" height="25" fill="#1a1a2e" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="740" y="195" text-anchor="middle" fill="#feca57" font-size="8">Add &amp; LayerNorm</text>

  <!-- Cross-Attention -->
  <rect x="590" y="212" width="300" height="50" fill="#1a1a2e" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="740" y="232" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Cross-Attention (Encoder-Decoder)</text>
  <text x="740" y="252" text-anchor="middle" fill="#aaaaaa" font-size="8">Q from decoder, K/V from encoder output</text>

  <!-- Arrow from encoder to cross-attention -->
  <line x1="430" y1="235" x2="590" y2="235" stroke="#54a0ff" stroke-width="2" marker-end="url(#tfA)"/>
  <text x="510" y="225" text-anchor="middle" fill="#54a0ff" font-size="8">K, V</text>

  <!-- Add & Norm -->
  <rect x="590" y="270" width="300" height="25" fill="#1a1a2e" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="740" y="287" text-anchor="middle" fill="#feca57" font-size="8">Add &amp; LayerNorm</text>

  <!-- Feed Forward -->
  <rect x="590" y="303" width="300" height="50" fill="#1a1a2e" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="740" y="323" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Feed-Forward Network</text>
  <text x="740" y="340" text-anchor="middle" fill="#aaaaaa" font-size="8">Position-wise, same as encoder</text>

  <!-- Add & Norm -->
  <rect x="590" y="361" width="300" height="25" fill="#1a1a2e" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="740" y="378" text-anchor="middle" fill="#feca57" font-size="8">Add &amp; LayerNorm</text>

  <!-- Output embedding -->
  <rect x="620" y="430" width="240" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="740" y="450" text-anchor="middle" fill="#00ff88" font-size="9">Output Embedding + Positional Encoding</text>

  <!-- Output tokens -->
  <rect x="650" y="480" width="180" height="30" fill="#0f3460" stroke="#ffffff" stroke-width="1" rx="4"/>
  <text x="740" y="500" text-anchor="middle" fill="#ffffff" font-size="9">Output: "&lt;s&gt; Le chat"</text>
  <text x="740" y="520" text-anchor="middle" fill="#aaaaaa" font-size="7">(shifted right — teacher forcing)</text>

  <!-- Arrow from output to embedding -->
  <line x1="740" y1="480" x2="740" y2="460" stroke="#fff" stroke-width="1.5" marker-end="url(#tfA)"/>
  <!-- Arrow from embedding to decoder -->
  <line x1="740" y1="430" x2="740" y2="386" stroke="#fff" stroke-width="1.5" marker-end="url(#tfA)"/>

  <!-- Linear + Softmax (top) -->
  <rect x="620" y="395" width="100" height="25" fill="#1a1a2e" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="670" y="412" text-anchor="middle" fill="#ffffff" font-size="8">Linear → Softmax</text>
  <text x="740" y="412" fill="#aaaaaa" font-size="7">→ next token probs</text>

  <!-- Key insight at bottom -->
  <rect x="80" y="555" width="860" height="30" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="6"/>
  <text x="500" y="575" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Key: Encoder sees full input bidirectionally | Decoder generates left-to-right with causal mask | Cross-attention connects them</text>

  <defs>
    <marker id="tfA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
