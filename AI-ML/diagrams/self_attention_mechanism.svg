<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="520" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Self-Attention Mechanism — "Attention Is All You Need"</text>

  <!-- Input tokens -->
  <text x="100" y="70" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Input Sequence</text>
  <rect x="40" y="80" width="55" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="67" y="100" text-anchor="middle" fill="#00ff88" font-size="9">The</text>
  <rect x="100" y="80" width="55" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="127" y="100" text-anchor="middle" fill="#00ff88" font-size="9">cat</text>
  <rect x="160" y="80" width="55" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="187" y="100" text-anchor="middle" fill="#00ff88" font-size="9">sat</text>

  <!-- Q, K, V projections -->
  <rect x="30" y="140" width="200" height="110" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="130" y="162" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">Linear Projections</text>

  <!-- Q -->
  <rect x="45" y="175" width="50" height="25" fill="#e94560" opacity="0.4" rx="3"/>
  <text x="70" y="192" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Q</text>
  <!-- K -->
  <rect x="105" y="175" width="50" height="25" fill="#feca57" opacity="0.4" rx="3"/>
  <text x="130" y="192" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">K</text>
  <!-- V -->
  <rect x="165" y="175" width="50" height="25" fill="#00d2d3" opacity="0.4" rx="3"/>
  <text x="190" y="192" text-anchor="middle" fill="#00d2d3" font-size="9" font-weight="bold">V</text>

  <text x="130" y="225" text-anchor="middle" fill="#aaaaaa" font-size="8">Q = X·W_Q, K = X·W_K, V = X·W_V</text>
  <text x="130" y="240" text-anchor="middle" fill="#aaaaaa" font-size="8">Each token gets its own Q, K, V</text>

  <!-- Main attention computation -->
  <rect x="260" y="55" width="470" height="240" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="495" y="80" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Scaled Dot-Product Attention</text>

  <!-- Formula -->
  <text x="495" y="108" text-anchor="middle" fill="#ffffff" font-size="13">Attention(Q, K, V) = softmax(Q·K^T / √d_k) · V</text>

  <!-- Step 1: QK^T -->
  <rect x="280" y="125" width="130" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="345" y="145" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Step 1: Q · K^T</text>
  <text x="345" y="162" text-anchor="middle" fill="#ffffff" font-size="8">Compute similarity</text>
  <text x="345" y="177" text-anchor="middle" fill="#ffffff" font-size="8">between all token pairs</text>

  <line x1="410" y1="155" x2="430" y2="155" stroke="#fff" stroke-width="1" marker-end="url(#attnA)"/>

  <!-- Step 2: Scale -->
  <rect x="430" y="125" width="100" height="60" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="480" y="145" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Step 2: Scale</text>
  <text x="480" y="162" text-anchor="middle" fill="#ffffff" font-size="8">÷ √d_k</text>
  <text x="480" y="177" text-anchor="middle" fill="#aaaaaa" font-size="7">Prevents vanishing grads</text>

  <line x1="530" y1="155" x2="550" y2="155" stroke="#fff" stroke-width="1" marker-end="url(#attnA)"/>

  <!-- Step 3: Softmax -->
  <rect x="550" y="125" width="100" height="60" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="600" y="145" text-anchor="middle" fill="#00d2d3" font-size="9" font-weight="bold">Step 3: Softmax</text>
  <text x="600" y="162" text-anchor="middle" fill="#ffffff" font-size="8">Normalize to</text>
  <text x="600" y="177" text-anchor="middle" fill="#ffffff" font-size="8">probabilities (sum=1)</text>

  <line x1="650" y1="155" x2="670" y2="155" stroke="#fff" stroke-width="1" marker-end="url(#attnA)"/>

  <!-- Step 4: Weighted V -->
  <rect x="670" y="125" width="100" height="60" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="720" y="145" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Step 4: × V</text>
  <text x="720" y="162" text-anchor="middle" fill="#ffffff" font-size="8">Weighted sum of</text>
  <text x="720" y="177" text-anchor="middle" fill="#ffffff" font-size="8">value vectors</text>

  <!-- Attention matrix visualization -->
  <text x="380" y="210" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Attention Weights (example for "sat"):</text>
  <text x="310" y="233" fill="#aaaaaa" font-size="8">The</text>
  <text x="355" y="233" fill="#aaaaaa" font-size="8">cat</text>
  <text x="400" y="233" fill="#aaaaaa" font-size="8">sat</text>

  <rect x="300" y="238" width="40" height="18" fill="#e94560" opacity="0.2" rx="2"/>
  <text x="320" y="252" text-anchor="middle" fill="#fff" font-size="8">0.15</text>
  <rect x="345" y="238" width="40" height="18" fill="#e94560" opacity="0.6" rx="2"/>
  <text x="365" y="252" text-anchor="middle" fill="#fff" font-size="8">0.55</text>
  <rect x="390" y="238" width="40" height="18" fill="#e94560" opacity="0.3" rx="2"/>
  <text x="410" y="252" text-anchor="middle" fill="#fff" font-size="8">0.30</text>

  <text x="470" y="252" fill="#aaaaaa" font-size="8">← "sat" attends mostly to "cat" (who sat?)</text>
  <text x="380" y="278" text-anchor="middle" fill="#feca57" font-size="9">Each token learns WHAT to attend to via Q·K similarity</text>

  <!-- Why it works -->
  <rect x="760" y="55" width="210" height="240" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="8"/>
  <text x="865" y="80" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold">Why Self-Attention?</text>

  <text x="780" y="105" fill="#00ff88" font-size="9" font-weight="bold">✓ Parallel computation</text>
  <text x="780" y="122" fill="#ffffff" font-size="8">All positions computed at once</text>
  <text x="780" y="137" fill="#ffffff" font-size="8">(RNN must go sequentially)</text>

  <text x="780" y="160" fill="#00ff88" font-size="9" font-weight="bold">✓ O(1) path length</text>
  <text x="780" y="177" fill="#ffffff" font-size="8">Any token can attend to any</text>
  <text x="780" y="192" fill="#ffffff" font-size="8">other directly (RNN: O(n))</text>

  <text x="780" y="215" fill="#00ff88" font-size="9" font-weight="bold">✓ Dynamic relationships</text>
  <text x="780" y="232" fill="#ffffff" font-size="8">Attention weights change per</text>
  <text x="780" y="247" fill="#ffffff" font-size="8">input (unlike static convolutions)</text>

  <text x="780" y="270" fill="#e94560" font-size="9" font-weight="bold">✗ O(n²) memory/compute</text>
  <text x="780" y="287" fill="#ffffff" font-size="8">Full attention matrix: seq_len²</text>

  <!-- Q, K, V intuition -->
  <rect x="30" y="310" width="940" height="190" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="335" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">Q, K, V Intuition — The Library Analogy</text>

  <rect x="60" y="355" width="270" height="70" fill="#16213e" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="195" y="378" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Query (Q) — "What am I looking for?"</text>
  <text x="195" y="396" text-anchor="middle" fill="#ffffff" font-size="9">The question each token asks</text>
  <text x="195" y="412" text-anchor="middle" fill="#aaaaaa" font-size="8">Like: "I need info about subjects/actions"</text>

  <rect x="360" y="355" width="270" height="70" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="495" y="378" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Key (K) — "What do I contain?"</text>
  <text x="495" y="396" text-anchor="middle" fill="#ffffff" font-size="9">The label/description of each token</text>
  <text x="495" y="412" text-anchor="middle" fill="#aaaaaa" font-size="8">Like: book titles on library shelves</text>

  <rect x="660" y="355" width="270" height="70" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="6"/>
  <text x="795" y="378" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Value (V) — "What info do I give?"</text>
  <text x="795" y="396" text-anchor="middle" fill="#ffffff" font-size="9">The actual content/information</text>
  <text x="795" y="412" text-anchor="middle" fill="#aaaaaa" font-size="8">Like: the book's content itself</text>

  <text x="500" y="455" text-anchor="middle" fill="#ffffff" font-size="10">Q·K^T = "How relevant is each key to my query?" → weights for retrieving values</text>
  <text x="500" y="475" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Result: Each token's output is a weighted sum of ALL tokens' values, weighted by relevance</text>
  <text x="500" y="495" text-anchor="middle" fill="#aaaaaa" font-size="9">This is what makes Transformers so powerful: every token can gather information from the entire sequence</text>

  <defs>
    <marker id="attnA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
