<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="420" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Transfer Learning Pipeline — From Pre-trained to Custom Model</text>

  <!-- Step 1 -->
  <rect x="30" y="60" width="180" height="130" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="120" y="85" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">1. Load Pre-trained</text>
  <rect x="50" y="95" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="120" y="112" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen)</text>
  <rect x="50" y="123" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="120" y="140" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen)</text>
  <rect x="50" y="151" width="140" height="25" fill="#e94560" opacity="0.5" rx="3"/>
  <text x="120" y="168" text-anchor="middle" fill="#ffffff" font-size="9">FC: 1000 classes ✗</text>
  <text x="120" y="185" text-anchor="middle" fill="#aaaaaa" font-size="8">ImageNet weights</text>

  <line x1="210" y1="125" x2="250" y2="125" stroke="#ffffff" stroke-width="2" marker-end="url(#tlA)"/>

  <!-- Step 2 -->
  <rect x="250" y="60" width="180" height="130" fill="#16213e" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="340" y="85" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">2. Remove FC Head</text>
  <rect x="270" y="95" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="340" y="112" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen)</text>
  <rect x="270" y="123" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="340" y="140" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen)</text>
  <rect x="270" y="151" width="140" height="25" fill="#16213e" stroke="#feca57" stroke-width="1.5" stroke-dasharray="4" rx="3"/>
  <text x="340" y="168" text-anchor="middle" fill="#feca57" font-size="9">← removed</text>
  <text x="340" y="185" text-anchor="middle" fill="#aaaaaa" font-size="8">Keep feature extractor</text>

  <line x1="430" y1="125" x2="470" y2="125" stroke="#ffffff" stroke-width="2" marker-end="url(#tlA)"/>

  <!-- Step 3 -->
  <rect x="470" y="60" width="180" height="130" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="560" y="85" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">3. Add New Head</text>
  <rect x="490" y="95" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="560" y="112" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen) 🔒</text>
  <rect x="490" y="123" width="140" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="560" y="140" text-anchor="middle" fill="#ffffff" font-size="9">Conv layers (frozen) 🔒</text>
  <rect x="490" y="151" width="140" height="25" fill="#00ff88" opacity="0.5" rx="3"/>
  <text x="560" y="168" text-anchor="middle" fill="#ffffff" font-size="9">New FC: 5 classes ✓</text>
  <text x="560" y="185" text-anchor="middle" fill="#aaaaaa" font-size="8">Your task's classes</text>

  <line x1="650" y1="125" x2="690" y2="125" stroke="#ffffff" stroke-width="2" marker-end="url(#tlA)"/>

  <!-- Step 4 -->
  <rect x="690" y="60" width="140" height="130" fill="#16213e" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="760" y="85" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">4. Train Head</text>
  <rect x="710" y="95" width="100" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="760" y="112" text-anchor="middle" fill="#ffffff" font-size="9">Frozen 🔒</text>
  <rect x="710" y="123" width="100" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="760" y="140" text-anchor="middle" fill="#ffffff" font-size="9">Frozen 🔒</text>
  <rect x="710" y="151" width="100" height="25" fill="#00ff88" rx="3"/>
  <text x="760" y="168" text-anchor="middle" fill="#000" font-size="9">Training! 🔥</text>
  <text x="760" y="185" text-anchor="middle" fill="#aaaaaa" font-size="8">lr = 1e-3</text>

  <line x1="830" y1="125" x2="860" y2="125" stroke="#ffffff" stroke-width="2" marker-end="url(#tlA)"/>

  <!-- Step 5 -->
  <rect x="860" y="60" width="110" height="130" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="10"/>
  <text x="915" y="85" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">5. Fine-tune</text>
  <rect x="875" y="95" width="80" height="25" fill="#54a0ff" opacity="0.3" rx="3"/>
  <text x="915" y="112" text-anchor="middle" fill="#ffffff" font-size="9">Frozen 🔒</text>
  <rect x="875" y="123" width="80" height="25" fill="#feca57" opacity="0.5" rx="3"/>
  <text x="915" y="140" text-anchor="middle" fill="#ffffff" font-size="9">Unfrozen!</text>
  <rect x="875" y="151" width="80" height="25" fill="#00ff88" rx="3"/>
  <text x="915" y="168" text-anchor="middle" fill="#000" font-size="9">Training</text>
  <text x="915" y="185" text-anchor="middle" fill="#aaaaaa" font-size="8">lr = 1e-5</text>

  <!-- When to use what -->
  <rect x="30" y="210" width="940" height="190" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="500" y="235" text-anchor="middle" fill="#feca57" font-size="14" font-weight="bold">When to Use Each Strategy</text>

  <!-- Decision matrix -->
  <text x="270" y="260" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Small Dataset (&lt;1K images)</text>
  <text x="700" y="260" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Large Dataset (&gt;10K images)</text>
  <line x1="485" y1="245" x2="485" y2="390" stroke="#444" stroke-width="1"/>
  <line x1="50" y1="270" x2="950" y2="270" stroke="#444" stroke-width="1"/>

  <text x="100" y="290" fill="#ffffff" font-size="10" font-weight="bold">Similar domain</text>
  <text x="100" y="305" fill="#ffffff" font-size="10">(e.g., cats→dogs):</text>
  <text x="270" y="300" text-anchor="middle" fill="#00ff88" font-size="10">Feature extraction only</text>
  <text x="270" y="315" text-anchor="middle" fill="#aaaaaa" font-size="9">Freeze all, train FC head</text>

  <text x="700" y="300" text-anchor="middle" fill="#00d2d3" font-size="10">Fine-tune last few layers</text>
  <text x="700" y="315" text-anchor="middle" fill="#aaaaaa" font-size="9">Low LR on backbone, higher on head</text>

  <line x1="50" y1="325" x2="950" y2="325" stroke="#444" stroke-width="1" stroke-dasharray="3"/>

  <text x="100" y="345" fill="#ffffff" font-size="10" font-weight="bold">Different domain</text>
  <text x="100" y="360" fill="#ffffff" font-size="10">(e.g., photos→X-rays):</text>
  <text x="270" y="355" text-anchor="middle" fill="#feca57" font-size="10">Fine-tune more layers</text>
  <text x="270" y="370" text-anchor="middle" fill="#aaaaaa" font-size="9">Early layers still useful (edges)</text>

  <text x="700" y="355" text-anchor="middle" fill="#e94560" font-size="10">Train from scratch (or full fine-tune)</text>
  <text x="700" y="370" text-anchor="middle" fill="#aaaaaa" font-size="9">Domain too different for transfer</text>

  <!-- Key tip -->
  <text x="500" y="392" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Golden Rule: ALWAYS start with pre-trained weights. Even for different domains, it converges faster.</text>

  <defs>
    <marker id="tlA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffffff"/></marker>
  </defs>
</svg>
