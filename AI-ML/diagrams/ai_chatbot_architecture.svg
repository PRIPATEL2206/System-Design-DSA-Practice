<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 560" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="560" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">AI Chatbot Architecture — Production System Design</text>

  <!-- Client Layer -->
  <rect x="30" y="55" width="990" height="55" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="525" y="75" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">CLIENT LAYER</text>
  <text x="150" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">Web App (React)</text>
  <text x="350" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">Mobile (iOS/Android)</text>
  <text x="550" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">API (REST/WebSocket)</text>
  <text x="750" y="95" text-anchor="middle" fill="#aaaaaa" font-size="8">Slack/Teams Integration</text>
  <text x="930" y="95" text-anchor="middle" fill="#feca57" font-size="7">SSE streaming</text>

  <!-- API Gateway -->
  <rect x="30" y="120" width="990" height="40" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="525" y="145" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">API GATEWAY — Rate Limiting | Auth | Session Routing | Load Balancing</text>

  <!-- Orchestration Layer -->
  <rect x="30" y="170" width="990" height="200" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="525" y="193" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">ORCHESTRATION LAYER (Stateless Workers)</text>

  <!-- Query Router -->
  <rect x="50" y="205" width="120" height="50" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="110" y="225" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Intent Router</text>
  <text x="110" y="240" text-anchor="middle" fill="#aaaaaa" font-size="6">Simple/Complex?</text>
  <text x="110" y="250" text-anchor="middle" fill="#aaaaaa" font-size="6">Need RAG?</text>

  <line x1="175" y1="230" x2="205" y2="230" stroke="#fff" stroke-width="1" marker-end="url(#cbArr)"/>

  <!-- Semantic Cache -->
  <rect x="50" y="270" width="120" height="40" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="4"/>
  <text x="110" y="290" text-anchor="middle" fill="#00d2d3" font-size="8" font-weight="bold">Semantic Cache</text>
  <text x="110" y="303" text-anchor="middle" fill="#aaaaaa" font-size="6">30% hit rate → skip LLM</text>

  <!-- RAG Pipeline -->
  <rect x="210" y="205" width="250" height="100" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="335" y="223" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">RAG Pipeline</text>

  <rect x="225" y="233" width="65" height="25" fill="#16213e" stroke="#54a0ff" stroke-width="1" rx="3"/>
  <text x="257" y="249" text-anchor="middle" fill="#ffffff" font-size="6">Embed Query</text>

  <rect x="298" y="233" width="65" height="25" fill="#16213e" stroke="#54a0ff" stroke-width="1" rx="3"/>
  <text x="330" y="249" text-anchor="middle" fill="#ffffff" font-size="6">Retrieve</text>

  <rect x="371" y="233" width="65" height="25" fill="#16213e" stroke="#54a0ff" stroke-width="1" rx="3"/>
  <text x="403" y="249" text-anchor="middle" fill="#ffffff" font-size="6">Re-rank</text>

  <text x="335" y="280" text-anchor="middle" fill="#aaaaaa" font-size="7">Hybrid: Vector (0.7) + BM25 (0.3)</text>
  <text x="335" y="295" text-anchor="middle" fill="#aaaaaa" font-size="7">Cross-encoder re-ranker → top-5</text>

  <line x1="465" y1="245" x2="495" y2="245" stroke="#fff" stroke-width="1" marker-end="url(#cbArr)"/>

  <!-- LLM Selection -->
  <rect x="500" y="205" width="180" height="100" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="6"/>
  <text x="590" y="223" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">LLM Generation</text>

  <rect x="515" y="235" width="150" height="22" fill="#16213e" stroke="#feca57" stroke-width="1" rx="3"/>
  <text x="590" y="250" text-anchor="middle" fill="#feca57" font-size="7">GPT-4o-mini (80% queries)</text>

  <rect x="515" y="262" width="150" height="22" fill="#16213e" stroke="#e94560" stroke-width="1" rx="3"/>
  <text x="590" y="277" text-anchor="middle" fill="#e94560" font-size="7">GPT-4o (20% complex)</text>

  <text x="590" y="300" text-anchor="middle" fill="#aaaaaa" font-size="6">Streaming tokens via SSE</text>

  <line x1="685" y1="250" x2="710" y2="250" stroke="#fff" stroke-width="1" marker-end="url(#cbArr)"/>

  <!-- Guardrails -->
  <rect x="715" y="205" width="130" height="100" fill="#0f3460" stroke="#ff6b6b" stroke-width="1.5" rx="6"/>
  <text x="780" y="223" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="bold">Guardrails</text>
  <text x="730" y="243" fill="#ffffff" font-size="7">• Input sanitization</text>
  <text x="730" y="258" fill="#ffffff" font-size="7">• Prompt injection check</text>
  <text x="730" y="273" fill="#ffffff" font-size="7">• PII filtering</text>
  <text x="730" y="288" fill="#ffffff" font-size="7">• Toxicity filter</text>
  <text x="730" y="303" fill="#ffffff" font-size="7">• Citation enforcement</text>

  <!-- Tools -->
  <rect x="860" y="205" width="145" height="100" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="932" y="223" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Tool Execution</text>
  <text x="875" y="243" fill="#ffffff" font-size="7">• Web search</text>
  <text x="875" y="258" fill="#ffffff" font-size="7">• Database queries</text>
  <text x="875" y="273" fill="#ffffff" font-size="7">• Calculator</text>
  <text x="875" y="288" fill="#ffffff" font-size="7">• API calls</text>
  <text x="875" y="303" fill="#ffffff" font-size="7">• File operations</text>

  <!-- Memory -->
  <rect x="210" y="315" width="790" height="40" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="605" y="337" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">MEMORY — Redis (chat history, session state, user preferences) | 100-msg window + summary</text>

  <!-- Data Layer -->
  <rect x="30" y="380" width="990" height="80" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="403" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">DATA &amp; ML LAYER</text>

  <rect x="50" y="412" width="200" height="35" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="150" y="434" text-anchor="middle" fill="#54a0ff" font-size="8">Vector DB (Pinecone/Weaviate)</text>

  <rect x="270" y="412" width="200" height="35" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="370" y="434" text-anchor="middle" fill="#00ff88" font-size="8">Knowledge Base (S3 + embedding pipeline)</text>

  <rect x="490" y="412" width="200" height="35" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="590" y="434" text-anchor="middle" fill="#e94560" font-size="8">Analytics DB (conversations, feedback)</text>

  <rect x="710" y="412" width="200" height="35" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="810" y="434" text-anchor="middle" fill="#a29bfe" font-size="8">Model Registry (adapters, versions)</text>

  <!-- Metrics bar -->
  <rect x="30" y="470" width="990" height="75" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="525" y="492" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">KEY METRICS &amp; SCALING</text>

  <text x="100" y="515" text-anchor="middle" fill="#feca57" font-size="8">100K concurrent</text>
  <text x="100" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ ~1.7K QPS</text>

  <text x="270" y="515" text-anchor="middle" fill="#00ff88" font-size="8">First token &lt;1s</text>
  <text x="270" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ streaming SSE</text>

  <text x="430" y="515" text-anchor="middle" fill="#e94560" font-size="8">30% cache hit</text>
  <text x="430" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ semantic dedup</text>

  <text x="590" y="515" text-anchor="middle" fill="#a29bfe" font-size="8">99.9% uptime</text>
  <text x="590" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ multi-AZ + fallbacks</text>

  <text x="750" y="515" text-anchor="middle" fill="#54a0ff" font-size="8">&lt;$0.05/conv</text>
  <text x="750" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ model routing</text>

  <text x="910" y="515" text-anchor="middle" fill="#ff6b6b" font-size="8">Horizontal scale</text>
  <text x="910" y="530" text-anchor="middle" fill="#aaaaaa" font-size="7">→ stateless + K8s HPA</text>

  <defs>
    <marker id="cbArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
