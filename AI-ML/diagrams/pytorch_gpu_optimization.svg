<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 530" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="530" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#EE4C2C" font-size="20" font-weight="bold">PyTorch GPU Usage &amp; Model Optimization</text>

  <!-- GPU Memory Management -->
  <rect x="30" y="60" width="460" height="210" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="10"/>
  <text x="260" y="85" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="bold">GPU Memory Management</text>

  <!-- Memory blocks -->
  <rect x="50" y="100" width="420" height="30" fill="#0f3460" rx="4"/>
  <rect x="50" y="100" width="180" height="30" fill="#54a0ff" opacity="0.7" rx="4"/>
  <text x="140" y="120" text-anchor="middle" fill="#ffffff" font-size="9">Model Parameters (persistent)</text>
  <rect x="230" y="100" width="120" height="30" fill="#feca57" opacity="0.7" rx="4"/>
  <text x="290" y="120" text-anchor="middle" fill="#000000" font-size="9">Gradients</text>
  <rect x="350" y="100" width="120" height="30" fill="#e94560" opacity="0.7" rx="4"/>
  <text x="410" y="120" text-anchor="middle" fill="#ffffff" font-size="9">Optimizer States</text>

  <rect x="50" y="135" width="420" height="30" fill="#0f3460" rx="4"/>
  <rect x="50" y="135" width="250" height="30" fill="#a29bfe" opacity="0.5" rx="4"/>
  <text x="175" y="155" text-anchor="middle" fill="#ffffff" font-size="9">Activations (forward pass cache for backward)</text>
  <rect x="300" y="135" width="170" height="30" fill="#00d2d3" opacity="0.5" rx="4"/>
  <text x="385" y="155" text-anchor="middle" fill="#ffffff" font-size="9">Temporary buffers</text>

  <text x="260" y="185" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Memory Breakdown (typical):</text>
  <text x="260" y="202" text-anchor="middle" fill="#aaaaaa" font-size="9">Model: ~30% | Gradients: ~30% | Optimizer: ~30% | Activations: ~10%</text>
  <text x="260" y="219" text-anchor="middle" fill="#aaaaaa" font-size="9">Adam uses 2x model size (m + v states) — total ≈ 4x model params</text>

  <text x="260" y="245" text-anchor="middle" fill="#ff6b6b" font-size="10">GPU OOM? Reduce batch_size first, then try optimizations below →</text>
  <text x="260" y="260" text-anchor="middle" fill="#aaaaaa" font-size="9">torch.cuda.empty_cache() frees unused cache (doesn't reduce active memory)</text>

  <!-- Optimization Techniques -->
  <rect x="510" y="60" width="460" height="210" fill="#16213e" stroke="#EE4C2C" stroke-width="2" rx="10"/>
  <text x="740" y="85" text-anchor="middle" fill="#EE4C2C" font-size="14" font-weight="bold">Memory Optimization Techniques</text>

  <rect x="530" y="100" width="210" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="635" y="118" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Mixed Precision (AMP)</text>
  <text x="635" y="135" text-anchor="middle" fill="#ffffff" font-size="9">FP16 compute → 2x memory saved</text>

  <rect x="750" y="100" width="210" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="855" y="118" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Gradient Checkpointing</text>
  <text x="855" y="135" text-anchor="middle" fill="#ffffff" font-size="9">Recompute vs store activations</text>

  <rect x="530" y="155" width="210" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="5"/>
  <text x="635" y="173" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Gradient Accumulation</text>
  <text x="635" y="190" text-anchor="middle" fill="#ffffff" font-size="9">Small batch × N = large effective</text>

  <rect x="750" y="155" width="210" height="45" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="5"/>
  <text x="855" y="173" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">torch.compile()</text>
  <text x="855" y="190" text-anchor="middle" fill="#ffffff" font-size="9">PyTorch 2.0 graph compiler</text>

  <rect x="530" y="210" width="210" height="45" fill="#0f3460" stroke="#ff6b6b" stroke-width="1.5" rx="5"/>
  <text x="635" y="228" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">Model Parallelism</text>
  <text x="635" y="245" text-anchor="middle" fill="#ffffff" font-size="9">Split model across GPUs</text>

  <rect x="750" y="210" width="210" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="5"/>
  <text x="855" y="228" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">DeepSpeed ZeRO</text>
  <text x="855" y="245" text-anchor="middle" fill="#ffffff" font-size="9">Shard optimizer/grads/params</text>

  <!-- Speed Optimization Flow -->
  <rect x="30" y="290" width="940" height="110" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="500" y="315" text-anchor="middle" fill="#feca57" font-size="14" font-weight="bold">Model Speed Optimization Pipeline</text>

  <!-- Steps -->
  <rect x="50" y="330" width="140" height="50" fill="#16213e" stroke="#ffffff" stroke-width="1" rx="6"/>
  <text x="120" y="350" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">1. Profile</text>
  <text x="120" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">torch.profiler</text>

  <line x1="190" y1="355" x2="210" y2="355" stroke="#ffffff" stroke-width="1.5" marker-end="url(#optArrow)"/>

  <rect x="210" y="330" width="140" height="50" fill="#16213e" stroke="#ffffff" stroke-width="1" rx="6"/>
  <text x="280" y="350" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">2. torch.compile</text>
  <text x="280" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">Graph optimization</text>

  <line x1="350" y1="355" x2="370" y2="355" stroke="#ffffff" stroke-width="1.5" marker-end="url(#optArrow)"/>

  <rect x="370" y="330" width="140" height="50" fill="#16213e" stroke="#ffffff" stroke-width="1" rx="6"/>
  <text x="440" y="350" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">3. Mixed Precision</text>
  <text x="440" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">torch.cuda.amp</text>

  <line x1="510" y1="355" x2="530" y2="355" stroke="#ffffff" stroke-width="1.5" marker-end="url(#optArrow)"/>

  <rect x="530" y="330" width="140" height="50" fill="#16213e" stroke="#ffffff" stroke-width="1" rx="6"/>
  <text x="600" y="350" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">4. Data Loading</text>
  <text x="600" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">workers + pin_memory</text>

  <line x1="670" y1="355" x2="690" y2="355" stroke="#ffffff" stroke-width="1.5" marker-end="url(#optArrow)"/>

  <rect x="690" y="330" width="140" height="50" fill="#16213e" stroke="#ffffff" stroke-width="1" rx="6"/>
  <text x="760" y="350" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">5. Distributed</text>
  <text x="760" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">DDP / FSDP</text>

  <line x1="830" y1="355" x2="850" y2="355" stroke="#ffffff" stroke-width="1.5" marker-end="url(#optArrow)"/>

  <rect x="850" y="330" width="100" height="50" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="900" y="350" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">6. Export</text>
  <text x="900" y="368" text-anchor="middle" fill="#aaaaaa" font-size="8">ONNX / Script</text>

  <text x="500" y="393" text-anchor="middle" fill="#aaaaaa" font-size="9">Typical speedup: 1.5x (compile) + 2x (AMP) + Nx (distributed) = 3-10x total improvement</text>

  <!-- Deployment Options -->
  <rect x="30" y="415" width="940" height="95" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="440" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">PyTorch Model Export &amp; Deployment</text>

  <rect x="50" y="455" width="170" height="40" fill="#0f3460" stroke="#EE4C2C" stroke-width="1" rx="5"/>
  <text x="135" y="472" text-anchor="middle" fill="#EE4C2C" font-size="10" font-weight="bold">TorchScript</text>
  <text x="135" y="488" text-anchor="middle" fill="#aaaaaa" font-size="9">torch.jit.script(model)</text>

  <rect x="240" y="455" width="170" height="40" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="5"/>
  <text x="325" y="472" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">ONNX Export</text>
  <text x="325" y="488" text-anchor="middle" fill="#aaaaaa" font-size="9">torch.onnx.export(model)</text>

  <rect x="430" y="455" width="170" height="40" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="5"/>
  <text x="515" y="472" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">TorchServe</text>
  <text x="515" y="488" text-anchor="middle" fill="#aaaaaa" font-size="9">Production REST/gRPC</text>

  <rect x="620" y="455" width="170" height="40" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="5"/>
  <text x="705" y="472" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">ExecuTorch</text>
  <text x="705" y="488" text-anchor="middle" fill="#aaaaaa" font-size="9">Mobile (iOS/Android)</text>

  <rect x="810" y="455" width="140" height="40" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="5"/>
  <text x="880" y="472" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">torch.export</text>
  <text x="880" y="488" text-anchor="middle" fill="#aaaaaa" font-size="9">PT2 standard export</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="optArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffffff"/></marker>
  </defs>
</svg>
