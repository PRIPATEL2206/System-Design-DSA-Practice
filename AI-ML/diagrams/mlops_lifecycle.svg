<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 580" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="580" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">MLOps Lifecycle — End-to-End ML Production Pipeline</text>

  <!-- Circular lifecycle -->
  <!-- Data -->
  <rect x="50" y="70" width="160" height="70" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="130" y="95" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">1. Data</text>
  <text x="130" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Collection, validation</text>
  <text x="130" y="125" text-anchor="middle" fill="#aaaaaa" font-size="7">Feature engineering</text>
  <text x="130" y="135" text-anchor="middle" fill="#feca57" font-size="6">Tools: Feast, dbt, Great Expectations</text>

  <line x1="215" y1="105" x2="250" y2="105" stroke="#fff" stroke-width="1.5" marker-end="url(#mlArr)"/>

  <!-- Experiment -->
  <rect x="255" y="70" width="160" height="70" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="335" y="95" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">2. Experiment</text>
  <text x="335" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Train, tune hyperparams</text>
  <text x="335" y="125" text-anchor="middle" fill="#aaaaaa" font-size="7">Compare models</text>
  <text x="335" y="135" text-anchor="middle" fill="#feca57" font-size="6">Tools: MLflow, W&amp;B, Optuna</text>

  <line x1="420" y1="105" x2="455" y2="105" stroke="#fff" stroke-width="1.5" marker-end="url(#mlArr)"/>

  <!-- Evaluate -->
  <rect x="460" y="70" width="160" height="70" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="540" y="95" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">3. Evaluate</text>
  <text x="540" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Test metrics, bias check</text>
  <text x="540" y="125" text-anchor="middle" fill="#aaaaaa" font-size="7">Quality gates</text>
  <text x="540" y="135" text-anchor="middle" fill="#feca57" font-size="6">Tools: pytest, Evidently, Fairlearn</text>

  <line x1="625" y1="105" x2="660" y2="105" stroke="#fff" stroke-width="1.5" marker-end="url(#mlArr)"/>

  <!-- Register -->
  <rect x="665" y="70" width="160" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="745" y="95" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">4. Register</text>
  <text x="745" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Model registry, versioning</text>
  <text x="745" y="125" text-anchor="middle" fill="#aaaaaa" font-size="7">Stage: Staging → Prod</text>
  <text x="745" y="135" text-anchor="middle" fill="#feca57" font-size="6">Tools: MLflow Registry, SageMaker</text>

  <line x1="830" y1="105" x2="860" y2="105" stroke="#fff" stroke-width="1.5" marker-end="url(#mlArr)"/>

  <!-- Deploy -->
  <rect x="865" y="70" width="155" height="70" fill="#0f3460" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="942" y="95" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">5. Deploy</text>
  <text x="942" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Canary, A/B, shadow</text>
  <text x="942" y="125" text-anchor="middle" fill="#aaaaaa" font-size="7">Docker + K8s</text>
  <text x="942" y="135" text-anchor="middle" fill="#feca57" font-size="6">Tools: KServe, BentoML, vLLM</text>

  <!-- Second row: Monitor → Retrain cycle -->
  <path d="M 942,145 L 942,170 L 525,170 L 525,185" fill="none" stroke="#00d2d3" stroke-width="2" marker-end="url(#mlArr)"/>

  <!-- Monitor -->
  <rect x="420" y="185" width="210" height="70" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="525" y="208" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">6. Monitor &amp; Observe</text>
  <text x="525" y="225" text-anchor="middle" fill="#aaaaaa" font-size="7">Data drift, concept drift, latency</text>
  <text x="525" y="238" text-anchor="middle" fill="#aaaaaa" font-size="7">Performance degradation alerts</text>
  <text x="525" y="248" text-anchor="middle" fill="#feca57" font-size="6">Tools: Evidently, Prometheus, Arize, WhyLabs</text>

  <!-- Feedback loop back to Data -->
  <path d="M 420,220 L 130,220 L 130,145" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#mlArr)" stroke-dasharray="5,3"/>
  <text x="270" y="215" fill="#ff6b6b" font-size="8">Drift detected → Retrain</text>

  <!-- Automation layer -->
  <rect x="30" y="275" width="990" height="145" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="298" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Automation &amp; Infrastructure Layer</text>

  <!-- CI/CD -->
  <rect x="50" y="310" width="200" height="55" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="150" y="330" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">CI/CD Pipeline</text>
  <text x="150" y="345" text-anchor="middle" fill="#aaaaaa" font-size="7">GitHub Actions, GitLab CI</text>
  <text x="150" y="358" text-anchor="middle" fill="#aaaaaa" font-size="7">Auto-test, auto-deploy</text>

  <!-- Infra -->
  <rect x="270" y="310" width="200" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="370" y="330" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Infrastructure</text>
  <text x="370" y="345" text-anchor="middle" fill="#aaaaaa" font-size="7">Docker, Kubernetes, Terraform</text>
  <text x="370" y="358" text-anchor="middle" fill="#aaaaaa" font-size="7">GPU scheduling, autoscaling</text>

  <!-- Data versioning -->
  <rect x="490" y="310" width="200" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="590" y="330" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Data Versioning</text>
  <text x="590" y="345" text-anchor="middle" fill="#aaaaaa" font-size="7">DVC, LakeFS, Delta Lake</text>
  <text x="590" y="358" text-anchor="middle" fill="#aaaaaa" font-size="7">Reproducible data pipelines</text>

  <!-- Feature Store -->
  <rect x="710" y="310" width="200" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="810" y="330" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Feature Store</text>
  <text x="810" y="345" text-anchor="middle" fill="#aaaaaa" font-size="7">Feast, Tecton, Hopsworks</text>
  <text x="810" y="358" text-anchor="middle" fill="#aaaaaa" font-size="7">Train/serve consistency</text>

  <!-- Maturity arrow -->
  <rect x="50" y="380" width="860" height="25" fill="#0f3460" rx="12"/>
  <rect x="50" y="380" width="215" height="25" fill="#c62828" rx="12" opacity="0.7"/>
  <rect x="265" y="380" width="215" height="25" fill="#e65100" rx="0" opacity="0.7"/>
  <rect x="480" y="380" width="215" height="25" fill="#f57f17" rx="0" opacity="0.7"/>
  <rect x="695" y="380" width="215" height="25" fill="#2e7d32" rx="12" opacity="0.7"/>
  <text x="157" y="397" text-anchor="middle" fill="#fff" font-size="8">Level 0: Manual</text>
  <text x="372" y="397" text-anchor="middle" fill="#fff" font-size="8">Level 1: Automated Training</text>
  <text x="587" y="397" text-anchor="middle" fill="#fff" font-size="8">Level 2: CI/CD for ML</text>
  <text x="802" y="397" text-anchor="middle" fill="#fff" font-size="8">Level 3: Full MLOps</text>

  <!-- Key metrics -->
  <rect x="30" y="430" width="990" height="135" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="525" y="453" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Key MLOps Metrics to Track</text>

  <rect x="50" y="465" width="220" height="85" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="160" y="483" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Model Quality</text>
  <text x="65" y="500" fill="#ffffff" font-size="8">• Accuracy / F1 / AUC (trend)</text>
  <text x="65" y="515" fill="#ffffff" font-size="8">• Prediction distribution</text>
  <text x="65" y="530" fill="#ffffff" font-size="8">• Fairness metrics by group</text>
  <text x="65" y="545" fill="#ffffff" font-size="8">• Calibration (predicted vs actual)</text>

  <rect x="290" y="465" width="220" height="85" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="400" y="483" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Operational Health</text>
  <text x="305" y="500" fill="#ffffff" font-size="8">• Latency p50/p95/p99</text>
  <text x="305" y="515" fill="#ffffff" font-size="8">• Throughput (requests/sec)</text>
  <text x="305" y="530" fill="#ffffff" font-size="8">• Error rate</text>
  <text x="305" y="545" fill="#ffffff" font-size="8">• GPU/memory utilization</text>

  <rect x="530" y="465" width="220" height="85" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="640" y="483" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Data Quality</text>
  <text x="545" y="500" fill="#ffffff" font-size="8">• Feature drift (PSI/KS test)</text>
  <text x="545" y="515" fill="#ffffff" font-size="8">• Missing value rates</text>
  <text x="545" y="530" fill="#ffffff" font-size="8">• Schema violations</text>
  <text x="545" y="545" fill="#ffffff" font-size="8">• Data freshness / staleness</text>

  <rect x="770" y="465" width="230" height="85" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="885" y="483" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Business Impact</text>
  <text x="785" y="500" fill="#ffffff" font-size="8">• Revenue attributed to model</text>
  <text x="785" y="515" fill="#ffffff" font-size="8">• Cost per prediction</text>
  <text x="785" y="530" fill="#ffffff" font-size="8">• Time to retrain + deploy</text>
  <text x="785" y="545" fill="#ffffff" font-size="8">• Incidents / rollbacks count</text>

  <defs>
    <marker id="mlArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
