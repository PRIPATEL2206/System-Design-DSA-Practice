<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="650" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="22" font-weight="bold">TensorFlow Ecosystem Architecture</text>

  <!-- Core TensorFlow -->
  <rect x="300" y="280" width="400" height="90" fill="#1B5E20" stroke="#FF6F00" stroke-width="3" rx="12"/>
  <text x="500" y="315" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">TensorFlow Core</text>
  <text x="500" y="340" text-anchor="middle" fill="#aaaaaa" font-size="11">Tensor Operations | Automatic Differentiation | Graphs</text>
  <text x="500" y="358" text-anchor="middle" fill="#aaaaaa" font-size="11">Eager Execution | tf.function | XLA Compilation</text>

  <!-- High-Level APIs (above core) -->
  <text x="500" y="80" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">High-Level APIs</text>

  <rect x="50" y="100" width="180" height="65" fill="#16213e" stroke="#FF6F00" stroke-width="2" rx="8"/>
  <text x="140" y="125" text-anchor="middle" fill="#FF6F00" font-size="13" font-weight="bold">tf.keras</text>
  <text x="140" y="145" text-anchor="middle" fill="#aaaaaa" font-size="10">Model building, training</text>
  <text x="140" y="158" text-anchor="middle" fill="#aaaaaa" font-size="10">Sequential/Functional/Subclass</text>

  <rect x="260" y="100" width="180" height="65" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="350" y="125" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">tf.data</text>
  <text x="350" y="145" text-anchor="middle" fill="#aaaaaa" font-size="10">Data pipelines</text>
  <text x="350" y="158" text-anchor="middle" fill="#aaaaaa" font-size="10">ETL, prefetch, cache</text>

  <rect x="470" y="100" width="180" height="65" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="560" y="125" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">tf.distribute</text>
  <text x="560" y="145" text-anchor="middle" fill="#aaaaaa" font-size="10">Distributed training</text>
  <text x="560" y="158" text-anchor="middle" fill="#aaaaaa" font-size="10">Multi-GPU, Multi-node</text>

  <rect x="680" y="100" width="180" height="65" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="770" y="125" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">TensorBoard</text>
  <text x="770" y="145" text-anchor="middle" fill="#aaaaaa" font-size="10">Visualization</text>
  <text x="770" y="158" text-anchor="middle" fill="#aaaaaa" font-size="10">Metrics, graphs, profiling</text>

  <!-- Middle-Level APIs -->
  <text x="500" y="200" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Mid-Level Components</text>

  <rect x="80" y="215" width="160" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="160" y="237" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">tf.Module</text>
  <text x="160" y="255" text-anchor="middle" fill="#aaaaaa" font-size="9">Base for custom layers</text>

  <rect x="260" y="215" width="160" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="340" y="237" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">tf.GradientTape</text>
  <text x="340" y="255" text-anchor="middle" fill="#aaaaaa" font-size="9">Custom training loops</text>

  <rect x="440" y="215" width="160" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="520" y="237" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">tf.Variable</text>
  <text x="520" y="255" text-anchor="middle" fill="#aaaaaa" font-size="9">Trainable parameters</text>

  <rect x="620" y="215" width="160" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="700" y="237" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">tf.saved_model</text>
  <text x="700" y="255" text-anchor="middle" fill="#aaaaaa" font-size="9">Model serialization</text>

  <rect x="800" y="215" width="160" height="50" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="880" y="237" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">tf.function</text>
  <text x="880" y="255" text-anchor="middle" fill="#aaaaaa" font-size="9">Graph optimization</text>

  <!-- Deployment (below core) -->
  <text x="500" y="410" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Deployment &amp; Serving</text>

  <rect x="50" y="425" width="170" height="65" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="135" y="450" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">TF Serving</text>
  <text x="135" y="468" text-anchor="middle" fill="#aaaaaa" font-size="10">Production inference</text>
  <text x="135" y="482" text-anchor="middle" fill="#aaaaaa" font-size="10">REST/gRPC APIs</text>

  <rect x="240" y="425" width="170" height="65" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="325" y="450" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">TF Lite</text>
  <text x="325" y="468" text-anchor="middle" fill="#aaaaaa" font-size="10">Mobile &amp; Edge</text>
  <text x="325" y="482" text-anchor="middle" fill="#aaaaaa" font-size="10">Android/iOS/IoT</text>

  <rect x="430" y="425" width="170" height="65" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="515" y="450" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">TF.js</text>
  <text x="515" y="468" text-anchor="middle" fill="#aaaaaa" font-size="10">Browser inference</text>
  <text x="515" y="482" text-anchor="middle" fill="#aaaaaa" font-size="10">WebGL/WebGPU</text>

  <rect x="620" y="425" width="170" height="65" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="705" y="450" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">TFX</text>
  <text x="705" y="468" text-anchor="middle" fill="#aaaaaa" font-size="10">ML Pipelines</text>
  <text x="705" y="482" text-anchor="middle" fill="#aaaaaa" font-size="10">End-to-end MLOps</text>

  <rect x="810" y="425" width="160" height="65" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="890" y="450" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">Cloud AI Platform</text>
  <text x="890" y="468" text-anchor="middle" fill="#aaaaaa" font-size="10">Vertex AI</text>
  <text x="890" y="482" text-anchor="middle" fill="#aaaaaa" font-size="10">Managed training</text>

  <!-- Hardware Layer -->
  <text x="500" y="530" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Hardware Acceleration</text>

  <rect x="150" y="545" width="150" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="225" y="572" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">CPU</text>

  <rect x="330" y="545" width="150" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="405" y="572" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">GPU (CUDA)</text>

  <rect x="510" y="545" width="150" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="585" y="572" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">TPU (Google)</text>

  <rect x="690" y="545" width="150" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="765" y="572" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">XLA Compiler</text>

  <!-- Connecting arrows -->
  <line x1="140" y1="165" x2="400" y2="280" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <line x1="350" y1="165" x2="450" y2="280" stroke="#00d2d3" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="165" x2="550" y2="280" stroke="#feca57" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="370" x2="500" y2="410" stroke="#ffffff" stroke-width="1" opacity="0.4"/>

  <!-- Version info -->
  <rect x="30" y="605" width="940" height="30" fill="#0f3460" rx="5"/>
  <text x="500" y="625" text-anchor="middle" fill="#aaaaaa" font-size="11">TensorFlow 2.x — Eager execution by default | Keras as official high-level API | tf.function for graph optimization</text>
</svg>
