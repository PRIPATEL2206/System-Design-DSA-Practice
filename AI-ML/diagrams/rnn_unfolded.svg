<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="450" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Recurrent Neural Network — Unfolded Through Time</text>

  <!-- Folded version (left) -->
  <rect x="30" y="55" width="220" height="180" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="140" y="78" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Folded (Compact) View</text>

  <!-- RNN cell with self-loop -->
  <rect x="90" y="120" width="100" height="60" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="140" y="148" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">RNN Cell</text>
  <text x="140" y="165" text-anchor="middle" fill="#ffffff" font-size="9">h = tanh(Wx + Uh + b)</text>

  <!-- Self-loop arrow -->
  <path d="M 190 135 C 220 135, 220 100, 190 100 C 160 100, 140 100, 140 120" fill="none" stroke="#e94560" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="210" y="105" fill="#e94560" font-size="9">h(t-1)</text>

  <!-- Input arrow -->
  <line x1="140" y1="200" x2="140" y2="180" stroke="#00ff88" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="140" y="215" text-anchor="middle" fill="#00ff88" font-size="9">x(t)</text>

  <!-- Output arrow -->
  <line x1="140" y1="120" x2="140" y2="95" stroke="#00d2d3" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="140" y="90" text-anchor="middle" fill="#00d2d3" font-size="9">y(t)</text>

  <!-- Unfolded version (right) -->
  <rect x="280" y="55" width="690" height="180" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="625" y="78" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Unfolded Through Time (3 timesteps shown)</text>

  <!-- t-1 cell -->
  <rect x="320" y="115" width="100" height="55" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="6"/>
  <text x="370" y="140" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">RNN</text>
  <text x="370" y="155" text-anchor="middle" fill="#ffffff" font-size="8">tanh(Wx+Uh+b)</text>
  <text x="370" y="108" text-anchor="middle" fill="#aaaaaa" font-size="9">t-1</text>

  <!-- t cell -->
  <rect x="520" y="115" width="100" height="55" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="6"/>
  <text x="570" y="140" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">RNN</text>
  <text x="570" y="155" text-anchor="middle" fill="#ffffff" font-size="8">tanh(Wx+Uh+b)</text>
  <text x="570" y="108" text-anchor="middle" fill="#aaaaaa" font-size="9">t</text>

  <!-- t+1 cell -->
  <rect x="720" y="115" width="100" height="55" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="6"/>
  <text x="770" y="140" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">RNN</text>
  <text x="770" y="155" text-anchor="middle" fill="#ffffff" font-size="8">tanh(Wx+Uh+b)</text>
  <text x="770" y="108" text-anchor="middle" fill="#aaaaaa" font-size="9">t+1</text>

  <!-- Hidden state arrows between cells -->
  <line x1="420" y1="142" x2="520" y2="142" stroke="#e94560" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="470" y="135" text-anchor="middle" fill="#e94560" font-size="9">h(t-1)</text>

  <line x1="620" y1="142" x2="720" y2="142" stroke="#e94560" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="670" y="135" text-anchor="middle" fill="#e94560" font-size="9">h(t)</text>

  <!-- h(t+1) output -->
  <line x1="820" y1="142" x2="870" y2="142" stroke="#e94560" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="890" y="145" fill="#e94560" font-size="9">h(t+1)</text>

  <!-- Initial hidden state -->
  <line x1="285" y1="142" x2="320" y2="142" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#rnnA)"/>
  <text x="295" y="135" fill="#aaaaaa" font-size="8">h(0)</text>

  <!-- Input arrows -->
  <line x1="370" y1="195" x2="370" y2="170" stroke="#00ff88" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="370" y="210" text-anchor="middle" fill="#00ff88" font-size="9">x(t-1)</text>

  <line x1="570" y1="195" x2="570" y2="170" stroke="#00ff88" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="570" y="210" text-anchor="middle" fill="#00ff88" font-size="9">x(t)</text>

  <line x1="770" y1="195" x2="770" y2="170" stroke="#00ff88" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="770" y="210" text-anchor="middle" fill="#00ff88" font-size="9">x(t+1)</text>

  <!-- Output arrows -->
  <line x1="370" y1="115" x2="370" y2="95" stroke="#00d2d3" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="370" y="88" text-anchor="middle" fill="#00d2d3" font-size="9">y(t-1)</text>

  <line x1="570" y1="115" x2="570" y2="95" stroke="#00d2d3" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="570" y="88" text-anchor="middle" fill="#00d2d3" font-size="9">y(t)</text>

  <line x1="770" y1="115" x2="770" y2="95" stroke="#00d2d3" stroke-width="2" marker-end="url(#rnnA)"/>
  <text x="770" y="88" text-anchor="middle" fill="#00d2d3" font-size="9">y(t+1)</text>

  <!-- Weight sharing note -->
  <text x="625" y="228" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Same weights W, U, b shared across ALL timesteps</text>

  <!-- Key equations -->
  <rect x="30" y="250" width="460" height="180" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="260" y="275" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">RNN Equations</text>

  <text x="60" y="305" fill="#ffffff" font-size="11">Hidden state: h(t) = tanh(W_xh · x(t) + W_hh · h(t-1) + b_h)</text>
  <text x="60" y="330" fill="#ffffff" font-size="11">Output:          y(t) = W_hy · h(t) + b_y</text>

  <text x="60" y="360" fill="#aaaaaa" font-size="10">W_xh: input-to-hidden weights (input_size × hidden_size)</text>
  <text x="60" y="380" fill="#aaaaaa" font-size="10">W_hh: hidden-to-hidden weights (hidden_size × hidden_size)</text>
  <text x="60" y="400" fill="#aaaaaa" font-size="10">W_hy: hidden-to-output weights (hidden_size × output_size)</text>
  <text x="60" y="420" fill="#aaaaaa" font-size="10">h(t): memory vector — encodes everything seen so far</text>

  <!-- Vanishing gradient problem -->
  <rect x="510" y="250" width="460" height="180" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="8"/>
  <text x="740" y="275" text-anchor="middle" fill="#e94560" font-size="13" font-weight="bold">The Vanishing Gradient Problem</text>

  <text x="540" y="305" fill="#ffffff" font-size="10">During backprop through time (BPTT):</text>
  <text x="540" y="330" fill="#ffffff" font-size="10">∂L/∂h(0) = ∂L/∂h(T) × ∏ᵢ ∂h(i)/∂h(i-1)</text>

  <text x="540" y="360" fill="#aaaaaa" font-size="10">Each ∂h(i)/∂h(i-1) involves multiplying by W_hh</text>
  <text x="540" y="380" fill="#aaaaaa" font-size="10">If |eigenvalue| &lt; 1: gradient → 0 (vanishes)</text>
  <text x="540" y="400" fill="#aaaaaa" font-size="10">If |eigenvalue| &gt; 1: gradient → ∞ (explodes)</text>
  <text x="540" y="425" fill="#e94560" font-size="10" font-weight="bold">Result: RNN can't learn long-range dependencies (&gt;10-20 steps)</text>

  <defs>
    <marker id="rnnA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffffff"/></marker>
  </defs>
</svg>
