<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="480" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="20" font-weight="bold">tf.data Pipeline — Efficient Data Loading</text>

  <!-- Source -->
  <rect x="30" y="70" width="140" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="100" y="95" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Data Source</text>
  <text x="100" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Files / Arrays</text>
  <text x="100" y="130" text-anchor="middle" fill="#ffffff" font-size="9">TFRecords</text>
  <text x="100" y="145" text-anchor="middle" fill="#ffffff" font-size="9">Generators</text>

  <line x1="170" y1="110" x2="200" y2="110" stroke="#e94560" stroke-width="2" marker-end="url(#dArrow)"/>

  <!-- Map -->
  <rect x="200" y="70" width="140" height="80" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="270" y="95" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">.map()</text>
  <text x="270" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Transform data</text>
  <text x="270" y="130" text-anchor="middle" fill="#ffffff" font-size="9">Decode, resize</text>
  <text x="270" y="145" text-anchor="middle" fill="#ffffff" font-size="9">Augment, normalize</text>

  <line x1="340" y1="110" x2="370" y2="110" stroke="#00d2d3" stroke-width="2" marker-end="url(#dArrow2)"/>

  <!-- Cache -->
  <rect x="370" y="70" width="120" height="80" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="430" y="95" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">.cache()</text>
  <text x="430" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Store in RAM</text>
  <text x="430" y="130" text-anchor="middle" fill="#ffffff" font-size="9">or on disk</text>
  <text x="430" y="145" text-anchor="middle" fill="#aaaaaa" font-size="9">(after expensive ops)</text>

  <line x1="490" y1="110" x2="520" y2="110" stroke="#feca57" stroke-width="2" marker-end="url(#dArrow3)"/>

  <!-- Shuffle -->
  <rect x="520" y="70" width="120" height="80" fill="#0f3460" stroke="#a29bfe" stroke-width="2" rx="10"/>
  <text x="580" y="95" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">.shuffle()</text>
  <text x="580" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Randomize order</text>
  <text x="580" y="130" text-anchor="middle" fill="#ffffff" font-size="9">buffer_size=1000</text>
  <text x="580" y="145" text-anchor="middle" fill="#aaaaaa" font-size="9">(prevent patterns)</text>

  <line x1="640" y1="110" x2="670" y2="110" stroke="#a29bfe" stroke-width="2" marker-end="url(#dArrow4)"/>

  <!-- Batch -->
  <rect x="670" y="70" width="120" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="10"/>
  <text x="730" y="95" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">.batch()</text>
  <text x="730" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Group samples</text>
  <text x="730" y="130" text-anchor="middle" fill="#ffffff" font-size="9">batch_size=32</text>
  <text x="730" y="145" text-anchor="middle" fill="#aaaaaa" font-size="9">(for GPU efficiency)</text>

  <line x1="790" y1="110" x2="820" y2="110" stroke="#54a0ff" stroke-width="2" marker-end="url(#dArrow5)"/>

  <!-- Prefetch -->
  <rect x="820" y="70" width="150" height="80" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="10"/>
  <text x="895" y="95" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">.prefetch()</text>
  <text x="895" y="115" text-anchor="middle" fill="#ffffff" font-size="9">Overlap CPU/GPU</text>
  <text x="895" y="130" text-anchor="middle" fill="#ffffff" font-size="9">AUTOTUNE</text>
  <text x="895" y="145" text-anchor="middle" fill="#00ff88" font-size="9">⚡ Key for speed</text>

  <!-- Performance comparison -->
  <rect x="30" y="180" width="940" height="140" fill="#16213e" stroke="#FF6F00" stroke-width="1.5" rx="8"/>
  <text x="500" y="205" text-anchor="middle" fill="#FF6F00" font-size="14" font-weight="bold">Why Prefetch Matters — CPU/GPU Overlap</text>

  <!-- Without prefetch -->
  <text x="60" y="230" fill="#ff6b6b" font-size="11" font-weight="bold">Without prefetch (sequential):</text>
  <!-- CPU blocks -->
  <rect x="60" y="240" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="110" y="257" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load</text>
  <rect x="160" y="240" width="100" height="25" fill="#444444" rx="3"/>
  <text x="210" y="257" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU: idle</text>
  <rect x="260" y="240" width="100" height="25" fill="#444444" rx="3"/>
  <text x="310" y="257" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU: Train</text>
  <rect x="360" y="240" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="410" y="257" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load</text>
  <rect x="460" y="240" width="100" height="25" fill="#444444" rx="3"/>
  <text x="510" y="257" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU: idle</text>
  <rect x="560" y="240" width="100" height="25" fill="#444444" rx="3"/>
  <text x="610" y="257" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU: Train</text>
  <text x="730" y="257" fill="#ff6b6b" font-size="10">← GPU wastes time waiting!</text>

  <!-- With prefetch -->
  <text x="60" y="285" fill="#00ff88" font-size="11" font-weight="bold">With prefetch (overlapped):</text>
  <!-- CPU row -->
  <rect x="60" y="295" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="110" y="312" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load₁</text>
  <rect x="160" y="295" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="210" y="312" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load₂</text>
  <rect x="260" y="295" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="310" y="312" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load₃</text>
  <rect x="360" y="295" width="100" height="25" fill="#54a0ff" rx="3"/>
  <text x="410" y="312" text-anchor="middle" fill="#ffffff" font-size="9">CPU: Load₄</text>
  <text x="60" y="308" text-anchor="end" fill="#54a0ff" font-size="9">CPU</text>
  <!-- GPU row -->
  <rect x="160" y="323" width="100" height="25" fill="#00ff88" rx="3"/>
  <text x="210" y="340" text-anchor="middle" fill="#000000" font-size="9">GPU: Train₁</text>
  <rect x="260" y="323" width="100" height="25" fill="#00ff88" rx="3"/>
  <text x="310" y="340" text-anchor="middle" fill="#000000" font-size="9">GPU: Train₂</text>
  <rect x="360" y="323" width="100" height="25" fill="#00ff88" rx="3"/>
  <text x="410" y="340" text-anchor="middle" fill="#000000" font-size="9">GPU: Train₃</text>
  <text x="60" y="338" text-anchor="end" fill="#00ff88" font-size="9">GPU</text>
  <text x="530" y="340" fill="#00ff88" font-size="10">← GPU never waits! 2-3x faster</text>

  <!-- Best practices -->
  <rect x="30" y="340" width="940" height="125" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="365" text-anchor="middle" fill="#54a0ff" font-size="14" font-weight="bold">tf.data Best Practices</text>

  <text x="60" y="390" fill="#ffffff" font-size="11">1. Use .cache() AFTER expensive transforms (decode, augment) but BEFORE shuffle/batch</text>
  <text x="60" y="410" fill="#ffffff" font-size="11">2. Use .prefetch(tf.data.AUTOTUNE) ALWAYS — lets TF decide optimal buffer</text>
  <text x="60" y="430" fill="#ffffff" font-size="11">3. Use num_parallel_calls=tf.data.AUTOTUNE in .map() for parallel preprocessing</text>
  <text x="60" y="450" fill="#ffffff" font-size="11">4. Use TFRecord format for large datasets — sequential reads are 10x faster than random file access</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="dArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e94560"/></marker>
    <marker id="dArrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/></marker>
    <marker id="dArrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#feca57"/></marker>
    <marker id="dArrow4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a29bfe"/></marker>
    <marker id="dArrow5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#54a0ff"/></marker>
  </defs>
</svg>
