<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="520" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">ML Monitoring &amp; Drift Detection</text>

  <!-- Types of Drift -->
  <rect x="30" y="55" width="990" height="155" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="78" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Types of Drift — What Can Go Wrong in Production</text>

  <!-- Data Drift -->
  <rect x="50" y="92" width="220" height="100" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="160" y="112" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Data Drift</text>
  <text x="65" y="130" fill="#ffffff" font-size="8">Input distribution changes</text>
  <text x="65" y="148" fill="#aaaaaa" font-size="7">Example: Users start shopping on</text>
  <text x="65" y="161" fill="#aaaaaa" font-size="7">mobile (different behavior patterns)</text>
  <text x="65" y="178" fill="#feca57" font-size="7">Detect: KS test, PSI on each feature</text>

  <!-- Concept Drift -->
  <rect x="290" y="92" width="220" height="100" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="400" y="112" text-anchor="middle" fill="#e94560" font-size="10" font-weight="bold">Concept Drift</text>
  <text x="305" y="130" fill="#ffffff" font-size="8">X→Y relationship changes</text>
  <text x="305" y="148" fill="#aaaaaa" font-size="7">Example: What counts as "spam"</text>
  <text x="305" y="161" fill="#aaaaaa" font-size="7">evolves (new patterns emerge)</text>
  <text x="305" y="178" fill="#feca57" font-size="7">Detect: Accuracy decline on new labels</text>

  <!-- Prediction Drift -->
  <rect x="530" y="92" width="220" height="100" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="640" y="112" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="bold">Prediction Drift</text>
  <text x="545" y="130" fill="#ffffff" font-size="8">Output distribution shifts</text>
  <text x="545" y="148" fill="#aaaaaa" font-size="7">Example: Model suddenly predicts</text>
  <text x="545" y="161" fill="#aaaaaa" font-size="7">80% negative (was 50%)</text>
  <text x="545" y="178" fill="#feca57" font-size="7">Detect: Monitor prediction stats</text>

  <!-- Feature Drift -->
  <rect x="770" y="92" width="230" height="100" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="885" y="112" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">Feature Drift</text>
  <text x="785" y="130" fill="#ffffff" font-size="8">Individual feature changes</text>
  <text x="785" y="148" fill="#aaaaaa" font-size="7">Example: avg_order_value increases</text>
  <text x="785" y="161" fill="#aaaaaa" font-size="7">due to inflation (feature OOD)</text>
  <text x="785" y="178" fill="#feca57" font-size="7">Detect: Per-feature distribution tests</text>

  <!-- Detection Methods -->
  <rect x="30" y="225" width="490" height="275" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="275" y="248" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">Detection Methods</text>

  <!-- Statistical Tests -->
  <rect x="50" y="265" width="210" height="110" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="155" y="283" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Statistical Tests</text>
  <text x="65" y="300" fill="#ffffff" font-size="7">• KS Test (continuous features)</text>
  <text x="65" y="315" fill="#ffffff" font-size="7">• Chi-squared (categorical)</text>
  <text x="65" y="330" fill="#ffffff" font-size="7">• PSI (Population Stability Index)</text>
  <text x="65" y="345" fill="#ffffff" font-size="7">• Jensen-Shannon divergence</text>
  <text x="65" y="360" fill="#ffffff" font-size="7">• Wasserstein distance</text>
  <text x="65" y="375" fill="#00ff88" font-size="7">Alert when p-value &lt; 0.05</text>

  <!-- Performance Metrics -->
  <rect x="275" y="265" width="225" height="110" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="387" y="283" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Performance Monitoring</text>
  <text x="290" y="300" fill="#ffffff" font-size="7">• Accuracy / F1 over sliding window</text>
  <text x="290" y="315" fill="#ffffff" font-size="7">• Precision@K for ranking models</text>
  <text x="290" y="330" fill="#ffffff" font-size="7">• Calibration: predicted vs actual</text>
  <text x="290" y="345" fill="#ffffff" font-size="7">• Segment-level metrics (by user type)</text>
  <text x="290" y="360" fill="#ffffff" font-size="7">• Compare to baseline: Δ &gt; threshold</text>
  <text x="290" y="375" fill="#e94560" font-size="7">Requires ground truth (delayed)</text>

  <!-- Monitoring schedule -->
  <rect x="50" y="385" width="450" height="100" fill="#0f3460" rx="4"/>
  <text x="275" y="403" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Monitoring Schedule</text>

  <text x="70" y="422" fill="#00ff88" font-size="8">Real-time:</text>
  <text x="145" y="422" fill="#ffffff" font-size="8">Latency, errors, throughput, prediction dist</text>

  <text x="70" y="440" fill="#feca57" font-size="8">Hourly:</text>
  <text x="125" y="440" fill="#ffffff" font-size="8">Feature distributions, data quality checks</text>

  <text x="70" y="458" fill="#54a0ff" font-size="8">Daily:</text>
  <text x="115" y="458" fill="#ffffff" font-size="8">Model accuracy (when labels available), drift report</text>

  <text x="70" y="476" fill="#a29bfe" font-size="8">Weekly:</text>
  <text x="130" y="476" fill="#ffffff" font-size="8">Full evaluation on holdout, bias audit, retrain decision</text>

  <!-- Response Playbook -->
  <rect x="540" y="225" width="480" height="275" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="780" y="248" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Response Playbook — When Drift Is Detected</text>

  <!-- Severity levels -->
  <rect x="560" y="265" width="440" height="55" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="580" y="283" fill="#feca57" font-size="9" font-weight="bold">Low Severity (monitor):</text>
  <text x="580" y="298" fill="#ffffff" font-size="8">• Minor feature drift (&lt;20% of features)</text>
  <text x="580" y="313" fill="#ffffff" font-size="8">• Action: Log alert, increase monitoring frequency, no immediate action</text>

  <rect x="560" y="330" width="440" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="580" y="348" fill="#e94560" font-size="9" font-weight="bold">Medium Severity (investigate):</text>
  <text x="580" y="363" fill="#ffffff" font-size="8">• Significant drift (&gt;30% features) OR accuracy drop &gt;2%</text>
  <text x="580" y="378" fill="#ffffff" font-size="8">• Action: Investigate root cause, prepare retraining data, notify team</text>

  <rect x="560" y="395" width="440" height="55" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="580" y="413" fill="#ff6b6b" font-size="9" font-weight="bold">High Severity (act immediately):</text>
  <text x="580" y="428" fill="#ffffff" font-size="8">• Accuracy drop &gt;5% OR critical feature OOD OR model errors spike</text>
  <text x="580" y="443" fill="#ffffff" font-size="8">• Action: Rollback to previous model version, trigger emergency retrain</text>

  <!-- Automated response -->
  <rect x="560" y="460" width="440" height="30" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="780" y="480" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Level 3 MLOps: automated retraining triggered by drift detection → auto-deploy if quality gate passes</text>

  <defs>
    <marker id="moArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
