<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="480" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Multi-Head Attention — Attending to Different Aspects</text>

  <!-- Main diagram -->
  <rect x="30" y="55" width="620" height="310" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>

  <!-- Input -->
  <rect x="60" y="200" width="80" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="100" y="218" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Input X</text>
  <text x="100" y="233" text-anchor="middle" fill="#aaaaaa" font-size="7">(seq, d_model)</text>

  <!-- Split into heads -->
  <line x1="140" y1="220" x2="180" y2="220" stroke="#fff" stroke-width="1.5" marker-end="url(#mhaA)"/>

  <!-- Head 1 -->
  <rect x="185" y="80" width="120" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="5"/>
  <text x="245" y="100" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Head 1</text>
  <text x="245" y="115" text-anchor="middle" fill="#ffffff" font-size="7">Attention(Q₁,K₁,V₁)</text>
  <text x="245" y="128" text-anchor="middle" fill="#aaaaaa" font-size="7">"syntactic structure"</text>

  <!-- Head 2 -->
  <rect x="185" y="150" width="120" height="55" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="245" y="170" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Head 2</text>
  <text x="245" y="185" text-anchor="middle" fill="#ffffff" font-size="7">Attention(Q₂,K₂,V₂)</text>
  <text x="245" y="198" text-anchor="middle" fill="#aaaaaa" font-size="7">"semantic meaning"</text>

  <!-- Head 3 -->
  <rect x="185" y="220" width="120" height="55" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="245" y="240" text-anchor="middle" fill="#00d2d3" font-size="9" font-weight="bold">Head 3</text>
  <text x="245" y="255" text-anchor="middle" fill="#ffffff" font-size="7">Attention(Q₃,K₃,V₃)</text>
  <text x="245" y="268" text-anchor="middle" fill="#aaaaaa" font-size="7">"positional relations"</text>

  <!-- Head h -->
  <rect x="185" y="290" width="120" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="5"/>
  <text x="245" y="310" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Head h</text>
  <text x="245" y="325" text-anchor="middle" fill="#ffffff" font-size="7">Attention(Qₕ,Kₕ,Vₕ)</text>
  <text x="245" y="338" text-anchor="middle" fill="#aaaaaa" font-size="7">"coreference"</text>

  <!-- Lines from input to heads -->
  <line x1="140" y1="210" x2="185" y2="107" stroke="#e94560" stroke-width="1" stroke-dasharray="3"/>
  <line x1="140" y1="215" x2="185" y2="177" stroke="#feca57" stroke-width="1" stroke-dasharray="3"/>
  <line x1="140" y1="225" x2="185" y2="247" stroke="#00d2d3" stroke-width="1" stroke-dasharray="3"/>
  <line x1="140" y1="230" x2="185" y2="317" stroke="#a29bfe" stroke-width="1" stroke-dasharray="3"/>

  <!-- Concat -->
  <rect x="350" y="170" width="80" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="6"/>
  <text x="390" y="205" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Concat</text>
  <text x="390" y="222" text-anchor="middle" fill="#ffffff" font-size="7">[h1;h2;...;hH]</text>
  <text x="390" y="240" text-anchor="middle" fill="#aaaaaa" font-size="7">(seq, h×d_v)</text>

  <line x1="305" y1="107" x2="350" y2="195" stroke="#e94560" stroke-width="1"/>
  <line x1="305" y1="177" x2="350" y2="205" stroke="#feca57" stroke-width="1"/>
  <line x1="305" y1="247" x2="350" y2="215" stroke="#00d2d3" stroke-width="1"/>
  <line x1="305" y1="317" x2="350" y2="225" stroke="#a29bfe" stroke-width="1"/>

  <!-- Linear projection -->
  <line x1="430" y1="210" x2="470" y2="210" stroke="#fff" stroke-width="1.5" marker-end="url(#mhaA)"/>

  <rect x="470" y="185" width="100" height="50" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="520" y="207" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Linear W_O</text>
  <text x="520" y="225" text-anchor="middle" fill="#aaaaaa" font-size="7">(h×d_v) → d_model</text>

  <!-- Output -->
  <line x1="570" y1="210" x2="610" y2="210" stroke="#fff" stroke-width="1.5" marker-end="url(#mhaA)"/>
  <rect x="610" y="195" width="70" height="30" fill="#00ff88" opacity="0.3" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="645" y="215" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Output</text>

  <!-- Dimension details -->
  <rect x="670" y="55" width="300" height="150" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="820" y="80" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Dimensions (BERT-base)</text>

  <text x="690" y="105" fill="#ffffff" font-size="9">d_model = 768 (total embedding size)</text>
  <text x="690" y="125" fill="#ffffff" font-size="9">num_heads (h) = 12</text>
  <text x="690" y="145" fill="#ffffff" font-size="9">d_k = d_v = d_model / h = 64 per head</text>
  <text x="690" y="170" fill="#aaaaaa" font-size="8">Each head works on 64 dims independently</text>
  <text x="690" y="188" fill="#aaaaaa" font-size="8">Concat all 12 heads → 768 dims → Linear → 768</text>
  <text x="690" y="205" fill="#aaaaaa" font-size="8">Same computation cost as single full attention!</text>

  <!-- Why multi-head -->
  <rect x="670" y="220" width="300" height="145" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="8"/>
  <text x="820" y="245" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Why Multiple Heads?</text>

  <text x="690" y="270" fill="#ffffff" font-size="9">Different heads learn different relationships:</text>
  <text x="700" y="290" fill="#e94560" font-size="8">• Head 1: subject-verb agreement</text>
  <text x="700" y="308" fill="#feca57" font-size="8">• Head 2: adjective-noun binding</text>
  <text x="700" y="326" fill="#00d2d3" font-size="8">• Head 3: coreference (he → John)</text>
  <text x="700" y="344" fill="#a29bfe" font-size="8">• Head 4: positional proximity</text>
  <text x="690" y="364" fill="#aaaaaa" font-size="8">Like a CNN with multiple filters — each</text>
  <text x="690" y="380" fill="#aaaaaa" font-size="8">head captures a different "feature" of attention</text>

  <!-- Formula -->
  <rect x="30" y="385" width="940" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="8"/>
  <text x="500" y="410" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Multi-Head Attention Formula</text>
  <text x="500" y="435" text-anchor="middle" fill="#ffffff" font-size="11">MultiHead(Q, K, V) = Concat(head₁, ..., headₕ) · W_O</text>
  <text x="500" y="455" text-anchor="middle" fill="#ffffff" font-size="11">where headᵢ = Attention(Q·W_Qⁱ, K·W_Kⁱ, V·W_Vⁱ)     W_Qⁱ ∈ ℝ^(d_model × d_k)</text>

  <defs>
    <marker id="mhaA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
