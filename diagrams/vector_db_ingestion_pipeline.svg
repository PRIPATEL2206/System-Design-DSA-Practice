<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="550" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Vector Database — End-to-End Ingestion &amp; Query Pipeline</text>

  <!-- INGESTION PIPELINE -->
  <rect x="30" y="55" width="940" height="200" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="500" y="78" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">INGESTION PIPELINE (Offline / Batch)</text>

  <!-- Raw Data Sources -->
  <rect x="50" y="92" width="150" height="80" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="125" y="112" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Data Sources</text>
  <text x="125" y="130" text-anchor="middle" fill="#ffffff" font-size="7">📄 Documents (PDF, Word)</text>
  <text x="125" y="143" text-anchor="middle" fill="#ffffff" font-size="7">🌐 Web pages (HTML)</text>
  <text x="125" y="156" text-anchor="middle" fill="#ffffff" font-size="7">💬 Chat logs, emails</text>
  <text x="125" y="169" text-anchor="middle" fill="#ffffff" font-size="7">📊 Database records</text>

  <line x1="200" y1="132" x2="225" y2="132" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Chunking -->
  <rect x="225" y="92" width="150" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="300" y="112" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Chunking</text>
  <text x="300" y="130" text-anchor="middle" fill="#ffffff" font-size="7">Split into passages</text>
  <text x="300" y="143" text-anchor="middle" fill="#ffffff" font-size="7">• Fixed size (512 tokens)</text>
  <text x="300" y="156" text-anchor="middle" fill="#ffffff" font-size="7">• Semantic splitting</text>
  <text x="300" y="169" text-anchor="middle" fill="#ffffff" font-size="7">• Overlap (50-100 tokens)</text>

  <line x1="375" y1="132" x2="400" y2="132" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Embedding -->
  <rect x="400" y="92" width="150" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="6"/>
  <text x="475" y="112" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Embedding Model</text>
  <text x="475" y="130" text-anchor="middle" fill="#ffffff" font-size="7">text → dense vector</text>
  <text x="475" y="143" text-anchor="middle" fill="#ffffff" font-size="7">OpenAI: text-embedding-3</text>
  <text x="475" y="156" text-anchor="middle" fill="#ffffff" font-size="7">Cohere: embed-v3</text>
  <text x="475" y="169" text-anchor="middle" fill="#ffffff" font-size="7">OSS: BGE, E5, GTE</text>

  <line x1="550" y1="132" x2="575" y2="132" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Metadata -->
  <rect x="575" y="92" width="150" height="80" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="650" y="112" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Attach Metadata</text>
  <text x="650" y="130" text-anchor="middle" fill="#ffffff" font-size="7">source, page_num, date</text>
  <text x="650" y="143" text-anchor="middle" fill="#ffffff" font-size="7">author, category, tags</text>
  <text x="650" y="156" text-anchor="middle" fill="#ffffff" font-size="7">chunk_id, doc_id</text>
  <text x="650" y="169" text-anchor="middle" fill="#ffffff" font-size="7">Enables filtered search</text>

  <line x1="725" y1="132" x2="750" y2="132" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Store -->
  <rect x="750" y="92" width="200" height="80" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="850" y="112" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Vector Database</text>
  <text x="850" y="130" text-anchor="middle" fill="#ffffff" font-size="7">Store: vector + metadata + text</text>
  <text x="850" y="143" text-anchor="middle" fill="#ffffff" font-size="7">Build ANN index (HNSW/IVF)</text>
  <text x="850" y="156" text-anchor="middle" fill="#ffffff" font-size="7">Create collections/namespaces</text>
  <text x="850" y="169" text-anchor="middle" fill="#ffffff" font-size="7">Pinecone / Chroma / Weaviate</text>

  <!-- Batch info -->
  <text x="500" y="235" text-anchor="middle" fill="#aaaaaa" font-size="8">Ingestion is typically batch: process all documents → embed → upsert. Updates: re-embed changed docs, delete stale vectors.</text>

  <!-- QUERY PIPELINE -->
  <rect x="30" y="270" width="940" height="175" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="500" y="293" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">QUERY PIPELINE (Online / Real-time)</text>

  <!-- User query -->
  <rect x="50" y="310" width="130" height="55" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="115" y="330" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">User Query</text>
  <text x="115" y="348" text-anchor="middle" fill="#ffffff" font-size="7">"How does HNSW</text>
  <text x="115" y="360" text-anchor="middle" fill="#ffffff" font-size="7"> work internally?"</text>

  <line x1="180" y1="337" x2="205" y2="337" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Embed query -->
  <rect x="205" y="310" width="120" height="55" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="265" y="330" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Embed Query</text>
  <text x="265" y="348" text-anchor="middle" fill="#ffffff" font-size="7">Same model used</text>
  <text x="265" y="360" text-anchor="middle" fill="#ffffff" font-size="7">during ingestion</text>

  <line x1="325" y1="337" x2="350" y2="337" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- ANN Search -->
  <rect x="350" y="310" width="130" height="55" fill="#0f3460" stroke="#00d2d3" stroke-width="2" rx="4"/>
  <text x="415" y="330" text-anchor="middle" fill="#00d2d3" font-size="8" font-weight="bold">ANN Search</text>
  <text x="415" y="348" text-anchor="middle" fill="#ffffff" font-size="7">top_k=10, metric=cosine</text>
  <text x="415" y="360" text-anchor="middle" fill="#ffffff" font-size="7">+ metadata filters</text>

  <line x1="480" y1="337" x2="505" y2="337" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Re-rank -->
  <rect x="505" y="310" width="130" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="570" y="330" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Re-Rank</text>
  <text x="570" y="348" text-anchor="middle" fill="#ffffff" font-size="7">Cross-encoder scoring</text>
  <text x="570" y="360" text-anchor="middle" fill="#ffffff" font-size="7">(optional, +accuracy)</text>

  <line x1="635" y1="337" x2="660" y2="337" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Return results -->
  <rect x="660" y="310" width="130" height="55" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="725" y="330" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Post-Process</text>
  <text x="725" y="348" text-anchor="middle" fill="#ffffff" font-size="7">Score threshold filter</text>
  <text x="725" y="360" text-anchor="middle" fill="#ffffff" font-size="7">Dedup, format results</text>

  <line x1="790" y1="337" x2="815" y2="337" stroke="#fff" stroke-width="1.5" marker-end="url(#ingA)"/>

  <!-- Final output -->
  <rect x="815" y="310" width="140" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="4"/>
  <text x="885" y="330" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Results / LLM</text>
  <text x="885" y="348" text-anchor="middle" fill="#ffffff" font-size="7">Return top chunks +</text>
  <text x="885" y="360" text-anchor="middle" fill="#ffffff" font-size="7">feed to LLM for RAG</text>

  <!-- Latency -->
  <text x="500" y="395" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Query latency: Embed (~50ms) + ANN search (~5ms) + Re-rank (~100ms) ≈ 150ms total</text>

  <!-- Metadata Filtering -->
  <rect x="30" y="455" width="940" height="80" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="500" y="478" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Metadata Filtering — The Secret Weapon</text>

  <text x="50" y="500" fill="#ffffff" font-size="8">• Pre-filter: Apply metadata filter BEFORE vector search (narrows candidate set) — Weaviate, Qdrant default</text>
  <text x="50" y="518" fill="#ffffff" font-size="8">• Post-filter: Do vector search first, then filter results (may return &lt;k results) — simpler, works everywhere</text>
  <text x="50" y="536" fill="#aaaaaa" font-size="8">Example: query="ML best practices" + filter={category: "tutorial", date > "2024-01"} → only search relevant subset</text>

  <defs>
    <marker id="ingA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
