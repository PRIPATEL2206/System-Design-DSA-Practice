<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="520" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">LLM Sampling Strategies — Controlling Generation</text>

  <!-- Temperature visualization -->
  <rect x="30" y="55" width="460" height="210" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="260" y="80" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">Temperature — Controls Randomness</text>

  <!-- Low temp -->
  <text x="60" y="105" fill="#54a0ff" font-size="9" font-weight="bold">T = 0.1 (Nearly Deterministic)</text>
  <rect x="60" y="112" width="180" height="12" fill="#54a0ff" opacity="0.8" rx="2"/>
  <rect x="240" y="112" width="10" height="12" fill="#54a0ff" opacity="0.1" rx="2"/>
  <rect x="252" y="112" width="5" height="12" fill="#54a0ff" opacity="0.05" rx="2"/>
  <text x="60" y="138" fill="#aaaaaa" font-size="7">"the" → 0.95 | "a" → 0.03 | "his" → 0.02  (focused, repetitive)</text>

  <!-- Medium temp -->
  <text x="60" y="160" fill="#00ff88" font-size="9" font-weight="bold">T = 0.7 (Balanced — most common)</text>
  <rect x="60" y="167" width="120" height="12" fill="#00ff88" opacity="0.7" rx="2"/>
  <rect x="182" y="167" width="50" height="12" fill="#00ff88" opacity="0.4" rx="2"/>
  <rect x="234" y="167" width="30" height="12" fill="#00ff88" opacity="0.2" rx="2"/>
  <rect x="266" y="167" width="15" height="12" fill="#00ff88" opacity="0.1" rx="2"/>
  <text x="60" y="193" fill="#aaaaaa" font-size="7">"the" → 0.55 | "a" → 0.22 | "his" → 0.13 | "my" → 0.10  (creative yet coherent)</text>

  <!-- High temp -->
  <text x="60" y="215" fill="#e94560" font-size="9" font-weight="bold">T = 1.5 (Highly Random)</text>
  <rect x="60" y="222" width="60" height="12" fill="#e94560" opacity="0.5" rx="2"/>
  <rect x="122" y="222" width="50" height="12" fill="#e94560" opacity="0.4" rx="2"/>
  <rect x="174" y="222" width="45" height="12" fill="#e94560" opacity="0.35" rx="2"/>
  <rect x="221" y="222" width="35" height="12" fill="#e94560" opacity="0.3" rx="2"/>
  <rect x="258" y="222" width="25" height="12" fill="#e94560" opacity="0.2" rx="2"/>
  <text x="60" y="248" fill="#aaaaaa" font-size="7">"the" → 0.25 | "a" → 0.20 | "his" → 0.18 | "purple" → 0.12  (wild, may be incoherent)</text>

  <text x="260" y="262" text-anchor="middle" fill="#ffffff" font-size="8">Formula: P(token) = softmax(logit / T)</text>

  <!-- Top-K and Top-P -->
  <rect x="510" y="55" width="460" height="210" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="740" y="80" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">Top-K &amp; Top-P (Nucleus) Sampling</text>

  <!-- Top-K -->
  <text x="530" y="108" fill="#a29bfe" font-size="10" font-weight="bold">Top-K = 5</text>
  <text x="530" y="126" fill="#ffffff" font-size="8">Keep only the K highest-probability tokens, zero the rest</text>

  <rect x="530" y="135" width="60" height="20" fill="#a29bfe" opacity="0.7" rx="3"/>
  <text x="560" y="149" text-anchor="middle" fill="#fff" font-size="7">the</text>
  <rect x="595" y="135" width="50" height="20" fill="#a29bfe" opacity="0.5" rx="3"/>
  <text x="620" y="149" text-anchor="middle" fill="#fff" font-size="7">a</text>
  <rect x="650" y="135" width="40" height="20" fill="#a29bfe" opacity="0.4" rx="3"/>
  <text x="670" y="149" text-anchor="middle" fill="#fff" font-size="7">his</text>
  <rect x="695" y="135" width="35" height="20" fill="#a29bfe" opacity="0.3" rx="3"/>
  <text x="712" y="149" text-anchor="middle" fill="#fff" font-size="7">my</text>
  <rect x="735" y="135" width="30" height="20" fill="#a29bfe" opacity="0.2" rx="3"/>
  <text x="750" y="149" text-anchor="middle" fill="#fff" font-size="7">her</text>
  <rect x="775" y="135" width="30" height="20" fill="#333" opacity="0.3" rx="3" stroke="#555" stroke-dasharray="2"/>
  <text x="790" y="149" text-anchor="middle" fill="#555" font-size="7">...</text>
  <text x="830" y="149" fill="#aaaaaa" font-size="7">← removed</text>

  <!-- Top-P -->
  <text x="530" y="180" fill="#00ff88" font-size="10" font-weight="bold">Top-P = 0.9 (Nucleus)</text>
  <text x="530" y="198" fill="#ffffff" font-size="8">Keep smallest set of tokens whose cumulative probability ≥ P</text>

  <rect x="530" y="207" width="70" height="20" fill="#00ff88" opacity="0.6" rx="3"/>
  <text x="565" y="221" text-anchor="middle" fill="#fff" font-size="7">the (0.40)</text>
  <rect x="605" y="207" width="60" height="20" fill="#00ff88" opacity="0.5" rx="3"/>
  <text x="635" y="221" text-anchor="middle" fill="#fff" font-size="7">a (0.25)</text>
  <rect x="670" y="207" width="55" height="20" fill="#00ff88" opacity="0.4" rx="3"/>
  <text x="697" y="221" text-anchor="middle" fill="#fff" font-size="7">his (0.15)</text>
  <rect x="730" y="207" width="50" height="20" fill="#00ff88" opacity="0.3" rx="3"/>
  <text x="755" y="221" text-anchor="middle" fill="#fff" font-size="7">my (0.10)</text>
  <rect x="785" y="207" width="40" height="20" fill="#333" opacity="0.3" rx="3" stroke="#555" stroke-dasharray="2"/>
  <text x="805" y="221" text-anchor="middle" fill="#555" font-size="7">0.05</text>
  <text x="838" y="221" fill="#aaaaaa" font-size="7">← cut (Σ≥0.9)</text>

  <text x="530" y="252" fill="#feca57" font-size="8" font-weight="bold">Key difference:</text>
  <text x="530" y="265" fill="#ffffff" font-size="8">Top-K: fixed number of candidates regardless of distribution</text>
  <text x="530" y="278" fill="#ffffff" font-size="8">Top-P: adaptive — fewer candidates when model is confident</text>

  <!-- Inference pipeline -->
  <rect x="30" y="280" width="940" height="100" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="500" y="305" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Complete Sampling Pipeline</text>

  <!-- Steps -->
  <rect x="50" y="320" width="110" height="40" fill="#16213e" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="105" y="338" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Raw Logits</text>
  <text x="105" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(vocab_size floats)</text>

  <line x1="160" y1="340" x2="185" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>

  <rect x="185" y="320" width="110" height="40" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="240" y="338" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">÷ Temperature</text>
  <text x="240" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(sharpen/flatten)</text>

  <line x1="295" y1="340" x2="320" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>

  <rect x="320" y="320" width="110" height="40" fill="#16213e" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="375" y="338" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Top-K Filter</text>
  <text x="375" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(keep top K)</text>

  <line x1="430" y1="340" x2="455" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>

  <rect x="455" y="320" width="110" height="40" fill="#16213e" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="510" y="338" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Top-P Filter</text>
  <text x="510" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(nucleus cutoff)</text>

  <line x1="565" y1="340" x2="590" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>

  <rect x="590" y="320" width="110" height="40" fill="#16213e" stroke="#00d2d3" stroke-width="1.5" rx="4"/>
  <text x="645" y="338" text-anchor="middle" fill="#00d2d3" font-size="8" font-weight="bold">Softmax</text>
  <text x="645" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(→ probabilities)</text>

  <line x1="700" y1="340" x2="725" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>

  <rect x="725" y="320" width="120" height="40" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="785" y="338" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Sample Token</text>
  <text x="785" y="352" text-anchor="middle" fill="#aaaaaa" font-size="7">(multinomial draw)</text>

  <line x1="845" y1="340" x2="870" y2="340" stroke="#fff" stroke-width="1" marker-end="url(#sampA)"/>
  <text x="920" y="344" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">→ "the"</text>

  <!-- Common configs -->
  <rect x="30" y="395" width="940" height="110" fill="#16213e" stroke="#a29bfe" stroke-width="1.5" rx="8"/>
  <text x="500" y="420" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">Recommended Settings by Use Case</text>

  <text x="60" y="445" fill="#00ff88" font-size="9" font-weight="bold">Factual/Code (low creativity):</text>
  <text x="60" y="463" fill="#ffffff" font-size="8">T=0.0-0.3, top_p=0.1 or greedy (T=0)</text>
  <text x="60" y="481" fill="#aaaaaa" font-size="7">Code completion, math, factual QA</text>

  <text x="310" y="445" fill="#feca57" font-size="9" font-weight="bold">Balanced (general chat):</text>
  <text x="310" y="463" fill="#ffffff" font-size="8">T=0.7, top_p=0.9, top_k=50</text>
  <text x="310" y="481" fill="#aaaaaa" font-size="7">Conversational AI, explanations</text>

  <text x="560" y="445" fill="#e94560" font-size="9" font-weight="bold">Creative (high diversity):</text>
  <text x="560" y="463" fill="#ffffff" font-size="8">T=0.9-1.2, top_p=0.95, top_k=100</text>
  <text x="560" y="481" fill="#aaaaaa" font-size="7">Creative writing, brainstorming</text>

  <text x="810" y="445" fill="#54a0ff" font-size="9" font-weight="bold">Deterministic:</text>
  <text x="810" y="463" fill="#ffffff" font-size="8">T=0 (argmax, no sampling)</text>
  <text x="810" y="481" fill="#aaaaaa" font-size="7">Reproducible outputs, evals</text>

  <text x="500" y="503" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Pro tip: Never use T&gt;0 AND top_p=1.0 AND top_k=∞ — this allows any token including nonsense</text>

  <defs>
    <marker id="sampA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
