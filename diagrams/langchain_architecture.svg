<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="600" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">LangChain Architecture — Ecosystem Overview</text>

  <!-- Top Layer: Application Types -->
  <rect x="30" y="55" width="990" height="70" fill="#16213e" stroke="#e94560" stroke-width="2" rx="8"/>
  <text x="525" y="75" text-anchor="middle" fill="#e94560" font-size="11" font-weight="bold">APPLICATION LAYER — What You Build</text>

  <rect x="50" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="120" y="105" text-anchor="middle" fill="#ffffff" font-size="9">Chatbots</text>

  <rect x="210" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="280" y="105" text-anchor="middle" fill="#ffffff" font-size="9">RAG Systems</text>

  <rect x="370" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="440" y="105" text-anchor="middle" fill="#ffffff" font-size="9">AI Agents</text>

  <rect x="530" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="600" y="105" text-anchor="middle" fill="#ffffff" font-size="9">Summarization</text>

  <rect x="690" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="760" y="105" text-anchor="middle" fill="#ffffff" font-size="9">Data Extraction</text>

  <rect x="850" y="85" width="140" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="920" y="105" text-anchor="middle" fill="#ffffff" font-size="9">Code Assistants</text>

  <!-- LangGraph Layer -->
  <rect x="30" y="138" width="490" height="65" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="275" y="158" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold">LangGraph — Multi-Actor Orchestration</text>
  <text x="55" y="178" fill="#aaaaaa" font-size="8">• Stateful multi-step workflows</text>
  <text x="55" y="192" fill="#aaaaaa" font-size="8">• Cycles &amp; branching in agent graphs</text>
  <text x="280" y="178" fill="#aaaaaa" font-size="8">• Human-in-the-loop</text>
  <text x="280" y="192" fill="#aaaaaa" font-size="8">• Persistence &amp; streaming</text>

  <!-- LangSmith Layer -->
  <rect x="540" y="138" width="480" height="65" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="780" y="158" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">LangSmith — Observability &amp; Evaluation</text>
  <text x="560" y="178" fill="#aaaaaa" font-size="8">• Trace every chain/agent step</text>
  <text x="560" y="192" fill="#aaaaaa" font-size="8">• Dataset management &amp; testing</text>
  <text x="790" y="178" fill="#aaaaaa" font-size="8">• Production monitoring</text>
  <text x="790" y="192" fill="#aaaaaa" font-size="8">• Prompt versioning</text>

  <!-- Core LangChain Layer -->
  <rect x="30" y="216" width="990" height="180" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="525" y="238" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">LangChain Core — Building Blocks (LCEL Runnables)</text>

  <!-- Row 1: Core components -->
  <rect x="50" y="250" width="130" height="60" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="115" y="270" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Prompts</text>
  <text x="115" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">ChatPromptTemplate</text>
  <text x="115" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">Few-shot, Messages</text>

  <rect x="195" y="250" width="130" height="60" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="260" y="270" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Models</text>
  <text x="260" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">ChatOpenAI, Claude</text>
  <text x="260" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">Ollama, HuggingFace</text>

  <rect x="340" y="250" width="130" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="405" y="270" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Output Parsers</text>
  <text x="405" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">JSON, Pydantic</text>
  <text x="405" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">StrOutput, List</text>

  <rect x="485" y="250" width="130" height="60" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="550" y="270" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Retrievers</text>
  <text x="550" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">Vector, BM25, MMR</text>
  <text x="550" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">Multi-query, Parent</text>

  <rect x="630" y="250" width="130" height="60" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="4"/>
  <text x="695" y="270" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Tools</text>
  <text x="695" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">@tool decorator</text>
  <text x="695" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">Search, DB, API</text>

  <rect x="775" y="250" width="130" height="60" fill="#0f3460" stroke="#ff6b6b" stroke-width="1.5" rx="4"/>
  <text x="840" y="270" text-anchor="middle" fill="#ff6b6b" font-size="9" font-weight="bold">Memory</text>
  <text x="840" y="285" text-anchor="middle" fill="#aaaaaa" font-size="7">Buffer, Summary</text>
  <text x="840" y="297" text-anchor="middle" fill="#aaaaaa" font-size="7">Redis, Session</text>

  <!-- LCEL Pipe visualization -->
  <rect x="50" y="325" width="855" height="55" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="6"/>
  <text x="477" y="345" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">LCEL Chain:  prompt | model | parser  (everything is a Runnable)</text>
  <text x="477" y="365" text-anchor="middle" fill="#ffffff" font-size="9">invoke() | stream() | batch() | ainvoke() | astream() | abatch()</text>
  <text x="477" y="378" text-anchor="middle" fill="#aaaaaa" font-size="8">RunnableParallel | RunnablePassthrough | RunnableBranch | RunnableLambda</text>

  <!-- Integration Layer -->
  <rect x="30" y="410" width="990" height="80" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="432" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">INTEGRATIONS — 700+ Connectors</text>

  <!-- LLM Providers -->
  <rect x="50" y="442" width="180" height="38" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="140" y="457" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">LLM Providers</text>
  <text x="140" y="472" text-anchor="middle" fill="#aaaaaa" font-size="7">OpenAI, Anthropic, Google, Ollama, Cohere</text>

  <!-- Vector Stores -->
  <rect x="250" y="442" width="180" height="38" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="340" y="457" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Vector Stores</text>
  <text x="340" y="472" text-anchor="middle" fill="#aaaaaa" font-size="7">Chroma, Pinecone, Weaviate, FAISS, Qdrant</text>

  <!-- Document Loaders -->
  <rect x="450" y="442" width="180" height="38" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="540" y="457" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Document Loaders</text>
  <text x="540" y="472" text-anchor="middle" fill="#aaaaaa" font-size="7">PDF, HTML, CSV, Notion, Confluence, S3</text>

  <!-- Tools & APIs -->
  <rect x="650" y="442" width="180" height="38" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="740" y="457" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Tools &amp; APIs</text>
  <text x="740" y="472" text-anchor="middle" fill="#aaaaaa" font-size="7">Tavily, Wikipedia, Wolfram, SQL, Python</text>

  <!-- Memory Stores -->
  <rect x="850" y="442" width="150" height="38" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="925" y="457" text-anchor="middle" fill="#ff6b6b" font-size="8" font-weight="bold">Memory Stores</text>
  <text x="925" y="472" text-anchor="middle" fill="#aaaaaa" font-size="7">Redis, DynamoDB, Postgres</text>

  <!-- Deployment Layer -->
  <rect x="30" y="503" width="990" height="80" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="525" y="525" text-anchor="middle" fill="#00d2d3" font-size="11" font-weight="bold">DEPLOYMENT — Serve &amp; Scale</text>

  <rect x="50" y="537" width="200" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="150" y="558" text-anchor="middle" fill="#ffffff" font-size="9">LangServe (FastAPI)</text>

  <rect x="270" y="537" width="200" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="370" y="558" text-anchor="middle" fill="#ffffff" font-size="9">Docker + Kubernetes</text>

  <rect x="490" y="537" width="200" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="590" y="558" text-anchor="middle" fill="#ffffff" font-size="9">AWS Lambda / Cloud Run</text>

  <rect x="710" y="537" width="200" height="35" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="810" y="558" text-anchor="middle" fill="#ffffff" font-size="9">Streamlit / Gradio</text>

  <!-- Version info -->
  <text x="525" y="593" text-anchor="middle" fill="#666666" font-size="8">LangChain v0.2+ | Python &amp; JavaScript | Open Source (MIT)</text>
</svg>
