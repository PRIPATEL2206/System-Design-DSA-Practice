<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="450" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#FF6F00" font-size="20" font-weight="bold">TensorFlow vs PyTorch — Key Differences</text>

  <!-- TensorFlow Column -->
  <rect x="30" y="60" width="460" height="370" fill="#16213e" stroke="#FF6F00" stroke-width="2" rx="10"/>
  <text x="260" y="90" text-anchor="middle" fill="#FF6F00" font-size="16" font-weight="bold">TensorFlow</text>
  <text x="260" y="108" text-anchor="middle" fill="#aaaaaa" font-size="10">Google | Production-first | Static+Dynamic</text>

  <!-- TF Features -->
  <rect x="50" y="120" width="200" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="150" y="140" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Execution Mode</text>
  <text x="150" y="157" text-anchor="middle" fill="#ffffff" font-size="9">Eager + tf.function (graph)</text>

  <rect x="270" y="120" width="200" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="370" y="140" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">High-Level API</text>
  <text x="370" y="157" text-anchor="middle" fill="#ffffff" font-size="9">Keras (built-in, official)</text>

  <rect x="50" y="175" width="200" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="150" y="195" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Deployment</text>
  <text x="150" y="212" text-anchor="middle" fill="#ffffff" font-size="9">TF Serving, TF Lite, TF.js, TFX</text>

  <rect x="270" y="175" width="200" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="370" y="195" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Hardware</text>
  <text x="370" y="212" text-anchor="middle" fill="#ffffff" font-size="9">TPU native support</text>

  <rect x="50" y="230" width="200" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="5"/>
  <text x="150" y="250" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Data Pipeline</text>
  <text x="150" y="267" text-anchor="middle" fill="#ffffff" font-size="9">tf.data (built-in, optimized)</text>

  <rect x="270" y="230" width="200" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="5"/>
  <text x="370" y="250" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Visualization</text>
  <text x="370" y="267" text-anchor="middle" fill="#ffffff" font-size="9">TensorBoard (industry standard)</text>

  <!-- TF Pros/Cons -->
  <rect x="50" y="290" width="420" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="60" y="310" fill="#00ff88" font-size="10" font-weight="bold">Strengths:</text>
  <text x="60" y="325" fill="#ffffff" font-size="9">Production deployment ecosystem | Mobile/edge (TF Lite) | TPU support</text>
  <text x="60" y="338" fill="#ffffff" font-size="9">End-to-end MLOps (TFX) | Mature serving infrastructure</text>

  <rect x="50" y="350" width="420" height="40" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="5"/>
  <text x="60" y="368" fill="#ff6b6b" font-size="10" font-weight="bold">Weaknesses:</text>
  <text x="60" y="383" fill="#ffffff" font-size="9">Steeper learning curve | API changes between versions | Debugging harder</text>

  <!-- Use cases -->
  <text x="260" y="412" text-anchor="middle" fill="#FF6F00" font-size="11" font-weight="bold">Best for: Production systems, Mobile, Google Cloud</text>

  <!-- PyTorch Column -->
  <rect x="510" y="60" width="460" height="370" fill="#16213e" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="740" y="90" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">PyTorch</text>
  <text x="740" y="108" text-anchor="middle" fill="#aaaaaa" font-size="10">Meta | Research-first | Dynamic</text>

  <!-- PyTorch Features -->
  <rect x="530" y="120" width="200" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="630" y="140" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">Execution Mode</text>
  <text x="630" y="157" text-anchor="middle" fill="#ffffff" font-size="9">Dynamic (eager by default)</text>

  <rect x="750" y="120" width="200" height="45" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="5"/>
  <text x="850" y="140" text-anchor="middle" fill="#00d2d3" font-size="10" font-weight="bold">High-Level API</text>
  <text x="850" y="157" text-anchor="middle" fill="#ffffff" font-size="9">PyTorch Lightning, HuggingFace</text>

  <rect x="530" y="175" width="200" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="630" y="195" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Deployment</text>
  <text x="630" y="212" text-anchor="middle" fill="#ffffff" font-size="9">TorchServe, ONNX, TorchScript</text>

  <rect x="750" y="175" width="200" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="5"/>
  <text x="850" y="195" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Hardware</text>
  <text x="850" y="212" text-anchor="middle" fill="#ffffff" font-size="9">CUDA native, ROCm</text>

  <rect x="530" y="230" width="200" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="5"/>
  <text x="630" y="250" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Data Pipeline</text>
  <text x="630" y="267" text-anchor="middle" fill="#ffffff" font-size="9">DataLoader + Datasets</text>

  <rect x="750" y="230" width="200" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="5"/>
  <text x="850" y="250" text-anchor="middle" fill="#54a0ff" font-size="10" font-weight="bold">Visualization</text>
  <text x="850" y="267" text-anchor="middle" fill="#ffffff" font-size="9">TensorBoard + W&amp;B</text>

  <!-- PyTorch Pros/Cons -->
  <rect x="530" y="290" width="420" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="540" y="310" fill="#00ff88" font-size="10" font-weight="bold">Strengths:</text>
  <text x="540" y="325" fill="#ffffff" font-size="9">Pythonic, intuitive | Easier debugging (standard Python) | Research standard</text>
  <text x="540" y="338" fill="#ffffff" font-size="9">Dynamic graphs | HuggingFace ecosystem | 80%+ of papers</text>

  <rect x="530" y="350" width="420" height="40" fill="#0f3460" stroke="#ff6b6b" stroke-width="1" rx="5"/>
  <text x="540" y="368" fill="#ff6b6b" font-size="10" font-weight="bold">Weaknesses:</text>
  <text x="540" y="383" fill="#ffffff" font-size="9">Deployment less mature | No native mobile | Serving requires more setup</text>

  <!-- Use cases -->
  <text x="740" y="412" text-anchor="middle" fill="#e94560" font-size="11" font-weight="bold">Best for: Research, NLP/LLMs, Rapid prototyping</text>

  <!-- VS divider -->
  <circle cx="500" cy="245" r="20" fill="#1a1a2e" stroke="#ffffff" stroke-width="2"/>
  <text x="500" y="250" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">VS</text>
</svg>
