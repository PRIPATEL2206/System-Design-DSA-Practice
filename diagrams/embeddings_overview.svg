<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="500" fill="#1a1a2e" rx="10"/>
  <text x="500" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">Embeddings — From Text to Vectors</text>

  <!-- Text to embedding flow -->
  <rect x="30" y="55" width="940" height="110" fill="#16213e" stroke="#54a0ff" stroke-width="2" rx="8"/>
  <text x="500" y="78" text-anchor="middle" fill="#54a0ff" font-size="12" font-weight="bold">Embedding Process: Text → Dense Vector</text>

  <!-- Input texts -->
  <rect x="50" y="90" width="180" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="140" y="110" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Input Texts</text>
  <text x="140" y="125" text-anchor="middle" fill="#ffffff" font-size="7">"The cat sat on the mat"</text>
  <text x="140" y="138" text-anchor="middle" fill="#ffffff" font-size="7">"A kitten rested on a rug"</text>

  <line x1="230" y1="117" x2="270" y2="117" stroke="#fff" stroke-width="1.5" marker-end="url(#embA)"/>

  <!-- Embedding model -->
  <rect x="270" y="90" width="180" height="55" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="6"/>
  <text x="360" y="110" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Embedding Model</text>
  <text x="360" y="125" text-anchor="middle" fill="#ffffff" font-size="7">text-embedding-3-small</text>
  <text x="360" y="138" text-anchor="middle" fill="#aaaaaa" font-size="7">(or sentence-transformers)</text>

  <line x1="450" y1="117" x2="490" y2="117" stroke="#fff" stroke-width="1.5" marker-end="url(#embA)"/>

  <!-- Output vectors -->
  <rect x="490" y="90" width="240" height="55" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="610" y="107" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Dense Vectors (d=1536)</text>
  <text x="610" y="122" text-anchor="middle" fill="#ffffff" font-size="7">[0.023, -0.156, 0.891, ..., 0.044]</text>
  <text x="610" y="137" text-anchor="middle" fill="#ffffff" font-size="7">[0.019, -0.148, 0.887, ..., 0.051]</text>

  <line x1="730" y1="117" x2="770" y2="117" stroke="#fff" stroke-width="1.5" marker-end="url(#embA)"/>

  <!-- Similarity -->
  <rect x="770" y="90" width="180" height="55" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="4"/>
  <text x="860" y="110" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Cosine Similarity</text>
  <text x="860" y="128" text-anchor="middle" fill="#00ff88" font-size="12">0.94</text>
  <text x="860" y="142" text-anchor="middle" fill="#aaaaaa" font-size="7">(semantically similar!)</text>

  <!-- Embedding space visualization -->
  <rect x="30" y="180" width="470" height="300" fill="#16213e" stroke="#feca57" stroke-width="1.5" rx="8"/>
  <text x="265" y="205" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Embedding Space (2D projection of 1536D)</text>

  <!-- Cluster 1: Animals -->
  <circle cx="150" cy="280" r="60" fill="#e94560" opacity="0.1" stroke="#e94560" stroke-width="1" stroke-dasharray="3"/>
  <text x="150" y="250" text-anchor="middle" fill="#e94560" font-size="8">Animals</text>
  <circle cx="130" cy="285" r="4" fill="#e94560"/>
  <text x="130" y="300" text-anchor="middle" fill="#ffffff" font-size="6">"cat"</text>
  <circle cx="160" cy="275" r="4" fill="#e94560"/>
  <text x="160" y="266" text-anchor="middle" fill="#ffffff" font-size="6">"kitten"</text>
  <circle cx="170" cy="300" r="4" fill="#e94560"/>
  <text x="170" y="315" text-anchor="middle" fill="#ffffff" font-size="6">"dog"</text>
  <circle cx="140" cy="310" r="4" fill="#e94560"/>
  <text x="140" y="325" text-anchor="middle" fill="#ffffff" font-size="6">"puppy"</text>

  <!-- Cluster 2: Technology -->
  <circle cx="350" cy="310" r="60" fill="#54a0ff" opacity="0.1" stroke="#54a0ff" stroke-width="1" stroke-dasharray="3"/>
  <text x="350" y="280" text-anchor="middle" fill="#54a0ff" font-size="8">Technology</text>
  <circle cx="330" cy="310" r="4" fill="#54a0ff"/>
  <text x="330" cy="325" text-anchor="middle" fill="#ffffff" font-size="6">"GPU"</text>
  <circle cx="360" cy="320" r="4" fill="#54a0ff"/>
  <text x="360" y="335" text-anchor="middle" fill="#ffffff" font-size="6">"CPU"</text>
  <circle cx="370" cy="295" r="4" fill="#54a0ff"/>
  <text x="370" y="285" text-anchor="middle" fill="#ffffff" font-size="6">"server"</text>

  <!-- Cluster 3: Food -->
  <circle cx="250" cy="410" r="55" fill="#00ff88" opacity="0.1" stroke="#00ff88" stroke-width="1" stroke-dasharray="3"/>
  <text x="250" y="385" text-anchor="middle" fill="#00ff88" font-size="8">Food</text>
  <circle cx="230" cy="415" r="4" fill="#00ff88"/>
  <text x="230" y="430" text-anchor="middle" fill="#ffffff" font-size="6">"pizza"</text>
  <circle cx="260" cy="425" r="4" fill="#00ff88"/>
  <text x="260" y="440" text-anchor="middle" fill="#ffffff" font-size="6">"pasta"</text>
  <circle cx="270" cy="405" r="4" fill="#00ff88"/>
  <text x="270" y="396" text-anchor="middle" fill="#ffffff" font-size="6">"sushi"</text>

  <!-- Key property -->
  <text x="265" y="470" text-anchor="middle" fill="#aaaaaa" font-size="8">Semantically similar items cluster together in vector space</text>

  <!-- Properties panel -->
  <rect x="520" y="180" width="450" height="140" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="8"/>
  <text x="745" y="205" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Key Properties of Embeddings</text>

  <text x="540" y="230" fill="#ffffff" font-size="8">• Semantic meaning captured as geometry (distance = dissimilarity)</text>
  <text x="540" y="248" fill="#ffffff" font-size="8">• Analogies work: king - man + woman ≈ queen</text>
  <text x="540" y="266" fill="#ffffff" font-size="8">• Fixed-size vectors regardless of input length</text>
  <text x="540" y="284" fill="#ffffff" font-size="8">• Enable fast similarity search (ANN algorithms)</text>
  <text x="540" y="302" fill="#ffffff" font-size="8">• Language-agnostic (multilingual models)</text>
  <text x="540" y="320" fill="#ffffff" font-size="8">• Dimensions: 384 (small), 768 (base), 1536 (large), 3072 (xl)</text>

  <!-- Models table -->
  <rect x="520" y="335" width="450" height="145" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="8"/>
  <text x="745" y="360" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">Popular Embedding Models</text>

  <text x="540" y="385" fill="#e94560" font-size="8" font-weight="bold">OpenAI:</text>
  <text x="620" y="385" fill="#ffffff" font-size="8">text-embedding-3-small (1536d), 3-large (3072d)</text>

  <text x="540" y="405" fill="#feca57" font-size="8" font-weight="bold">Cohere:</text>
  <text x="620" y="405" fill="#ffffff" font-size="8">embed-v3 (1024d), multilingual</text>

  <text x="540" y="425" fill="#00ff88" font-size="8" font-weight="bold">Open-source:</text>
  <text x="620" y="425" fill="#ffffff" font-size="8">BGE, E5, GTE, Nomic (384-1024d)</text>

  <text x="540" y="445" fill="#00d2d3" font-size="8" font-weight="bold">Sentence-T:</text>
  <text x="620" y="445" fill="#ffffff" font-size="8">all-MiniLM-L6-v2 (384d), all-mpnet (768d)</text>

  <text x="540" y="468" fill="#aaaaaa" font-size="7">MTEB leaderboard: huggingface.co/spaces/mteb/leaderboard</text>

  <defs>
    <marker id="embA" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/></marker>
  </defs>
</svg>
