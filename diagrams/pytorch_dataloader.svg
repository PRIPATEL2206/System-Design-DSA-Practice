<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="500" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#EE4C2C" font-size="20" font-weight="bold">PyTorch Dataset &amp; DataLoader Pipeline</text>

  <!-- Dataset section -->
  <rect x="30" y="60" width="300" height="200" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="10"/>
  <text x="180" y="85" text-anchor="middle" fill="#00d2d3" font-size="14" font-weight="bold">Dataset (torch.utils.data)</text>

  <rect x="50" y="100" width="260" height="70" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="6"/>
  <text x="70" y="120" fill="#a29bfe" font-size="10">class MyDataset(Dataset):</text>
  <text x="80" y="137" fill="#ffffff" font-size="10">def __init__(self): # load data</text>
  <text x="80" y="154" fill="#ffffff" font-size="10">def __len__(self): # return size</text>
  <text x="80" y="167" fill="#ffffff" font-size="10">def __getitem__(self, idx):</text>

  <text x="180" y="195" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Types:</text>
  <text x="180" y="212" text-anchor="middle" fill="#aaaaaa" font-size="9">Map-style: index → sample (most common)</text>
  <text x="180" y="228" text-anchor="middle" fill="#aaaaaa" font-size="9">Iterable-style: streaming data</text>
  <text x="180" y="244" text-anchor="middle" fill="#aaaaaa" font-size="9">Built-in: torchvision.datasets.MNIST, etc.</text>

  <!-- Arrow -->
  <line x1="330" y1="160" x2="380" y2="160" stroke="#00d2d3" stroke-width="2" marker-end="url(#dlArrow1)"/>
  <text x="355" y="150" text-anchor="middle" fill="#00d2d3" font-size="9">feed</text>

  <!-- DataLoader section -->
  <rect x="380" y="60" width="350" height="200" fill="#16213e" stroke="#feca57" stroke-width="2" rx="10"/>
  <text x="555" y="85" text-anchor="middle" fill="#feca57" font-size="14" font-weight="bold">DataLoader (Iterator)</text>

  <!-- DataLoader internals -->
  <rect x="400" y="100" width="145" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="5"/>
  <text x="472" y="118" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Sampler</text>
  <text x="472" y="135" text-anchor="middle" fill="#aaaaaa" font-size="9">Random/Sequential</text>

  <rect x="565" y="100" width="145" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="5"/>
  <text x="637" y="118" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Batch Sampler</text>
  <text x="637" y="135" text-anchor="middle" fill="#aaaaaa" font-size="9">Groups into batches</text>

  <rect x="400" y="155" width="145" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="5"/>
  <text x="472" y="173" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Workers</text>
  <text x="472" y="190" text-anchor="middle" fill="#aaaaaa" font-size="9">num_workers=4</text>

  <rect x="565" y="155" width="145" height="45" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="5"/>
  <text x="637" y="173" text-anchor="middle" fill="#feca57" font-size="10" font-weight="bold">Collate Fn</text>
  <text x="637" y="190" text-anchor="middle" fill="#aaaaaa" font-size="9">Stack → tensor batch</text>

  <rect x="400" y="210" width="310" height="35" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="5"/>
  <text x="555" y="232" text-anchor="middle" fill="#00ff88" font-size="10">pin_memory=True → faster GPU transfer</text>

  <!-- Arrow -->
  <line x1="730" y1="160" x2="780" y2="160" stroke="#feca57" stroke-width="2" marker-end="url(#dlArrow2)"/>
  <text x="755" y="150" text-anchor="middle" fill="#feca57" font-size="9">yield</text>

  <!-- Training output -->
  <rect x="780" y="60" width="190" height="200" fill="#16213e" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="875" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">Training Loop</text>

  <rect x="800" y="100" width="150" height="30" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="875" y="120" text-anchor="middle" fill="#ffffff" font-size="9">for batch in loader:</text>

  <rect x="800" y="140" width="150" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="875" y="157" text-anchor="middle" fill="#ffffff" font-size="9">X, y = batch</text>

  <rect x="800" y="175" width="150" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="875" y="192" text-anchor="middle" fill="#ffffff" font-size="9">X = X.to(device)</text>

  <rect x="800" y="210" width="150" height="25" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="875" y="227" text-anchor="middle" fill="#ffffff" font-size="9">pred = model(X)</text>

  <!-- DataLoader config -->
  <rect x="30" y="285" width="940" height="95" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="8"/>
  <text x="500" y="310" text-anchor="middle" fill="#54a0ff" font-size="13" font-weight="bold">DataLoader Configuration</text>

  <text x="60" y="335" fill="#ffffff" font-size="11">DataLoader(dataset, batch_size=32, shuffle=True, num_workers=4, pin_memory=True, drop_last=True)</text>
  <text x="60" y="358" fill="#aaaaaa" font-size="10">• batch_size: Samples per batch | shuffle: Randomize each epoch | num_workers: Parallel loading processes</text>
  <text x="60" y="373" fill="#aaaaaa" font-size="10">• pin_memory: Pre-allocate GPU-ready memory (use with CUDA) | drop_last: Drop incomplete final batch</text>

  <!-- Performance Tips -->
  <rect x="30" y="400" width="940" height="85" fill="#16213e" stroke="#00ff88" stroke-width="1.5" rx="8"/>
  <text x="500" y="425" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">Performance Optimization Tips</text>

  <text x="60" y="448" fill="#ffffff" font-size="10">1. num_workers = 4 × num_GPUs (rule of thumb) — too many causes memory issues</text>
  <text x="60" y="465" fill="#ffffff" font-size="10">2. pin_memory=True — enables async CPU→GPU transfer (non_blocking=True on .to())</text>
  <text x="60" y="482" fill="#ffffff" font-size="10">3. persistent_workers=True — avoid worker restart overhead between epochs (PyTorch ≥1.7)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="dlArrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#00d2d3"/></marker>
    <marker id="dlArrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#feca57"/></marker>
  </defs>
</svg>
