<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 460" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="460" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">RAG Chatbot Project — Production Architecture</text>

  <!-- User -->
  <rect x="30" y="70" width="100" height="50" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="6"/>
  <text x="80" y="92" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">User</text>
  <text x="80" y="108" text-anchor="middle" fill="#aaaaaa" font-size="7">Web/Mobile/API</text>

  <line x1="135" y1="95" x2="170" y2="95" stroke="#fff" stroke-width="1.5" marker-end="url(#rcArr2)"/>

  <!-- API + Cache -->
  <rect x="175" y="60" width="150" height="70" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="6"/>
  <text x="250" y="82" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">API Gateway</text>
  <text x="250" y="98" text-anchor="middle" fill="#aaaaaa" font-size="7">Auth + Rate Limit</text>
  <text x="250" y="112" text-anchor="middle" fill="#00d2d3" font-size="7">Semantic Cache (30% hit)</text>
  <text x="250" y="124" text-anchor="middle" fill="#aaaaaa" font-size="6">SSE streaming</text>

  <line x1="330" y1="95" x2="360" y2="95" stroke="#fff" stroke-width="1.5" marker-end="url(#rcArr2)"/>

  <!-- Hybrid Retrieval -->
  <rect x="365" y="55" width="200" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="2" rx="6"/>
  <text x="465" y="77" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Hybrid Retrieval</text>
  <text x="380" y="95" fill="#ffffff" font-size="7">Vector (0.7) + BM25 (0.3)</text>
  <text x="380" y="110" fill="#ffffff" font-size="7">→ RRF fusion → top-20</text>
  <text x="380" y="125" fill="#ffffff" font-size="7">→ Cross-encoder re-rank → top-5</text>

  <line x1="570" y1="95" x2="600" y2="95" stroke="#fff" stroke-width="1.5" marker-end="url(#rcArr2)"/>

  <!-- LLM Generation -->
  <rect x="605" y="55" width="180" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="6"/>
  <text x="695" y="77" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">LLM Generation</text>
  <text x="620" y="95" fill="#ffffff" font-size="7">GPT-4o-mini (default)</text>
  <text x="620" y="110" fill="#ffffff" font-size="7">Context + History + Prompt</text>
  <text x="620" y="125" fill="#ffffff" font-size="7">Citations enforced</text>

  <line x1="790" y1="95" x2="820" y2="95" stroke="#fff" stroke-width="1.5" marker-end="url(#rcArr2)"/>

  <!-- Guardrails + Response -->
  <rect x="825" y="60" width="140" height="70" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="895" y="82" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Guardrails</text>
  <text x="895" y="98" text-anchor="middle" fill="#aaaaaa" font-size="7">PII redaction</text>
  <text x="895" y="112" text-anchor="middle" fill="#aaaaaa" font-size="7">Hallucination check</text>
  <text x="895" y="124" text-anchor="middle" fill="#aaaaaa" font-size="7">→ Safe Response</text>

  <!-- Supporting Infrastructure -->
  <rect x="30" y="160" width="990" height="130" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="525" y="183" text-anchor="middle" fill="#a29bfe" font-size="11" font-weight="bold">Supporting Infrastructure</text>

  <rect x="50" y="195" width="180" height="80" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="4"/>
  <text x="140" y="215" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Vector DB (ChromaDB)</text>
  <text x="60" y="233" fill="#ffffff" font-size="7">• 50K document chunks</text>
  <text x="60" y="248" fill="#ffffff" font-size="7">• HNSW index (cosine)</text>
  <text x="60" y="263" fill="#ffffff" font-size="7">• MMR retrieval (diversity)</text>

  <rect x="250" y="195" width="180" height="80" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="340" y="215" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Memory (Redis)</text>
  <text x="260" y="233" fill="#ffffff" font-size="7">• Chat history per session</text>
  <text x="260" y="248" fill="#ffffff" font-size="7">• 100-msg window + summary</text>
  <text x="260" y="263" fill="#ffffff" font-size="7">• Semantic query cache</text>

  <rect x="450" y="195" width="180" height="80" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="4"/>
  <text x="540" y="215" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Embedding Pipeline</text>
  <text x="460" y="233" fill="#ffffff" font-size="7">• text-embedding-3-small</text>
  <text x="460" y="248" fill="#ffffff" font-size="7">• Batch ingest + incremental</text>
  <text x="460" y="263" fill="#ffffff" font-size="7">• 500 token chunks, 50 overlap</text>

  <rect x="650" y="195" width="180" height="80" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="740" y="215" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Monitoring</text>
  <text x="660" y="233" fill="#ffffff" font-size="7">• LangSmith tracing</text>
  <text x="660" y="248" fill="#ffffff" font-size="7">• Cost per conversation</text>
  <text x="660" y="263" fill="#ffffff" font-size="7">• Retrieval quality (RAGAS)</text>

  <rect x="850" y="195" width="150" height="80" fill="#0f3460" stroke="#00d2d3" stroke-width="1.5" rx="4"/>
  <text x="925" y="215" text-anchor="middle" fill="#00d2d3" font-size="8" font-weight="bold">Knowledge Base</text>
  <text x="860" y="233" fill="#ffffff" font-size="7">• PDFs, Markdown, HTML</text>
  <text x="860" y="248" fill="#ffffff" font-size="7">• Auto-update pipeline</text>
  <text x="860" y="263" fill="#ffffff" font-size="7">• Version tracking</text>

  <!-- Metrics -->
  <rect x="30" y="305" width="990" height="135" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="525" y="328" text-anchor="middle" fill="#feca57" font-size="11" font-weight="bold">Project Metrics &amp; Results</text>

  <rect x="50" y="342" width="280" height="80" fill="#0f3460" rx="4"/>
  <text x="190" y="362" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="bold">Performance</text>
  <text x="65" y="380" fill="#ffffff" font-size="8">• Retrieval Recall@5: 93%</text>
  <text x="65" y="395" fill="#ffffff" font-size="8">• Answer Faithfulness: 0.91 (RAGAS)</text>
  <text x="65" y="410" fill="#ffffff" font-size="8">• Latency (p95): 2.1s (with streaming)</text>

  <rect x="350" y="342" width="280" height="80" fill="#0f3460" rx="4"/>
  <text x="490" y="362" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Cost Optimization</text>
  <text x="365" y="380" fill="#ffffff" font-size="8">• Semantic cache: 30% queries saved</text>
  <text x="365" y="395" fill="#ffffff" font-size="8">• Model routing: 80% mini, 20% full</text>
  <text x="365" y="410" fill="#ffffff" font-size="8">• Cost/conversation: $0.03 avg</text>

  <rect x="650" y="342" width="350" height="80" fill="#0f3460" rx="4"/>
  <text x="825" y="362" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Stack Summary</text>
  <text x="665" y="380" fill="#ffffff" font-size="8">LangChain + ChromaDB + Redis + GPT-4o-mini</text>
  <text x="665" y="395" fill="#ffffff" font-size="8">FastAPI + Docker + sentence-transformers (re-ranker)</text>
  <text x="665" y="410" fill="#ffffff" font-size="8">LangSmith (observability) + RAGAS (eval)</text>

  <defs>
    <marker id="rcArr2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
