<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="620" fill="#1a1a2e" rx="10"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" fill="#EE4C2C" font-size="22" font-weight="bold">PyTorch Ecosystem Architecture</text>

  <!-- Core -->
  <rect x="300" y="260" width="400" height="90" fill="#1B5E20" stroke="#EE4C2C" stroke-width="3" rx="12"/>
  <text x="500" y="295" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">PyTorch Core (libtorch)</text>
  <text x="500" y="318" text-anchor="middle" fill="#aaaaaa" font-size="11">Tensor Operations | Autograd Engine | CUDA Backend</text>
  <text x="500" y="338" text-anchor="middle" fill="#aaaaaa" font-size="11">Dynamic Computation Graphs | C++ ATen Library</text>

  <!-- High-Level APIs -->
  <text x="500" y="75" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">High-Level APIs &amp; Libraries</text>

  <rect x="30" y="90" width="180" height="65" fill="#16213e" stroke="#EE4C2C" stroke-width="2" rx="8"/>
  <text x="120" y="115" text-anchor="middle" fill="#EE4C2C" font-size="13" font-weight="bold">torch.nn</text>
  <text x="120" y="133" text-anchor="middle" fill="#aaaaaa" font-size="10">Layers, Models</text>
  <text x="120" y="148" text-anchor="middle" fill="#aaaaaa" font-size="10">nn.Module base class</text>

  <rect x="230" y="90" width="180" height="65" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="320" y="115" text-anchor="middle" fill="#00d2d3" font-size="13" font-weight="bold">torch.optim</text>
  <text x="320" y="133" text-anchor="middle" fill="#aaaaaa" font-size="10">Optimizers</text>
  <text x="320" y="148" text-anchor="middle" fill="#aaaaaa" font-size="10">SGD, Adam, AdamW, etc.</text>

  <rect x="430" y="90" width="180" height="65" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="520" y="115" text-anchor="middle" fill="#feca57" font-size="13" font-weight="bold">torch.utils.data</text>
  <text x="520" y="133" text-anchor="middle" fill="#aaaaaa" font-size="10">Dataset, DataLoader</text>
  <text x="520" y="148" text-anchor="middle" fill="#aaaaaa" font-size="10">Efficient data loading</text>

  <rect x="630" y="90" width="180" height="65" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="720" y="115" text-anchor="middle" fill="#a29bfe" font-size="13" font-weight="bold">torchvision</text>
  <text x="720" y="133" text-anchor="middle" fill="#aaaaaa" font-size="10">CV models, transforms</text>
  <text x="720" y="148" text-anchor="middle" fill="#aaaaaa" font-size="10">datasets, pretrained</text>

  <!-- Mid-Level -->
  <text x="500" y="190" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Core Modules</text>

  <rect x="50" y="205" width="150" height="45" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="125" y="225" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">torch.autograd</text>
  <text x="125" y="242" text-anchor="middle" fill="#aaaaaa" font-size="9">Automatic differentiation</text>

  <rect x="220" y="205" width="150" height="45" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="295" y="225" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">torch.cuda</text>
  <text x="295" y="242" text-anchor="middle" fill="#aaaaaa" font-size="9">GPU management</text>

  <rect x="390" y="205" width="150" height="45" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="465" y="225" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">torch.jit</text>
  <text x="465" y="242" text-anchor="middle" fill="#aaaaaa" font-size="9">TorchScript compilation</text>

  <rect x="560" y="205" width="150" height="45" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="635" y="225" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">torch.distributed</text>
  <text x="635" y="242" text-anchor="middle" fill="#aaaaaa" font-size="9">Multi-GPU/node training</text>

  <rect x="730" y="205" width="150" height="45" fill="#16213e" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="805" y="225" text-anchor="middle" fill="#54a0ff" font-size="11" font-weight="bold">torch.compile</text>
  <text x="805" y="242" text-anchor="middle" fill="#aaaaaa" font-size="9">PyTorch 2.0 compiler</text>

  <!-- Ecosystem Libraries -->
  <text x="500" y="390" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Ecosystem &amp; Extensions</text>

  <rect x="30" y="405" width="150" height="60" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="105" y="428" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">HuggingFace</text>
  <text x="105" y="445" text-anchor="middle" fill="#aaaaaa" font-size="9">Transformers, Datasets</text>
  <text x="105" y="458" text-anchor="middle" fill="#aaaaaa" font-size="9">NLP/LLM models</text>

  <rect x="200" y="405" width="150" height="60" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="275" y="428" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">Lightning</text>
  <text x="275" y="445" text-anchor="middle" fill="#aaaaaa" font-size="9">Training framework</text>
  <text x="275" y="458" text-anchor="middle" fill="#aaaaaa" font-size="9">Reduce boilerplate</text>

  <rect x="370" y="405" width="150" height="60" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="445" y="428" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">TorchServe</text>
  <text x="445" y="445" text-anchor="middle" fill="#aaaaaa" font-size="9">Model serving</text>
  <text x="445" y="458" text-anchor="middle" fill="#aaaaaa" font-size="9">REST/gRPC APIs</text>

  <rect x="540" y="405" width="150" height="60" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="615" y="428" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">ONNX Runtime</text>
  <text x="615" y="445" text-anchor="middle" fill="#aaaaaa" font-size="9">Cross-platform</text>
  <text x="615" y="458" text-anchor="middle" fill="#aaaaaa" font-size="9">inference engine</text>

  <rect x="710" y="405" width="150" height="60" fill="#16213e" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  <text x="785" y="428" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">DeepSpeed</text>
  <text x="785" y="445" text-anchor="middle" fill="#aaaaaa" font-size="9">Large-scale training</text>
  <text x="785" y="458" text-anchor="middle" fill="#aaaaaa" font-size="9">ZeRO, offloading</text>

  <!-- Hardware -->
  <text x="500" y="505" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Hardware Acceleration</text>

  <rect x="150" y="520" width="140" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="220" y="545" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">CPU (OpenMP)</text>

  <rect x="320" y="520" width="140" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="390" y="545" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">NVIDIA GPU</text>

  <rect x="490" y="520" width="140" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="560" y="545" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">AMD ROCm</text>

  <rect x="660" y="520" width="160" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="740" y="545" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">Apple MPS (M1/M2)</text>

  <!-- Connecting lines -->
  <line x1="120" y1="155" x2="400" y2="260" stroke="#EE4C2C" stroke-width="1" opacity="0.3"/>
  <line x1="320" y1="155" x2="450" y2="260" stroke="#00d2d3" stroke-width="1" opacity="0.3"/>
  <line x1="520" y1="155" x2="500" y2="260" stroke="#feca57" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="350" x2="500" y2="390" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

  <!-- Footer -->
  <rect x="30" y="575" width="940" height="30" fill="#0f3460" rx="5"/>
  <text x="500" y="595" text-anchor="middle" fill="#aaaaaa" font-size="11">PyTorch 2.x — Dynamic graphs | torch.compile() for speed | Pythonic &amp; debuggable | Research standard (80%+ papers)</text>
</svg>
