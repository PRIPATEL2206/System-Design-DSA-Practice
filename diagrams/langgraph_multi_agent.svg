<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 560" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1050" height="560" fill="#1a1a2e" rx="10"/>
  <text x="525" y="35" text-anchor="middle" fill="#e94560" font-size="20" font-weight="bold">LangGraph Multi-Agent Patterns</text>

  <!-- Pattern 1: Supervisor -->
  <rect x="30" y="55" width="490" height="240" fill="#16213e" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="275" y="78" text-anchor="middle" fill="#feca57" font-size="12" font-weight="bold">Pattern 1: Supervisor (Hub &amp; Spoke)</text>

  <!-- Supervisor node (center) -->
  <rect x="200" y="100" width="150" height="45" fill="#0f3460" stroke="#feca57" stroke-width="2" rx="8"/>
  <text x="275" y="120" text-anchor="middle" fill="#feca57" font-size="9" font-weight="bold">Supervisor Agent</text>
  <text x="275" y="135" text-anchor="middle" fill="#aaaaaa" font-size="7">Decides next worker</text>

  <!-- Worker 1: Researcher -->
  <rect x="55" y="175" width="120" height="45" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="115" y="195" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Researcher</text>
  <text x="115" y="210" text-anchor="middle" fill="#aaaaaa" font-size="7">Gather information</text>

  <!-- Worker 2: Writer -->
  <rect x="205" y="195" width="120" height="45" fill="#0f3460" stroke="#00ff88" stroke-width="1.5" rx="6"/>
  <text x="265" y="215" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Writer</text>
  <text x="265" y="230" text-anchor="middle" fill="#aaaaaa" font-size="7">Create content</text>

  <!-- Worker 3: Editor -->
  <rect x="355" y="175" width="120" height="45" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="415" y="195" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">Editor</text>
  <text x="415" y="210" text-anchor="middle" fill="#aaaaaa" font-size="7">Polish output</text>

  <!-- Arrows: Supervisor → Workers -->
  <line x1="230" y1="147" x2="140" y2="172" stroke="#feca57" stroke-width="1.5" marker-end="url(#maArr)"/>
  <line x1="275" y1="147" x2="265" y2="192" stroke="#feca57" stroke-width="1.5" marker-end="url(#maArr)"/>
  <line x1="320" y1="147" x2="390" y2="172" stroke="#feca57" stroke-width="1.5" marker-end="url(#maArr)"/>

  <!-- Arrows: Workers → Supervisor (loop back) -->
  <path d="M 115,175 C 115,155 200,140 200,122" fill="none" stroke="#54a0ff" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#maArr)"/>
  <path d="M 415,175 C 415,155 350,140 350,122" fill="none" stroke="#a29bfe" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#maArr)"/>

  <!-- Flow description -->
  <text x="50" y="260" fill="#ffffff" font-size="8">Flow: User → Supervisor → Worker₁ → Supervisor → Worker₂ → ... → END</text>
  <text x="50" y="278" fill="#00ff88" font-size="8">+ Centralized control, easy to add workers</text>
  <text x="300" y="278" fill="#ff6b6b" font-size="8">- Supervisor bottleneck, extra LLM calls</text>

  <!-- Pattern 2: Sequential Collaboration -->
  <rect x="540" y="55" width="480" height="240" fill="#16213e" stroke="#00ff88" stroke-width="2" rx="8"/>
  <text x="780" y="78" text-anchor="middle" fill="#00ff88" font-size="12" font-weight="bold">Pattern 2: Sequential Collaboration</text>

  <!-- Agent 1 -->
  <rect x="570" y="110" width="110" height="50" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="625" y="132" text-anchor="middle" fill="#54a0ff" font-size="9" font-weight="bold">Coder</text>
  <text x="625" y="148" text-anchor="middle" fill="#aaaaaa" font-size="7">Write code</text>

  <line x1="685" y1="135" x2="715" y2="135" stroke="#fff" stroke-width="1.5" marker-end="url(#maArr)"/>

  <!-- Agent 2 -->
  <rect x="720" y="110" width="110" height="50" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="775" y="132" text-anchor="middle" fill="#e94560" font-size="9" font-weight="bold">Reviewer</text>
  <text x="775" y="148" text-anchor="middle" fill="#aaaaaa" font-size="7">Check code</text>

  <line x1="835" y1="135" x2="865" y2="135" stroke="#fff" stroke-width="1.5" marker-end="url(#maArr)"/>

  <!-- Agent 3 -->
  <rect x="870" y="110" width="110" height="50" fill="#0f3460" stroke="#a29bfe" stroke-width="1.5" rx="6"/>
  <text x="925" y="132" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Tester</text>
  <text x="925" y="148" text-anchor="middle" fill="#aaaaaa" font-size="7">Write tests</text>

  <!-- Cycle: Reviewer → Coder (revision) -->
  <path d="M 720,150 C 700,180 680,180 660,150 L 650,150" fill="none" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#maArr)"/>
  <text x="675" y="190" text-anchor="middle" fill="#ff6b6b" font-size="7">needs revision</text>

  <!-- Conditional diamond -->
  <polygon points="775,175 800,195 775,215 750,195" fill="#0f3460" stroke="#feca57" stroke-width="1.5"/>
  <text x="775" y="198" text-anchor="middle" fill="#feca57" font-size="6">pass?</text>

  <line x1="775" y1="162" x2="775" y2="173" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>
  <line x1="802" y1="195" x2="870" y2="135" stroke="#00ff88" stroke-width="1" marker-end="url(#maArr)"/>
  <text x="840" y="160" fill="#00ff88" font-size="7">approved</text>

  <!-- Flow description -->
  <text x="560" y="240" fill="#ffffff" font-size="8">Flow: Coder → Reviewer → {approved: Tester, fail: Coder} → END</text>
  <text x="560" y="258" fill="#00ff88" font-size="8">+ Natural workflow, self-correcting cycles</text>
  <text x="560" y="278" fill="#ff6b6b" font-size="8">- Fixed pipeline, less adaptive to novel tasks</text>

  <!-- Pattern 3: Human-in-the-Loop -->
  <rect x="30" y="310" width="490" height="230" fill="#16213e" stroke="#a29bfe" stroke-width="2" rx="8"/>
  <text x="275" y="333" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">Pattern 3: Human-in-the-Loop</text>

  <!-- Plan node -->
  <rect x="60" y="355" width="100" height="40" fill="#0f3460" stroke="#54a0ff" stroke-width="1.5" rx="6"/>
  <text x="110" y="379" text-anchor="middle" fill="#54a0ff" font-size="8" font-weight="bold">Plan Action</text>

  <line x1="165" y1="375" x2="195" y2="375" stroke="#fff" stroke-width="1.5" marker-end="url(#maArr)"/>

  <!-- Interrupt -->
  <rect x="200" y="350" width="130" height="50" fill="#e94560" stroke="#e94560" stroke-width="2" rx="8" opacity="0.3"/>
  <rect x="205" y="355" width="120" height="40" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="6"/>
  <text x="265" y="373" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">INTERRUPT</text>
  <text x="265" y="388" text-anchor="middle" fill="#ffffff" font-size="7">Wait for human</text>

  <line x1="330" y1="375" x2="360" y2="375" stroke="#fff" stroke-width="1.5" marker-end="url(#maArr)"/>

  <!-- Human decision -->
  <polygon points="415,375 450,355 485,375 450,395" fill="#0f3460" stroke="#feca57" stroke-width="2"/>
  <text x="450" y="378" text-anchor="middle" fill="#feca57" font-size="7">Human</text>

  <!-- Approve path -->
  <line x1="487" y1="375" x2="520" y2="375" stroke="#00ff88" stroke-width="1.5"/>
  <text x="475" y="363" fill="#00ff88" font-size="7">approve</text>

  <!-- Execute -->
  <rect x="525" y="355" width="100" height="40" fill="#0f3460" stroke="#00ff88" stroke-width="2" rx="6"/>
  <text x="575" y="379" text-anchor="middle" fill="#00ff88" font-size="8" font-weight="bold">Execute</text>

  <!-- Reject path -->
  <path d="M 450,397 L 450,430 L 110,430 L 110,398" fill="none" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#maArr)"/>
  <text x="280" y="445" text-anchor="middle" fill="#ff6b6b" font-size="7">reject → revise plan (cycle)</text>

  <!-- Checkpoint explanation -->
  <rect x="60" y="460" width="435" height="60" fill="#0f3460" stroke="#00d2d3" stroke-width="1" rx="4"/>
  <text x="277" y="478" text-anchor="middle" fill="#00d2d3" font-size="9" font-weight="bold">Checkpointing enables human-in-the-loop</text>
  <text x="75" y="496" fill="#ffffff" font-size="8">1. Graph runs until interrupt_before=["execute"]</text>
  <text x="75" y="511" fill="#ffffff" font-size="8">2. State saved to DB → present plan to human → human approves/rejects → resume</text>

  <!-- Pattern 4: Map-Reduce -->
  <rect x="540" y="310" width="480" height="230" fill="#16213e" stroke="#00d2d3" stroke-width="2" rx="8"/>
  <text x="780" y="333" text-anchor="middle" fill="#00d2d3" font-size="12" font-weight="bold">Pattern 4: Map-Reduce (Parallel)</text>

  <!-- Fan-out -->
  <rect x="580" y="360" width="80" height="35" fill="#0f3460" stroke="#feca57" stroke-width="1.5" rx="4"/>
  <text x="620" y="382" text-anchor="middle" fill="#feca57" font-size="8" font-weight="bold">Fan Out</text>

  <!-- Parallel workers -->
  <line x1="665" y1="370" x2="700" y2="360" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>
  <line x1="665" y1="378" x2="700" y2="378" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>
  <line x1="665" y1="386" x2="700" y2="396" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>

  <rect x="705" y="345" width="80" height="28" fill="#0f3460" stroke="#54a0ff" stroke-width="1" rx="4"/>
  <text x="745" y="363" text-anchor="middle" fill="#54a0ff" font-size="7">Worker 1</text>

  <rect x="705" y="378" width="80" height="28" fill="#0f3460" stroke="#00ff88" stroke-width="1" rx="4"/>
  <text x="745" y="396" text-anchor="middle" fill="#00ff88" font-size="7">Worker 2</text>

  <rect x="705" y="411" width="80" height="28" fill="#0f3460" stroke="#a29bfe" stroke-width="1" rx="4"/>
  <text x="745" y="429" text-anchor="middle" fill="#a29bfe" font-size="7">Worker 3</text>

  <!-- Fan-in -->
  <line x1="790" y1="360" x2="830" y2="378" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>
  <line x1="790" y1="392" x2="830" y2="378" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>
  <line x1="790" y1="425" x2="830" y2="393" stroke="#fff" stroke-width="1" marker-end="url(#maArr)"/>

  <rect x="835" y="365" width="80" height="35" fill="#0f3460" stroke="#e94560" stroke-width="1.5" rx="4"/>
  <text x="875" y="387" text-anchor="middle" fill="#e94560" font-size="8" font-weight="bold">Combine</text>

  <!-- END -->
  <line x1="920" y1="382" x2="955" y2="382" stroke="#fff" stroke-width="1.5" marker-end="url(#maArr)"/>
  <circle cx="970" cy="382" r="14" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="970" y="386" text-anchor="middle" fill="#e94560" font-size="7">END</text>

  <!-- Description -->
  <text x="560" y="460" fill="#ffffff" font-size="8">Split task into N subtasks → process in parallel → merge results</text>
  <text x="560" y="478" fill="#00ff88" font-size="8">Use Send() API: return [Send("worker", {topic: t}) for t in topics]</text>
  <text x="560" y="496" fill="#aaaaaa" font-size="8">Example: Research 5 topics simultaneously, combine into one report</text>

  <!-- When to use -->
  <rect x="560" y="505" width="440" height="30" fill="#0f3460" stroke="#feca57" stroke-width="1" rx="4"/>
  <text x="780" y="524" text-anchor="middle" fill="#feca57" font-size="9">Choose based on: task structure, coordination needs, parallelism potential</text>

  <defs>
    <marker id="maArr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#ffffff"/>
    </marker>
  </defs>
</svg>
